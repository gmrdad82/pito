  # in reject as SHAPE-DOWN TARGETS: "make me famous" measured exactly 0.65
  # (the new suggest floor — boundary, re-measure on every corpus change)
  # and "can you edit my thumbnail?" 0.667. Neither must ever auto-run;
  # corpus growth should push both back under the floor when possible,
  # never the other way.
  - { say: "make me famous" }
  - { say: "can you edit my thumbnail?" }
  # ("what should I play next?" moved to suggest: — Q49, 3.8.0.)
  # ("do the thing" moved to tolerated_suggest: — Q13b, 3.8.0 repair.)
  - { say: "asdfghjkl" }

# Tolerated did-you-mean tier (X6, 2026-07-16 prefixed measurement): these 7
# entries used to live in `reject:`, but under the prefixed embeddings they
# all measure ABOVE the suggest floor (0.72-0.81) — domain-adjacent phrasing
# ("write a description for vid 3", "upload my new video") that a
# confirm-first did-you-mean may legitimately fire on. That is TOLERATED,
# not a calibration failure: the only real invariant left to assert is that
# none of them ever clears the auto_run floor. See the calibration spec's
# "tolerated_suggest tier" example. (An eighth row joined from reject: in
# the 3.8.0 repair — Q13b, see its own comment.)
tolerated_suggest:
  - { say: "write a description for vid 3" }        # 0.8081
  - { say: "vid" }                                   # 0.7915
  - { say: "upload my new video" }                   # 0.7797
  - { say: "sync my bank account" }                  # 0.7359
  - { say: "why are my views down this month?" }     # 0.7312
  - { say: "delete everything" }                     # 0.7251
  - { say: "show me that thing from before" }        # 0.7240
  # Q13b (3.8.0 repair): ruled to STAND in the tolerated tier — it measures
  # as domain-adjacent noise (0.7100 -> help), not true garbage, so its
  # placement moved here from reject: to match the ANSWERS block (both
  # tiers assert the same invariant since X6: never clears auto_run).
  - { say: "do the thing" }                          # 0.7100 -> help

