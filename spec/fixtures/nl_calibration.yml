# NL mapper calibration corpus (3.0.0, Fable-authored 2026-07-15).
#
# The held-out test set for the `nl:` thresholds — every phrasing here is
# DELIBERATELY absent from the tools.yml nl_examples corpus (those are the
# router's training neighbors; these prove generalization). Three tiers:
#
#   auto_run   — clearly one read-only tool; the router must map these with
#                confidence >= nl.thresholds.auto_run and the gate must run
#                them directly (attribution shown).
#   suggest    — mappable, but must NEVER auto-run: write-capable tools
#                (regardless of confidence) or honest ambiguity. The gate
#                asks "did you mean `<run>`?".
#   reject     — must fall through to the unknown-input copy: out-of-scope
#                chatter, pito-can't-do-that asks, fragments, and questions
#                that belong to @ai rather than a grammar command.
#
# The calibration spec (rides with the router) runs each tier through
# Pito::Nl::Router + the confidence gate and pins the tier boundaries —
# thresholds become measured numbers, not guesses. Reject entries carry no
# `run`; a router hit on one of them above the suggest threshold is a
# calibration failure.
#
# tolerated_suggest — a FOURTH tier (added X6, 2026-07-16, prefixed
#                embeddings): domain-adjacent phrases that are NOT garbage
#                but aren't a real command either ("write a description for
#                vid 3", "upload my new video") — they now measure above the
#                suggest floor (0.72-0.81), so a confirm-first did-you-mean
#                may legitimately surface for them. That is ACCEPTABLE
#                behavior, not a false positive: the only real invariant is
#                they must never auto-run. Kept structurally separate from
#                `reject:` so that tier's own assertion stays sharp (true
#                garbage only) instead of blurring into "anything below
#                auto_run is fine".
auto_run:
  - { say: "show me all my vids",                     run: "ls vids" }
  - { say: "list every game I own",                   run: "ls games" }
  - { say: "what channels do I have?",                run: "ls channels" }
  - { say: "list rpg games please",                   run: "ls rpg games" }
  - { say: "how did my channel do this week?",        run: "analyze channel" }
  - { say: "check my subs trend",                     run: "analyze channel" }
  - { say: "quick overview please",                   run: "glance" }
  - { say: "open vid 21",                             run: "show vid 21" }
  - { say: "anything similar to game 3?",             run: "similar 3" }
  - { say: "who else covers game 9?",                 run: "channels 9" }
  - { say: "which vids are linked to game 4?",        run: "videos 4" }
  - { say: "what game goes with vid 5?",              run: "game 5" }
  # `find` declares NO chat: branch (3.0.1 P6 — see tools.yml's own comment on
  # the tool) so a bare "find …" never itself resolves as the dispatched
  # tool; a find-shaped ask is meant to fall through to search/list instead
  # (was wrongly `run: "find boss fight"`, a stale pre-P6 leftover that
  # `resolve_tool` would raise on if this file's live-embedder gate ever
  # actually ran it — fixed 3.0.1 P11). "find my boss fight vids" itself
  # moved to known_gaps: (X6, 2026-07-16): this was the FIRST time this
  # entry ever ran live (P11 landed with the sidecar down, so it was never
  # validated) — it reproducibly routes to :list at 0.752, not :search,
  # confirmed stable across two consecutive live runs. A genuine mapper miss,
  # not a threshold artifact (0.752 is nowhere near either floor).
  - { say: "search for games called zelda",           run: "search games for zelda" }
  - { say: "games that feel like dark souls",         run: "search games like dark souls" }
  - { say: "where did we discuss thumbnails?",        run: "search conversations for thumbnails" }
  - { say: "find the chat about pricing strategy",    run: "search conversations for pricing strategy" }
  - { say: "show my achievements",                    run: "shinies" }
  - { say: "lifetime numbers for my channel",         run: "breakdowns channel" }
  - { say: "the cover grid for my channel",           run: "games" }
  - { say: "what can pito do?",                       run: "help" }
  # 3.0.1 P11 corpus-growth batch — held-out phrasings for the "thin" tools
  # (never verbatim copies of the tools.yml nl_examples added alongside).
  # "dig up the clip where I rage quit tekken" moved to known_gaps: (X6,
  # 2026-07-16 prefixed measurement — scored 0.7078, below even the lowered
  # 0.72 suggest floor, nowhere near auto_run).
  - { say: "give me the snapshot on game 9",          run: "at-a-glance game 9" }
  - { say: "what does @gmrdad82 look like?",          run: "show channel @gmrdad82" }
  # greet/farewell entries removed 2026-07-15: those tools are GRAMMAR-DIRECT
  # (literal phrases parse upstream) and deliberately excluded from the
  # router corpus (ROUTER_EXCLUDED_TOOLS) — they can never route, so they
  # test the wrong layer here.
  # 3.1.0 traits corpus batch — held-out phrasings for the difficulty/
  # relaxing/worth-it search examples added to tools.yml's search:
  # nl_examples (traits-design.md section 8; never verbatim copies of that
  # batch). Not live-validated in this pass (calibration_spec.rb skips
  # without PITO_EMBEDDER_URL) — aspirational like the P11 additions until
  # someone runs it against the sidecar.
  - { say: "anything with punishing boss fights in my library?", run: "search games for boss fights" }
  - { say: "give me something that'll kick my teeth in",         run: "search games for brutally difficult" }
  - { say: "do I own anything soulslike?",                       run: "search games for soulslike" }
  - { say: "something low-key to unwind with tonight",           run: "search games for relaxing" }
  - { say: "what's a cozy pick from my library?",                run: "search games for cozy" }
  - { say: "what's gentle enough for the kids to jump into?",    run: "search games for kid friendly" }
  - { say: "which games actually earned their price tag?",       run: "search games for worth the money" }
  - { say: "what's genuinely worth sinking hours into?",         run: "search games for worth my time" }
  - { say: "which story actually got to me emotionally?",        run: "search games for emotional story" }
  - { say: "what's got that high-octane chaotic combat?",        run: "search games for chaotic action" }
  # 3.1.1 `about` corpus batch — held-out phrasings for the qualitative-search
  # (no title, no seed) exemplars added to nl.exemplars and the vids-vibe
  # nl_examples added to tools.yml's search: (never verbatim copies of either
  # batch). Only the TOOL is asserted here (Router routes by tool, not by
  # keyword — see resolve_tool's leading-token contract above), so `run:`'s
  # `about` is documentation of intent, not something this spec checks byte-
  # for-byte. Not live-validated in this pass (calibration_spec.rb skips
  # without PITO_EMBEDDER_URL) — aspirational like the 3.1.0 batch above
  # until someone runs it against the sidecar.
  - { say: "something punishing but so worth it in the end",     run: "search games about punishing worth it" }
  - { say: "a low-key game i can just melt into after work",     run: "search games about relaxing unwind" }
  - { say: "vids where i completely lost it laughing",           run: "search vids about funny laughing" }
  - { say: "clips full of jump scares and dread",                run: "search vids about scary dread" }

suggest:
  - { say: "get rid of vid 3",                        run: "delete vid 3" }
  - { say: "throw away game 9",                       run: "delete game 9" }
  - { say: "link vid 2 to game 8",                    run: "link 2 8" }
  - { say: "detach vid 6 from its game",              run: "unlink 6" }
  - { say: "make vid 6 public",                       run: "publish 6" }
  - { say: "hide vid 4 from the public",              run: "unlist 4" }
  - { say: "push vid 9 out on friday",                run: "schedule 9 friday" }
  - { say: "sync everything from youtube",            run: "sync" }
  - { say: "add hades to my library",                 run: "import game hades" }
  - { say: "set game 5's price to 30",                run: "update game price 5 30" }
  - { say: "I recorded two more hours of game 7",     run: "update game footage 7" }
  - { say: "re-embed game 2",                         run: "reindex game 2" }
  # 3.0.1 P11 corpus-growth batch — held-out phrasings for the "thin" write
  # tools (never verbatim copies of the tools.yml nl_examples added alongside).
  - { say: "vid 9 got tangled up with the wrong game, pull it off", run: "unlink 9" }
  - { say: "switch vid 5 over to unlisted",           run: "unlist 5" }
  - { say: "vid 8 actually goes with the tekken 8 entry", run: "link 8 3" }
  - { say: "log another ninety minutes against tekken", run: "update game footage 3" }
  # "tekken 8 just dropped to 39.99" moved to known_gaps: (X6, 2026-07-16
  # prefixed measurement — scored 0.7169, below the lowered 0.72 floor, so
  # Router.route now returns nil for it).
  - { say: "game 6 just launched on switch",          run: "update game platform 6 switch" }
  - { say: "let's put vid 7 out next friday",         run: "schedule 7 friday" }

reject:
  - { say: "what's the weather like?" }
  - { say: "who won the world cup?" }
  - { say: "how do I cook pasta" }
  - { say: "make me famous" }
  - { say: "can you edit my thumbnail?" }
  - { say: "what should I play next?" }
  - { say: "asdfghjkl" }
  - { say: "do the thing" }

# Tolerated did-you-mean tier (X6, 2026-07-16 prefixed measurement): these 7
# entries used to live in `reject:`, but under the prefixed embeddings they
# all measure ABOVE the suggest floor (0.72-0.81) — domain-adjacent phrasing
# ("write a description for vid 3", "upload my new video") that a
# confirm-first did-you-mean may legitimately fire on. That is TOLERATED,
# not a calibration failure: the only real invariant left to assert is that
# none of them ever clears the auto_run floor. See the calibration spec's
# "tolerated_suggest tier" example.
tolerated_suggest:
  - { say: "write a description for vid 3" }        # 0.8081
  - { say: "vid" }                                   # 0.7915
  - { say: "upload my new video" }                   # 0.7797
  - { say: "sync my bank account" }                  # 0.7359
  - { say: "why are my views down this month?" }     # 0.7312
  - { say: "delete everything" }                     # 0.7251
  - { say: "show me that thing from before" }        # 0.7240

# Known gaps (measured after two corpus-growth rounds): phrasings that
# SHOULD ideally auto-run but genuinely don't route correctly under
# embeddinggemma-300m — listed for visibility, asserted by nothing. All
# degrade safely (nil -> unknown copy; wrong-tool -> did-you-mean ask).
known_gaps:
  - { say: "gimme the rundown on vid 11",             run: "glance vid 11" }   # 2026-07-15 -> nil
  - { say: "pull up the details for game 7",          run: "show game 7" }     # 2026-07-15 -> videos @0.79
  # X6 (2026-07-16, prefixed embeddings): these two were previously in
  # auto_run:/suggest: above; both now score below the lowered 0.72 suggest
  # floor (Router.route returns nil for both) — the hardest two of the five
  # positives the prefix-measurement run surfaced. Corpus growth may rescue
  # them; revisit alongside X7's exemplar work.
  - { say: "dig up the clip where I rage quit tekken", run: "search vids for tekken" }        # 0.7078 -> nil
  - { say: "tekken 8 just dropped to 39.99",          run: "update game price 3 39.99" }       # 0.7169 -> nil
  - { say: "find my boss fight vids",                 run: "search vids for boss fight" }     # 0.752 -> list (wrong tool, stable)
