# NL mapper calibration corpus (3.0.0, Fable-authored 2026-07-15).
#
# The held-out test set for the `nl:` thresholds — every phrasing here is
# DELIBERATELY absent from the tools.yml nl_examples corpus (those are the
# router's training neighbors; these prove generalization). Three tiers:
#
#   auto_run   — clearly one read-only tool; the router must map these with
#                confidence >= nl.thresholds.auto_run and the gate must run
#                them directly (attribution shown). ONE write-shaped
#                exception since the 2026-07-20/21 owner interview (Q17):
#                `update … footage …` — footage is a local-only, freely
#                reversible column, so the gate's field-aware check
#                (tools.yml `nl_auto_run_fields: [footage]` on update) lets
#                footage rows auto-run; they belong in THIS tier now.
#   suggest    — mappable, but must NEVER auto-run: write-capable tools
#                (regardless of confidence, footage excepted per Q17 above)
#                or honest ambiguity. The gate asks "did you mean `<run>`?".
#   reject     — must fall through to the unknown-input copy: out-of-scope
#                chatter, pito-can't-do-that asks, fragments, and questions
#                that belong to @ai rather than a grammar command.
#
# The calibration spec (rides with the router) runs each tier through
# Pito::Nl::Router + the confidence gate and pins the tier boundaries —
# thresholds become measured numbers, not guesses. Reject entries carry no
# `run`; a router hit on one of them above the suggest threshold is a
# calibration failure.
#
# tolerated_suggest — a FOURTH tier (added X6, 2026-07-16, prefixed
#                embeddings): domain-adjacent phrases that are NOT garbage
#                but aren't a real command either ("write a description for
#                vid 3", "upload my new video") — they now measure above the
#                suggest floor (0.72-0.81), so a confirm-first did-you-mean
#                may legitimately surface for them. That is ACCEPTABLE
#                behavior, not a false positive: the only real invariant is
#                they must never auto-run. Kept structurally separate from
#                `reject:` so that tier's own assertion stays sharp (true
#                garbage only) instead of blurring into "anything below
#                auto_run is fine".
