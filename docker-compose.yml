# Bridge networking restored after Docker iptables rebuild on 2026-05-01.
#
# Host-side ports use the "27" suffix (3027/3028 web, 54327 postgres)
# so this stack can run alongside other local projects without collisions.
# Container-side ports stay default — only the host mapping shifts.
# All host bindings are pinned to 127.0.0.1 (never 0.0.0.0).
services:
  postgres:
    image: pgvector/pgvector:pg17
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-54327}:5432"
    environment:
      POSTGRES_USER: pito
      POSTGRES_DB: pito_development
      POSTGRES_HOST_AUTH_METHOD: trust
    # No named volume — Postgres data lives in the container's writable
    # layer and is intentionally ephemeral (local-only; recreate with
    # db:create db:migrate + seeds). Reintroduce a volume when persistence
    # matters.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 10
