# Production stack — used by bin/boot (full Docker: Rails + Postgres).
# name: pito-boot gives this stack its own project namespace, completely
# isolated from the dev stack (different container names, different volumes).
#
# Ports use the "28" suffix so both stacks can run simultaneously:
#   dev:  web 3027 (host Puma), postgres 54327
#   boot: web 3028 (Docker, via `lb`), postgres 54328
#
# Point cloudflared at 127.0.0.1:3028 for the production tunnel — that port
# is now served by `lb` (see below), not a web container directly.

name: pito-boot

volumes:
  postgres_data:
  rails_storage:
  caddy_data:
  caddy_config:
  # `lb`'s own ACME/admin-API state — separate from the direct-HTTPS `caddy`
  # service's volumes above (each service owns its own, same reasoning as
  # embedder_models/nlmapper_models below). `lb` issues no certificates
  # itself (it has no hostname, see Caddyfile.lb), so this stays tiny.
  lb_data:
  lb_config:
  # One dedicated model-cache volume PER sidecar (owner 2026-07-15: avoid
  # coupling — like postgres_data, each service owns its own). Holds only
  # re-downloadable GGUF weights, never app data (embeddings live in
  # postgres_data), so losing one just re-downloads that model.
  embedder_models:
  nlmapper_models:

# Shared shape for the two `web` deploy slots (blue/green zero-downtime
# deploys — script/deploy-flip.sh). Everything EXCEPT `image` and `profiles`
# is identical between them, so it's merged in via YAML anchor rather than
# duplicated; each slot below overrides only the image tag var + its own
# profile + its own host-loopback probe port.
x-web-common: &web-common
  # Self-hosters pull this prebuilt image from GHCR (docker compose pull); no
  # source checkout needed. `build: .` stays as a fallback so a repo checkout
  # can still `docker compose up --build` (or `pito build`, which now builds
  # straight from the Dockerfile — see bin/pito).
  build:
    context: .
    dockerfile: Dockerfile
    # Mirror the version into the local `--build` image too (a build arg never
    # blanks runtime env). Empty for a bare local build.
    args:
      PITO_VERSION: ${PITO_VERSION:-}
  volumes:
    - rails_storage:/var/lib/pito-assets
    # Each owner runs THEIR OWN secrets: mount the install dir's master key +
    # encrypted credentials (generated by script/install.sh) read-only over the
    # image's baked-in author copies. These files must exist before `up`.
    - ./config/master.key:/rails/config/master.key:ro
    - ./config/credentials.yml.enc:/rails/config/credentials.yml.enc:ro
    # Optional: your own shinies ladders over the baked defaults —
    # see README → "Customizing your shinies".
    # - ./shinies.yml:/rails/config/pito/shinies.yml:ro
  environment:
    RAILS_ENV: production
    # The master key comes from the mounted config/master.key (see volumes
    # above) — NOT an env var. A `RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}` here
    # injected a BLANK string whenever the var was unset, which overrides the
    # mounted file and breaks credential decryption at boot (and warned on
    # every compose command). The mounted file is the single source of truth.
    # Run the SolidQueue supervisor (dispatcher + worker + recurring scheduler)
    # inside Puma — single-server self-host has no separate jobs process, so
    # without this, background + recurring jobs would never run (see puma.rb).
    # Both slots run it: SolidQueue is DB-backed with SKIP LOCKED claims and
    # recurring runs are deduped by a DB unique index (task_key, run_at), so
    # the brief overlap where both slots are up during a deploy is safe by
    # construction — see docs/architecture.md → Zero-downtime deploys.
    SOLID_QUEUE_IN_PUMA: "true"
    # Public host: drives Host Authorization, URL helpers, and asset_host.
    # Defaults to the local Docker port; the install/update scripts set this
    # in .env (e.g. https://app.pitomd.com for a cloudflared tunnel).
    PITO_APP_BASE_URL: ${PITO_APP_BASE_URL:-http://localhost:3028}
    # Forwarded so the app can report its tag in the mini-status when the
    # CI-baked PITO_VERSION is absent (local builds). A SEPARATE var from
    # PITO_VERSION: an empty value here can never blank the baked one. Mirrors
    # whichever slot most recently deployed — NOT the per-slot image tag
    # below, which is what actually pins each container's image. Because this
    # var is part of BOTH slots' container env, script/deploy-flip.sh writes
    # it BEFORE starting the new slot: the running container's config then
    # matches what a later bare `up -d` recomputes, so update.sh's final
    # sweep never sees drift on the live slot and never recreates it (that
    # recreate would be a full-boot outage — keep the ordering).
    PITO_TAG: ${PITO_TAG:-}
    POSTGRES_HOST: postgres
    POSTGRES_PORT: 5432
    # AppSignal APM (optional). Set the key in the install dir's .env to
    # activate; absent/blank keeps AppSignal completely inert (see
    # config/appsignal.rb). Never bake this into the image or credentials.
    APPSIGNAL_PUSH_API_KEY: ${APPSIGNAL_PUSH_API_KEY:-}
    # Local AI sidecars (3.0.0). Reached over the compose network. The `-`
    # (not `:-`) form means: UNSET → the in-network default (features work
    # out of the box); explicitly BLANK in .env → honored as blank, which
    # disables the feature cleanly (K2 degrade). A self-hoster who can't
    # spare the sidecar RAM sets these blank AND skips the embedder/nlmapper
    # services.
    PITO_EMBEDDER_URL: ${PITO_EMBEDDER_URL-http://embedder:8081}
    PITO_NLMAPPER_URL: ${PITO_NLMAPPER_URL-http://nlmapper:8082}
  depends_on:
    postgres:
      condition: service_healthy
  # Logs go to STDOUT → Docker; cap growth via the json-file driver.
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  postgres:
    image: pgvector/pgvector:pg17
    ports:
      - "127.0.0.1:54328:5432"
    environment:
      POSTGRES_USER: pito
      POSTGRES_DB: pito_production
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 10
    # Cap log growth the Docker-native way (json-file driver). No custom files.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Two deploy slots, one active at a time (zero-downtime deploys, 3.6.0 —
  # see script/deploy-flip.sh + docs/architecture.md). Only the ACTIVE slot's
  # profile ("blue" or "green", tracked as COMPOSE_PROFILES in .env alongside
  # the bookkeeping var PITO_ACTIVE_SLOT) is included in a bare `docker
  # compose up` — Compose starts a profiled service outside its active
  # profile only when explicitly named (`docker compose up -d web-green`),
  # which is exactly what a deploy flip does to bring the IDLE slot up
  # without disturbing the active one. Each slot's image tag is its OWN env
  # var (PITO_TAG_BLUE / PITO_TAG_GREEN) so the two can run different
  # versions during the brief overlap window of a flip. `lb` (below) is what
  # actually decides which slot serves traffic, via active health checks
  # against /up — nobody here needs to know which slot is "active".
  web-blue:
    <<: *web-common
    image: ghcr.io/gmrdad82/pito:${PITO_TAG_BLUE:-latest}
    profiles: ["blue"]
    ports:
      # Loopback-only, deploy-flip.sh's own health probe during a flip —
      # never the public entry point (that's `lb`, at :3028).
      - "127.0.0.1:3030:80"

  web-green:
    <<: *web-common
    image: ghcr.io/gmrdad82/pito:${PITO_TAG_GREEN:-latest}
    profiles: ["green"]
    ports:
      - "127.0.0.1:3031:80"

  # Internal load balancer between the two `web` slots — ALWAYS on, never
  # profile-gated: this is what cloudflared / the direct-HTTPS `caddy`
  # service below / anything else on the box talks to. It doesn't need to
  # know which slot is "active" — Caddyfile.lb active-health-checks both
  # slots against /up and routes 100% of traffic to whichever answers
  # (lb_policy first), so a deploy NEVER rewrites this container's config;
  # script/deploy-flip.sh just starts the idle slot, waits for it to answer
  # healthy, then stops the old one, and `lb`'s own health check follows
  # along on its next probe. Config lives in ./Caddyfile.lb — a REPO-MANAGED
  # file refreshed on every `pito update` (like docker-compose.yml itself),
  # never hand-edited — that's ./Caddyfile below (the SEPARATE
  # owner-editable file for the optional direct-HTTPS `caddy` service).
  lb:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:3028:8080"
    volumes:
      - ./Caddyfile.lb:/etc/caddy/Caddyfile:ro
      - lb_data:/data
      - lb_config:/config
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # MCP (G130): a SECOND Puma serving the SAME image on :3001, exposed at
  # 127.0.0.1:3029. cloudflared (on the host) routes app.pitomd.com paths
  # ^/(mcp|oauth|\.well-known) here; everything else goes to `lb` (:3028),
  # which fronts the web-blue/web-green deploy slots. Isolating the
  # read-only MCP tool loop in its own container means a slow model call can
  # never starve the web app / APK / TUI Puma workers. Same DB + credentials;
  # it runs NO SolidQueue supervisor (the active web slot owns background
  # jobs — MCP must not double-process). Not part of the blue/green dance —
  # it restarts in place on update (a brief MCP-only bounce; the read-only
  # tool loop has no zero-downtime requirement).
  pito-mcp:
    image: ghcr.io/gmrdad82/pito:${PITO_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PITO_VERSION: ${PITO_VERSION:-}
    command: bundle exec puma -C config/puma.rb -p 3001
    ports:
      - "127.0.0.1:3029:3001"
    volumes:
      - rails_storage:/var/lib/pito-assets
      - ./config/master.key:/rails/config/master.key:ro
      - ./config/credentials.yml.enc:/rails/config/credentials.yml.enc:ro
    environment:
      RAILS_ENV: production
      # No SolidQueue supervisor here — the active web slot runs it; MCP
      # must not double-process.
      SOLID_QUEUE_IN_PUMA: "false"
      WEB_CONCURRENCY: "1"
      PITO_APP_BASE_URL: ${PITO_APP_BASE_URL:-http://localhost:3028}
      PITO_TAG: ${PITO_TAG:-}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      # Same optional AppSignal key as the web slots — the MCP Puma reports
      # as the same app; inert when blank.
      APPSIGNAL_PUSH_API_KEY: ${APPSIGNAL_PUSH_API_KEY:-}
      # NOTE: no PITO_EMBEDDER_URL / PITO_NLMAPPER_URL here on purpose. The MCP
      # tool loop is read-only and never calls a sidecar at request time:
      # `similar` reads STORED game vectors (pgvector nearest-neighbor, no live
      # embed), there is no MCP semantic-search tool, and the nlmapper only
      # fires on unmatched free-text CHAT (which MCP never does). This Puma also
      # runs no SolidQueue (SOLID_QUEUE_IN_PUMA=false), so it enqueues no embed
      # jobs either. The active web slot owns every sidecar caller.
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Local embeddings sidecar (3.0.0) — replaces Voyage AI. llama.cpp serves
  # embeddinggemma-300m over the OpenAI-compatible /v1/embeddings API; the
  # model (~350MB) auto-downloads from Hugging Face on first boot into its
  # own embedder_models volume, then never again. CPU-only by design (the Hetzner
  # box has no GPU). No host port: web/pito-mcp reach it over the compose
  # network via PITO_EMBEDDER_URL=http://embedder:8081 — and when that env
  # is blank/absent the app boots and runs fine with embedding features
  # degraded (search-like/similar fall back; nothing crashes, nothing bad
  # persists).
  embedder:
    # Pinned on purpose (2026-07-16, P9/3.0.1): the rolling `:server` tag
    # silently swaps the inference build out from under a running fleet.
    # This digest is what production runs today.
    image: ghcr.io/ggml-org/llama.cpp@sha256:6bc9134e3278a0ecab23d7ef2f6a46b4595740014fe9bc2f67e8ba7dca8395b4
    command: -hf ggml-org/embeddinggemma-300m-qat-q8_0-GGUF --embeddings --host 0.0.0.0 --port 8081
    restart: unless-stopped
    mem_limit: 1g
    volumes:
      - embedder_models:/root/.cache/llama.cpp
    healthcheck:
      # /health flips 200 once the model is loaded; the generous start_period
      # covers the one-time first-boot model download.
      test: ["CMD", "curl", "-sf", "http://localhost:8081/health"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 10m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # NL command mapper sidecar (3.0.0) — a second llama.cpp server holding
  # Qwen3-0.6B (Q8). It types pito commands under a GBNF grammar compiled
  # from tools.yml, so free-text like "list me the vids" maps to `ls vids`.
  # COLD PATH by design: only consulted when input matches no tool, so its
  # CPU cost never touches normal typing. Same inertness contract as the
  # embedder: blank/absent PITO_NLMAPPER_URL simply disables the mapper.
  nlmapper:
    # Pinned on purpose (2026-07-16, P9/3.0.1): the rolling `:server` tag
    # silently swaps the inference build out from under a running fleet.
    # This digest is what production runs today.
    image: ghcr.io/ggml-org/llama.cpp@sha256:6bc9134e3278a0ecab23d7ef2f6a46b4595740014fe9bc2f67e8ba7dca8395b4
    command: -hf Qwen/Qwen3-0.6B-GGUF:Q8_0 --host 0.0.0.0 --port 8082 --ctx-size 2048
    restart: unless-stopped
    mem_limit: 1g
    volumes:
      - nlmapper_models:/root/.cache/llama.cpp
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8082/health"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 10m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Direct-HTTPS alternative to the cloudflared tunnel: Caddy terminates TLS
  # (automatic Let's Encrypt) and reverse-proxies to `lb` — the internal load
  # balancer above, which fronts the web-blue/web-green deploy slots — over
  # the compose network. OFF by default — it runs only when
  # COMPOSE_PROFILES contains "caddy" in .env (written by `pito caddy`,
  # which also writes ./Caddyfile; the blue/green slot profile, "blue" or
  # "green", rides alongside it in the same comma-separated var — see
  # script/install.sh). Living in THIS file (not an override) is deliberate:
  # `pito update` re-fetches docker-compose.yml from the repo, so an
  # override would be wiped while a profile survives — .env is always
  # preserved. Requires ports 80/443 open and the domain's DNS A record
  # pointing at this host.
  caddy:
    profiles: ["caddy"]
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - lb
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
