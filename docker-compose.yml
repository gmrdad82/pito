# Bridge networking restored after Docker iptables rebuild on 2026-05-01.
#
# Host-side ports use the "27" suffix (3027/3028 web, 54327 postgres,
# 64527 redis, 7727 meilisearch) so this stack can run alongside other
# local projects (e.g. fepra2 on 3018 / 64518) without collisions.
# Container-side ports stay default — only the host mapping shifts.
# All host bindings are pinned to 127.0.0.1 (never 0.0.0.0).
services:
  postgres:
    image: pgvector/pgvector:pg17
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-54327}:5432"
    environment:
      POSTGRES_USER: pito
      POSTGRES_DB: pito_development
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - pito-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.13
    ports:
      - "127.0.0.1:${MEILISEARCH_PORT:-7727}:7700"
    volumes:
      - pito-meilisearch-data:/meili_data
    environment:
      MEILI_ENV: development
      MEILI_NO_ANALYTICS: "true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  # Explicit `name:` overrides bypass docker-compose's project-prefix so the
  # listed volume name matches the YAML key exactly (avoids the doubled
  # `pito_pito-...` form that compose generates by default).
  pito-postgres-data:
    name: pito-postgres-data
  pito-meilisearch-data:
    name: pito-meilisearch-data
  # Active Storage assets volume (game cover art, future channel
  # banners/avatars). Currently unmounted — Rails runs natively on the dev
  # host and reads PITO_ASSETS_PATH env var. The volume declaration lives
  # here so the name is reserved for when Rails moves into a container
  # (Hetzner cutover, Phase 16). The sibling `pito-notes` volume was
  # removed 2026-05-21 alongside the Notes feature drop (D17).
  pito-assets:
    name: pito-assets
