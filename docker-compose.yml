# Bridge networking restored after Docker iptables rebuild on 2026-05-01.
#
# Host-side ports use the "27" suffix (3027 web, 54327 postgres)
# so this stack can run alongside other local projects without collisions.
# Container-side ports stay default — only the host mapping shifts.
# All host bindings are pinned to 127.0.0.1 (never 0.0.0.0).
#
# Named volumes:
#   postgres_data  — Postgres WAL / data directory (survives docker compose down)
#   rails_storage  — ActiveStorage uploads at /var/lib/pito-assets

volumes:
  postgres_data:
  rails_storage:

services:
  postgres:
    image: pgvector/pgvector:pg17
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-54327}:5432"
    environment:
      POSTGRES_USER: pito
      POSTGRES_DB: pito_production
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: pito:latest
    ports:
      - "127.0.0.1:${WEB_PORT:-3027}:80"
    volumes:
      - rails_storage:/var/lib/pito-assets
    environment:
      RAILS_ENV: production
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy
