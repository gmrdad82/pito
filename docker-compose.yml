# Bridge networking restored after Docker iptables rebuild on 2026-05-01.
#
# Host-side ports use the "27" suffix (3027/3028 web, 54327 postgres)
# so this stack can run alongside other local projects without collisions.
# Container-side ports stay default — only the host mapping shifts.
# All host bindings are pinned to 127.0.0.1 (never 0.0.0.0).
services:
  postgres:
    image: pgvector/pgvector:pg17
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-54327}:5432"
    environment:
      POSTGRES_USER: pito
      POSTGRES_DB: pito_development
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - pito-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  # Explicit `name:` overrides bypass docker-compose's project-prefix so the
  # listed volume name matches the YAML key exactly (avoids the doubled
  # `pito_pito-...` form that compose generates by default).
  pito-postgres-data:
    name: pito-postgres-data
  # Active Storage assets volume: IGDB cover arts, Video thumbnails,
  # VideoPreview thumbnails, Channel avatars. Currently unmounted — Rails
  # runs natively on the dev host and reads PITO_ASSETS_PATH env var.
  # The volume declaration lives here so the name is reserved for when
  # Rails moves into a container (Hetzner cutover).
  pito-assets:
    name: pito-assets
