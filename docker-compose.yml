# Production stack — used by bin/boot (full Docker: Rails + Postgres).
# name: pito-boot gives this stack its own project namespace, completely
# isolated from the dev stack (different container names, different volumes).
#
# Ports use the "28" suffix so both stacks can run simultaneously:
#   dev:  web 3027 (host Puma), postgres 54327
#   boot: web 3028 (Docker),    postgres 54328
#
# Point cloudflared at 127.0.0.1:3028 for the production tunnel.

name: pito-boot

volumes:
  postgres_data:
  rails_storage:

services:
  postgres:
    image: pgvector/pgvector:pg17
    ports:
      - "127.0.0.1:54328:5432"
    environment:
      POSTGRES_USER: pito
      POSTGRES_DB: pito_production
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: pito:latest
    ports:
      - "127.0.0.1:3028:80"
    volumes:
      - rails_storage:/var/lib/pito-assets
    environment:
      RAILS_ENV: production
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy
