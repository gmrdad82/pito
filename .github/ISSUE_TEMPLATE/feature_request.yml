name: Feature request
description: Suggest a feature, screen change, or workflow improvement
title: "[feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion.

        Reminder: **pito is one person's tool, open-sourced as-is.**
        Feature requests are a wishlist — there's no commitment to
        implementation. PRs welcome but not guaranteed to be merged.
        If the feature doesn't fit the author's needs, it likely won't
        ship from this repo.

  - type: dropdown
    id: kind
    attributes:
      label: What kind of suggestion?
      options:
        - "Home screen (dashboard / system / calendar / notifications)"
        - "Videos screen (videos + channels)"
        - "Games screen (games + bundles + footage)"
        - "Recommendation system (channel ↔ game ↔ bundle)"
        - "Scheduling / publish workflow"
        - "Analytics / metrics"
        - "Self-hosting / deploy / Kamal"
        - "Docs / docs structure"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What use case or pain point is this solving?
      placeholder: |
        When I try to schedule a video for a channel that already has
        another video going out the same day, pito ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Sketch how this might work. Doesn't have to be polished.
      placeholder: |
        Add a conflict-detection panel on the Videos screen that ...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What else have you tried? Why didn't it work?
      placeholder: |
        I tried tracking this in YouTube Studio's Content tab, but ...
    validations:
      required: false

  - type: checkboxes
    id: ack
    attributes:
      label: Acknowledgment
      options:
        - label:
            I've read the [project
            status](https://github.com/gmrdad82/pito#project-status) section and
            understand feature requests are a wishlist.
          required: true
        - label: I've searched existing issues to avoid duplicates.
          required: true
        - label:
            I'd be willing to discuss / contribute a PR for this if it aligns
            with the project's direction.
          required: false
