name: Bug report
description:
  Report a bug in the Rails app, the Astro landing, or the CI pipeline
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.

        Reminder: **pito is alpha and self-hosted. No SLA, no support
        guarantees, no roadmap commitments.** Issues are triaged when
        there's time. Quality reports get triaged faster.

  - type: dropdown
    id: area
    attributes:
      label: Which area?
      options:
        - "Rails app (app/, controllers, models, views, components, channels,
          jobs)"
        - "Database (migrations, schema, query / performance)"
        - "Hotwire (Turbo Frames / Streams) or Stimulus"
        - "ActionCable / status-bar broadcasts"
        - "Voyage embeddings / recommendation"
        - "Auth / OAuth / sessions"
        - "Astro landing (extras/website/)"
        - "Kamal / Docker / deploy"
        - "CI (.github/workflows/)"
        - "Docs (README, AGENTS.md, EXTRA, docs/*)"
        - "Other / unsure"
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug + what you expected to happen.
      placeholder: |
        I expected ... but ...
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Numbered, deterministic steps. Shortest possible repro.
      placeholder: |
        1. `bin/setup`
        2. `bin/rails server`
        3. Visit `http://localhost:3000/...`
        4. Click ...
        5. See error
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: pito version
      description:
        From the `VERSION` file at the repo root, or `git rev-parse --short
        HEAD`.
      placeholder: e.g. v0.1.0 or 0534e93
    validations:
      required: false

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS + Ruby version + Postgres version.
      placeholder: e.g. Arch Linux, Ruby 3.3.5, Postgres 17.2
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / error output
      description:
        Paste backtraces, Rails log lines, browser console errors. Use code
        blocks for text.
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: ack
    attributes:
      label: Acknowledgment
      options:
        - label:
            I've read the [project
            status](https://github.com/gmrdad82/pito#project-status) section and
            understand pito is alpha with no SLA.
          required: true
        - label: I've searched existing issues to avoid duplicates.
          required: true
