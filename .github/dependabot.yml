# Dependabot configuration.
#
# Grouping intent: bundle related ecosystem updates into single weekly PRs
# rather than firing one PR per gem / action / package. The architect
# reviews one consolidated PR per ecosystem per week instead of triaging
# a flood of individual bumps. Major-version updates stay ungrouped so
# they land as standalone PRs (they typically need attention anyway).
#
# All ecosystems share `schedule.interval: weekly` so updates land on
# the same weekday (Mondays), keeping the dependency-hygiene cadence
# predictable.

version: 2
updates:
  - package-ecosystem: bundler
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      bundler-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      github-actions-all:
        update-types:
          - minor
          - patch
