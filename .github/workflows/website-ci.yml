name: Website CI

# Commit-message guard: include `[skipci]` (lowercase, no space — distinct
# from GitHub's built-in `[skip ci]`) in the commit message OR pull-request
# title to skip every job in this workflow.

on:
  push:
    branches: [main]
    paths:
      - "extras/website/**"
      - ".github/workflows/website-ci.yml"
  pull_request:
    paths:
      - "extras/website/**"
      - ".github/workflows/website-ci.yml"

jobs:
  lint-and-audit:
    if: |
      !contains(github.event.head_commit.message, '[skipci]') &&
      !contains(github.event.pull_request.title, '[skipci]')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extras/website
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: extras/website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high severity gate)
        run: npm audit --audit-level=high

      - name: Astro check (typing + template lint)
        run: npx astro check

      - name: Build verification
        run: npm run build
