name: Release (GHCR image)

# Builds the production pito image and pushes it multi-arch (linux/amd64 +
# linux/arm64) to the GitHub Container Registry.
#
# Build model: NATIVE per-arch runners, not QEMU. amd64 builds on
# `ubuntu-24.04`, arm64 builds on `ubuntu-24.04-arm` (free hosted arm64 runners
# for public repos) — each pushes a by-digest image, then a `merge` job stitches
# the two digests into one multi-arch manifest tagged `:<version>` + `:latest`.
# This replaces the old single-runner QEMU emulation (~20-40 min on the arm leg)
# with two native builds running in parallel.
#
# Trigger model: TAG-ONLY. Fires exclusively on a version-tag push (`v0.7.1`,
# `v1.2.3`, …) plus a manual `workflow_dispatch` escape hatch — never on branch
# pushes or ordinary commits. Day-to-day commits run `ci.yml`; an image is built
# and published only when you cut a release tag. So: finish work →
# `git tag v0.7.1 && git push origin v0.7.1` → this workflow ships the image.
#
# GREEN-CI GATE (owner 2026-07-02): a tag on a commit that is not fully green
# must NOT build an image. The `verify-ci` job waits for every other workflow
# run on the tagged commit to complete (CI usually runs concurrently — branch
# and tag are pushed together) and fails unless every conclusion is
# success/skipped. No CI evidence at all also refuses (fail closed).
#
# One-time setup (already done for ghcr.io/gmrdad82/pito): set the package to
# PUBLIC in GitHub → Packages → Package settings, so self-hosters can
# `docker compose pull` without authenticating.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  # Lets the Slack notifier query this run's job/step conclusions.
  actions: read

env:
  IMAGE: ghcr.io/${{ github.repository }} # → ghcr.io/gmrdad82/pito

jobs:
  verify-ci:
    # THE GATE: block the build until the tagged commit is fully green.
    runs-on: ubuntu-latest
    steps:
      - name: Wait for green CI on the tagged commit
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          echo "Gating image build on CI for $SHA"
          deadline=$((SECONDS + 1800))    # 30 min for in-flight runs to finish
          evidence_deadline=$((SECONDS + 180)) # 3 min for runs to even appear
          while :; do
            runs=$(gh api "repos/$REPO/actions/runs?head_sha=$SHA&per_page=100"                      --jq '[.workflow_runs[] | select(.name != "Release (GHCR image)")]')
            total=$(jq 'length' <<<"$runs")
            pending=$(jq '[.[] | select(.status != "completed")] | length' <<<"$runs")
            bad=$(jq -r '[.[] | select(.status == "completed" and .conclusion != "success" and .conclusion != "skipped")]
                          | map("\(.name): \(.conclusion)") | join(", ")' <<<"$runs")

            if [ -n "$bad" ]; then
              # CI already posts its OWN failure message — mark the reason so
              # the refusal notify below stays silent (one message per event).
              echo "reason=ci-red" >> "$GITHUB_OUTPUT"
              echo "::error::CI is NOT green on $SHA — $bad. Refusing to build the image."
              exit 1
            fi
            if [ "$total" -eq 0 ]; then
              if [ "$SECONDS" -ge "$evidence_deadline" ]; then
                echo "reason=no-evidence" >> "$GITHUB_OUTPUT"
                echo "::error::No CI runs found for $SHA — refusing to build without CI evidence (fail closed)."
                exit 1
              fi
              echo "no CI runs registered yet for $SHA — waiting…"
            elif [ "$pending" -eq 0 ]; then
              echo "All $total workflow run(s) green on $SHA — proceeding with the build."
              exit 0
            else
              echo "waiting: $pending of $total run(s) still in progress…"
            fi
            if [ "$SECONDS" -ge "$deadline" ]; then
              echo "reason=timeout" >> "$GITHUB_OUTPUT"
              echo "::error::Timed out (30m) waiting for CI on $SHA."
              exit 1
            fi
            sleep 30
          done

      # Failure-only, and ONLY for refusal modes nothing else announces
      # (timeout / no CI evidence). A ci-red refusal stays silent here — CI
      # posts its own failure message, and the owner wants exactly ONE
      # notification per event (2026-07-02).
      - name: Checkout code
        if: failure() && steps.gate.outputs.reason != 'ci-red'
        uses: actions/checkout@v7

      - name: Notify Slack (release refused with no CI verdict)
        if: failure() && steps.gate.outputs.reason != 'ci-red'
        continue-on-error: true
        uses: ./.github/actions/slack-notify
        with:
          headline: ":no_entry: *Release refused — no green CI verdict for the tagged commit (${{ steps.gate.outputs.reason || 'unknown' }}). No image built.*"
          status: ${{ job.status }}
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          github-token: ${{ github.token }}

  build:
    # One job per architecture, each on a NATIVE runner (no emulation).
    needs: verify-ci
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Prepare platform pair
        # "linux/amd64" → "linux-amd64", used to namespace caches + artifacts.
        run: |
          platform="${{ matrix.platform }}"
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          # Bake the bare semver into the image so it self-reports its tag in the
          # mini-status (read at runtime via ENV PITO_VERSION). Both arches bake
          # the same tag.
          build-args: |
            PITO_VERSION=${{ steps.meta.outputs.version }}
          # Push a tagless, by-digest image per arch; the merge job tags them.
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=${{ env.PLATFORM_PAIR }}

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

      - name: Notify Slack (build failure)
        if: failure()
        continue-on-error: true
        uses: ./.github/actions/slack-notify
        with:
          status: ${{ job.status }}
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          github-token: ${{ github.token }}

  merge:
    # Stitch the per-arch digests into one multi-arch manifest and tag it.
    runs-on: ubuntu-latest
    needs: build
    steps:
      # The Slack notifier is a LOCAL composite action — without a checkout the
      # runner has no ./.github/actions/slack-notify and the notify step errors
      # (swallowed by continue-on-error: the v0.9.0 image notice was silently
      # lost exactly this way).
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            # 0.7.1 from a v0.7.1 tag push
            type=semver,pattern={{version}}
            # always publish :latest (release tag or manual dispatch)
            type=raw,value=latest

      - name: Create + push multi-arch manifest
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.IMAGE }}@sha256:%s ' *)

      - name: Inspect published manifest
        run: docker buildx imagetools inspect "${{ env.IMAGE }}:${{ steps.meta.outputs.version }}"

      - name: Notify Slack
        if: always()
        continue-on-error: true
        uses: ./.github/actions/slack-notify
        with:
          # Bold must not wrap the code span — Slack mrkdwn won't close a `*`
          # that directly follows a backtick, so `*…\`tag\`*` renders literal
          # asterisks (owner report, 1.0.0 G17).
          headline: ":package: *New image published* — `${{ env.IMAGE }}:${{ steps.meta.outputs.version }}`"
          extra: "Deploy it: `pito update`"
          status: ${{ job.status }}
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          github-token: ${{ github.token }}

  # Deployment is PULL-based — no deploy job, no SSH, no secrets here.
  # Servers run `pito autoupdate --install` (a 15-minute systemd timer that
  # checks for a newer release tag, verifies its image manifest is live on
  # GHCR, and applies it with the same flock-guarded `pito update` a human
  # would run). The owner-specified design (1.0.0 G26.10): a public repo
  # should hold zero deploy credentials.
