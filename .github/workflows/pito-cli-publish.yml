name: Publish pito CLI

# Publishes the `pito` Rust binary to GitHub Releases.
#
# Commit-message guard: include `[skipci]` (lowercase, no space) in the commit
# message to skip the publish run for that commit.
#
# Versioning model: the release tag is derived from the root `VERSION` file
# (`pito-v<VERSION>` — e.g. `pito-v0.0.1.beta3`) at workflow runtime, NOT
# from `extras/cli/Cargo.toml` and NOT from the commit SHA. This re-syncs
# the CLI release naming with the app's version cycle: a single `VERSION`
# bump fans out to the website deploy, the Rails CI re-validation, and this
# CLI release in one coordinated event. Pushing CLI source changes WITHOUT
# bumping `VERSION` does NOT publish — the safety-net workflow
# `pito-cli-ci.yml` builds + tests those commits without releasing. The next
# `VERSION` bump packages whatever the CLI source looks like at that moment.
#
# Path filter: fire on `VERSION` bumps or workflow self-edits ONLY. The
# `extras/cli/**` trigger that lived here previously was moved to
# `pito-cli-ci.yml` (build + test, no publish) so that day-to-day CLI work
# doesn't churn the release feed.

on:
  push:
    branches: [main]
    paths:
      # `VERSION` — the single source of truth for release naming. Every
      # bump produces a new tag/release (`pito-v<VERSION>`) and uploads the
      # freshly built binary as the release asset.
      - "VERSION"
      # Workflow self-edits must re-run so changes are validated.
      - ".github/workflows/pito-cli-publish.yml"

# Serialize publish runs per-ref so two close-together `VERSION` bumps don't
# race on tag creation / asset upload. `cancel-in-progress: false` keeps
# every bump publishable — we don't want a fast follow-up to drop the binary
# for the prior bump if both land in quick succession.
concurrency:
  group: pito-cli-publish-${{ github.ref }}
  cancel-in-progress: false

# `softprops/action-gh-release` needs `contents: write` to push the tag and
# upload the release asset. Everything else stays read-only.
permissions:
  contents: write

jobs:
  publish:
    if: "!contains(github.event.head_commit.message, '[skipci]')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Read app version from VERSION file
        id: version
        # Plain read of a checked-in file at the repo root — no untrusted
        # input flows into the shell. The release tag is `pito-v<VERSION>`
        # (e.g. `pito-v0.0.1.beta3`); the display name mirrors it.
        run: |
          APP_VERSION=$(tr -d '[:space:]' < VERSION)
          if [ -z "$APP_VERSION" ]; then
            echo "VERSION file is empty or missing" >&2
            exit 1
          fi
          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag_name=pito-v${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_name=pito v${APP_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build pito CLI (release)
        run: cargo build --release --manifest-path extras/cli/Cargo.toml

      - name: Run pito CLI test suite
        # Safety net before publishing: a failing test on the source that
        # would ship MUST block the release. The dedicated safety-net
        # workflow (`pito-cli-ci.yml`) runs the same gates on every CLI
        # source change; this duplicate run guarantees the published bits
        # are tested even if someone bypasses the safety net by only
        # bumping `VERSION`.
        run: cargo test --manifest-path extras/cli/Cargo.toml

      - name: Stage release artifact
        run: |
          mkdir -p dist
          cp target/release/pito dist/pito

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: ${{ steps.version.outputs.release_name }}
          files: dist/pito
          # When the tag already exists (re-run after a workflow edit, or
          # manual re-publish), update the existing release in place rather
          # than failing. The asset `pito` is re-uploaded, replacing the
          # prior binary at the same URL.
          make_latest: "true"
