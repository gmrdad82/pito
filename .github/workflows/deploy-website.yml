name: Deploy website

# Commit-message guard: include `[skipci]` (lowercase, no space) in the commit
# message to skip this deployment. `workflow_dispatch` runs have no
# `head_commit`, so manual triggers always proceed (the contains() returns
# false on a missing field).

on:
  push:
    branches: [main]
    paths:
      - "extras/website/**"
      - ".github/workflows/deploy-website.yml"
  workflow_dispatch:

jobs:
  deploy:
    if: "!contains(github.event.head_commit.message, '[skipci]')"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "extras/website/package-lock.json"

      - name: Install
        working-directory: extras/website
        run: npm ci

      - name: Build
        working-directory: extras/website
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy extras/website/dist --project-name=pito-website
