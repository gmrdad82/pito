name: Deploy website

# Deploys are reserved for deliberate VERSION-bump release events. Day-to-day
# content changes under `extras/website/**` fire the website CI workflow
# (`website-ci.yml`) for build / lint / audit safety, but do NOT deploy. The
# Cloudflare Pages publish only happens when `VERSION` changes (or when this
# workflow itself is self-edited, so trigger changes get validated), keeping
# website releases coordinated with the rest of the release surface.
#
# Commit-message guard: include `[skipci]` (lowercase, no space) in the commit
# message to skip this deployment. `workflow_dispatch` runs have no
# `head_commit`, so manual triggers always proceed (the contains() returns
# false on a missing field).

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy-website.yml"
      - "VERSION"
  workflow_dispatch:

jobs:
  deploy:
    if: "!contains(github.event.head_commit.message, '[skipci]')"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "extras/website/package-lock.json"

      - name: Install
        working-directory: extras/website
        run: npm ci

      - name: Build
        working-directory: extras/website
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy extras/website/dist --project-name=pito-website
