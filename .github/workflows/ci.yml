name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Minimum permissions for the workflow. `dorny/paths-filter@v3` calls
# `listFiles` on the pull-request, which requires `pull-requests: read`.
# Dependabot PRs run with a restricted GITHUB_TOKEN that defaults to
# `contents: read` only, so without this block the `changes` job fails with
# "Resource not accessible by integration". Granting the minimum needed:
# `contents: read` for checkout, `pull-requests: read` for paths-filter.
permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      rails: ${{ steps.filter.outputs.rails }}
      cli: ${{ steps.filter.outputs.cli }}
      website: ${{ steps.filter.outputs.website }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            rails:
              - 'app/**'
              - 'config/**'
              - 'db/**'
              - 'lib/**'
              - 'spec/**'
              - 'Gemfile'
              - 'Gemfile.lock'
              - 'bin/**'
              - 'Rakefile'
              - '.ruby-version'
            cli:
              - 'extras/cli/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            website:
              - 'extras/website/**'
            docs:
              - 'docs/**'
              - '**/*.md'

  rails:
    needs: changes
    if: needs.changes.outputs.rails == 'true'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_USER: pito
          POSTGRES_DB: pito_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U pito -d pito_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      RAILS_ENV: test
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      REDIS_URL: redis://127.0.0.1:6379/0
      RUBOCOP_CACHE_ROOT: tmp/rubocop

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system packages (ffmpeg, imagemagick, libvips)
        # ffmpeg / ffprobe — pito footage subcommand integration tests.
        # imagemagick — historical Active Storage variant pipeline.
        # libvips — image_processing gem auto-loads ruby-vips at first variant
        # generation (Game cover-art specs). Without libvips the Rails boot
        # path is fine but variant code raises at first use.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg imagemagick libvips42

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Prepare RuboCop cache
        uses: actions/cache@v4
        env:
          DEPENDENCIES_HASH: ${{ hashFiles('.ruby-version', '**/.rubocop.yml', '**/.rubocop_todo.yml', 'Gemfile.lock') }}
        with:
          path: ${{ env.RUBOCOP_CACHE_ROOT }}
          key: rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-${{ github.ref_name == github.event.repository.default_branch && github.run_id || 'default' }}
          restore-keys: |
            rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-

      - name: Lint code for consistent style
        run: bin/rubocop -f github

      - name: Scan for common Rails security vulnerabilities using static analysis
        run: bin/brakeman --no-pager

      - name: Scan for known security vulnerabilities in gems used
        run: bin/bundler-audit

      - name: Scan for security vulnerabilities in JavaScript dependencies
        run: bin/importmap audit

      - name: Set up database
        run: bin/rails db:create db:migrate db:seed

      - name: Set up parallel test databases
        # parallel_tests creates `pito_test`, `pito_test2`, ... one per CPU.
        # `parallel:create` is a no-op for the existing `pito_test` provisioned
        # by the previous step; `parallel:load_schema` populates each DB.
        run: bundle exec rake parallel:create parallel:load_schema

      - name: Run RSpec
        run: bundle exec parallel_rspec spec/

  cli:
    needs: changes
    if: needs.changes.outputs.cli == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extras/cli
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: cargo build
        run: cargo build --all-targets

      - name: cargo test
        run: cargo test

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo audit
        run: |
          cargo install --locked cargo-audit
          cargo audit

  website:
    needs: changes
    if: needs.changes.outputs.website == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check website markdown formatting
        run: npx --yes prettier@latest --check 'extras/website/**/*.md'

  docs:
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check markdown formatting
        run: npx --yes prettier@latest --check '**/*.md'
