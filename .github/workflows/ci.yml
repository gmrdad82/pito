name: CI

# Rails CI. Runs RSpec + Brakeman + bundler-audit + importmap audit + RuboCop
# against the Rails app at the repo root.
#
# Commit-message guard: include the literal token `[skipci]` (lowercase, no
# space — distinct from GitHub's built-in `[skip ci]`) in the commit message
# OR pull-request title to skip every job in this workflow. Applied per-job
# via top-level `if:` conditions; the other workflows under
# `.github/workflows/` carry the same guard.
#
# Trigger model: fire ONLY when something the Rails suite can break has
# changed, plus on every `VERSION` bump (version bumps are coordinated
# "release events" that re-validate every stack — Rails, CLI, website — to
# guarantee a green baseline before publishing). Path filter is exhaustive:
# everything Rails touches at runtime, plus the build/lint/test inputs that
# can change suite behavior. Files NOT listed (e.g. `extras/cli/**`,
# `extras/website/**`, `docs/**`, `Cargo.toml`, `Cargo.lock`, `Dockerfile`,
# `docker-compose.yml`, `mise.toml`, `HANDOFF.md`, `README.md`, `LICENSE`,
# `.editorconfig`, `.prettierrc.json`, `.gitignore`, `.gitattributes`,
# `.dockerignore`, `.env.example`, `Procfile.dev`) cannot affect the Rails
# CI run and are intentionally excluded so Rails CI stops firing on
# CLI / website / docs / infra-only commits.

on:
  pull_request:
    branches: [main]
    paths:
      # --- Application code -------------------------------------------------
      # `app/**` — every model, controller, view, component, helper, channel,
      # job, mailer, Stimulus controller. Core suite input.
      - "app/**"
      # `bin/**` — wrappers the CI invokes directly (`bin/rubocop`,
      # `bin/brakeman`, `bin/bundler-audit`, `bin/importmap`, `bin/rails`).
      # A change to any wrapper can break the workflow.
      - "bin/**"
      # `config/**` — Rails initializers, routes, environments, locales,
      # `database.yml`, `application.rb`, credentials wiring. Touches every
      # boot path.
      - "config/**"
      # `db/**` — migrations, `schema.rb`, seeds. RSpec runs `db:migrate
      # db:seed` and then `parallel:load_schema`, so any change here can
      # alter the test DB state.
      - "db/**"
      # `lib/**` — Rails-only library code autoloaded into the app.
      - "lib/**"
      # `spec/**` — the test suite itself. Trivially must trigger CI.
      - "spec/**"
      # --- Build / dependency manifests -------------------------------------
      # `Gemfile` + `Gemfile.lock` — gem set drift can break boot, suite,
      # bundler-audit, brakeman.
      - "Gemfile"
      - "Gemfile.lock"
      # `Rakefile` — defines `parallel:create` / `parallel:load_schema` and
      # other tasks the CI invokes.
      - "Rakefile"
      # `.ruby-version` — `ruby/setup-ruby@v1` reads this for the toolchain
      # pin. A version change must re-validate the whole suite.
      - ".ruby-version"
      # `mise.toml` — local Ruby pin parallel to `.ruby-version`; kept aligned
      # with it. Conservative: include so a divergent bump still triggers CI.
      - "mise.toml"
      # `.rspec` — controls how `rspec` boots (require spec_helper, tag
      # filters). CI overrides `.rspec` for the parallel run, but the file
      # still influences local-vs-CI parity diagnosis.
      - ".rspec"
      # `.rubocop.yml` (and any `.rubocop_todo.yml`) — lint config; a
      # widened rule can fail the `bin/rubocop` step.
      - ".rubocop.yml"
      - ".rubocop_todo.yml"
      # `config.ru` — Rack entrypoint; boot path.
      - "config.ru"
      # --- Self-reference ---------------------------------------------------
      # Editing the workflow itself must re-run it so changes are validated
      # before they go quiet.
      - ".github/workflows/ci.yml"
      # --- Coordinated release event ---------------------------------------
      # `VERSION` bumps fire the website deploy and CLI publish workflows;
      # re-validate Rails alongside them so a release lands on a known-green
      # baseline. The cost is one extra CI run per version bump.
      - "VERSION"
  push:
    branches: [main]
    paths:
      - "app/**"
      - "bin/**"
      - "config/**"
      - "db/**"
      - "lib/**"
      - "spec/**"
      - "Gemfile"
      - "Gemfile.lock"
      - "Rakefile"
      - ".ruby-version"
      - "mise.toml"
      - ".rspec"
      - ".rubocop.yml"
      - ".rubocop_todo.yml"
      - "config.ru"
      - ".github/workflows/ci.yml"
      - "VERSION"
  schedule:
    # Weekly bundler-audit run. Mondays 12:00 UTC — same cadence as the
    # cargo-audit cron in `pito-cli-ci.yml`. Gated on the `audit-only` job
    # below; the full `rails` suite stays scoped to push / pull_request.
    - cron: "0 12 * * 1"

permissions:
  contents: read

jobs:
  rails:
    if: |
      github.event_name != 'schedule' &&
      !contains(github.event.head_commit.message, '[skipci]') &&
      !contains(github.event.pull_request.title, '[skipci]')
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_USER: pito
          POSTGRES_DB: pito_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U pito -d pito_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      RAILS_ENV: test
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      REDIS_URL: redis://127.0.0.1:6379/0
      RUBOCOP_CACHE_ROOT: tmp/rubocop
      PARALLEL_TEST_PROCESSORS: "8"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system packages (ffmpeg, imagemagick, libvips)
        # ffmpeg / ffprobe — pito footage subcommand integration tests.
        # imagemagick — historical Active Storage variant pipeline.
        # libvips — image_processing gem auto-loads ruby-vips at first variant
        # generation (Game cover-art specs). Without libvips the Rails boot
        # path is fine but variant code raises at first use.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg imagemagick libvips42

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Prepare RuboCop cache
        uses: actions/cache@v4
        env:
          DEPENDENCIES_HASH: ${{ hashFiles('.ruby-version', '**/.rubocop.yml', '**/.rubocop_todo.yml', 'Gemfile.lock') }}
        with:
          path: ${{ env.RUBOCOP_CACHE_ROOT }}
          key: rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-${{ github.ref_name == github.event.repository.default_branch && github.run_id || 'default' }}
          restore-keys: |
            rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-

      - name: Lint code for consistent style
        run: bin/rubocop -f github

      - name: Scan for common Rails security vulnerabilities using static analysis
        run: bin/brakeman --no-pager

      - name: Scan for known security vulnerabilities in gems used
        run: bin/bundler-audit

      - name: Scan for security vulnerabilities in JavaScript dependencies
        run: bin/importmap audit

      - name: Set up database
        run: bin/rails db:create db:migrate db:seed

      - name: Set up parallel test databases
        # parallel_tests creates `pito_test`, `pito_test2`, ... one per CPU.
        # `parallel:create` is a no-op for the existing `pito_test` provisioned
        # by the previous step; `parallel:load_schema` populates each DB.
        run: bundle exec rake parallel:create parallel:load_schema

      - name: Run RSpec
        # Pass `--options /dev/null` to bypass the repo's `.rspec` file, which
        # locally excludes `type:system` specs via `--tag ~type:system` to keep
        # the default `bin/test` run fast. CI must run the FULL suite including
        # system specs, so we ignore `.rspec` entirely and re-add the only flag
        # it carried (`--require spec_helper`) explicitly.
        #
        # Use `--test-options` (not `--`) because `bundle exec` consumes a
        # bare `--` separator, which would leave parallel_tests trying to
        # `File.stat("--options")` as if it were a spec path.
        run: bundle exec parallel_rspec spec/ --test-options "--options /dev/null --require spec_helper"

  audit-only:
    # Weekly bundler-audit-only run, fired by the `schedule:` trigger above.
    # Mirrors the cargo-audit cron in `pito-cli-ci.yml`. Does NOT run RSpec,
    # Brakeman, RuboCop, or importmap audit — just `bin/bundler-audit` against
    # the locked gem set, so a newly-disclosed advisory raises a red weekly
    # run even when nothing in the Rails tree changes.
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Scan for known security vulnerabilities in gems used
        run: bin/bundler-audit
