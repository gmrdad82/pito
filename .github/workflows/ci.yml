name: CI

# Rails CI. Runs RSpec + Brakeman + bundler-audit + importmap audit + RuboCop
# against the Rails app at the repo root.
#
# Commit-message guard: include the literal token `[skipci]` (lowercase, no
# space — distinct from GitHub's built-in `[skip ci]`) in the commit message
# OR pull-request title to skip every job in this workflow. Applied per-job
# via top-level `if:` conditions; the other workflows under
# `.github/workflows/` carry the same guard.
#
# Trigger model: fire ONLY when something the Rails suite (or the compose
# config validation in the `compose` job below) can break has changed. Path
# filter is exhaustive: everything Rails touches at runtime, plus the
# build/lint/test inputs that can change suite behavior, plus both compose
# stacks. Files NOT listed (e.g. `docs/**`, `Dockerfile`, `mise.toml`,
# `HANDOFF.md`, `README.md`, `LICENSE`, `.editorconfig`, `.prettierrc.json`,
# `.gitignore`, `.gitattributes`, `.dockerignore`, `.env.example`,
# `Procfile.dev`) cannot affect the Rails CI run or the compose config and
# are intentionally excluded so CI stops firing on docs / infra-only
# commits.

on:
  pull_request:
    branches: [main]
    paths:
      # --- Application code -------------------------------------------------
      # `app/**` — every model, controller, view, component, helper, channel,
      # job, mailer, Stimulus controller. Core suite input.
      - "app/**"
      # `bin/**` — wrappers the CI invokes directly (`bin/rubocop`,
      # `bin/brakeman`, `bin/bundler-audit`, `bin/importmap`, `bin/rails`).
      # A change to any wrapper can break the workflow.
      - "bin/**"
      # `script/**` — install/update shell scripts; shellchecked by the `scripts` job.
      - "script/**"
      # `config/**` — Rails initializers, routes, environments, locales,
      # `database.yml`, `application.rb`, credentials wiring. Touches every
      # boot path.
      - "config/**"
      # `db/**` — migrations, `schema.rb`, seeds. RSpec runs `db:migrate
      # db:seed` and then `parallel:load_schema`, so any change here can
      # alter the test DB state.
      - "db/**"
      # `lib/**` — Rails-only library code autoloaded into the app.
      - "lib/**"
      # `spec/**` — the test suite itself. Trivially must trigger CI.
      - "spec/**"
      # --- Build / dependency manifests -------------------------------------
      # `Gemfile` + `Gemfile.lock` — gem set drift can break boot, suite,
      # bundler-audit, brakeman.
      - "Gemfile"
      - "Gemfile.lock"
      # `Rakefile` — defines `parallel:create` / `parallel:load_schema` and
      # other tasks the CI invokes.
      - "Rakefile"
      # `.ruby-version` — `ruby/setup-ruby@v1` reads this for the toolchain
      # pin. A version change must re-validate the whole suite.
      - ".ruby-version"
      # `mise.toml` — local Ruby pin parallel to `.ruby-version`; kept aligned
      # with it. Conservative: include so a divergent bump still triggers CI.
      - "mise.toml"
      # `.rspec` — controls how `rspec` boots (require spec_helper, tag
      # filters). CI overrides `.rspec` for the parallel run, but the file
      # still influences local-vs-CI parity diagnosis.
      - ".rspec"
      # `.rubocop.yml` (and any `.rubocop_todo.yml`) — lint config; a
      # widened rule can fail the `bin/rubocop` step.
      - ".rubocop.yml"
      - ".rubocop_todo.yml"
      # `config.ru` — Rack entrypoint; boot path.
      - "config.ru"
      # --- Infra --------------------------------------------------------
      # `docker-compose.yml` / `docker-compose.dev.yml` — the prod / dev
      # compose stacks (the 3.0.0 flagship deliverable). Validated by the
      # `compose` job's `docker compose config -q` steps below.
      - "docker-compose.yml"
      - "docker-compose.dev.yml"
      # --- Self-reference ---------------------------------------------------
      # Editing the workflow itself must re-run it so changes are validated
      # before they go quiet.
      - ".github/workflows/ci.yml"
      # Composite actions the workflow invokes (e.g. the Slack notifier).
      # Not under `workflows/`, so it needs its own entry or edits go quiet.
      - ".github/actions/**"
  push:
    branches: [main]
    paths:
      - "app/**"
      - "bin/**"
      - "script/**"
      - "config/**"
      - "db/**"
      - "lib/**"
      - "spec/**"
      - "Gemfile"
      - "Gemfile.lock"
      - "Rakefile"
      - ".ruby-version"
      - "mise.toml"
      - ".rspec"
      - ".rubocop.yml"
      - ".rubocop_todo.yml"
      - "config.ru"
      - "docker-compose.yml"
      - "docker-compose.dev.yml"
      - ".github/workflows/ci.yml"
      - ".github/actions/**"
  schedule:
    # Weekly bundler-audit run. Mondays 12:00 UTC. Gated on the `audit-only`
    # job below; the full `rails` suite stays scoped to push / pull_request.
    - cron: "0 12 * * 1"

permissions:
  contents: read
  # `actions: read` lets the Slack notifier query this run's job/step
  # conclusions to name the step that failed.
  actions: read

jobs:
  rails:
    if: |
      github.event_name != 'schedule' &&
      !contains(github.event.head_commit.message, '[skipci]') &&
      !contains(github.event.pull_request.title, '[skipci]')
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_USER: pito
          POSTGRES_DB: pito_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U pito -d pito_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
      # AI sidecars (OWNER Q58, 3.7.1) — same pinned llama.cpp digest and
      # -hf model choices as docker-compose.dev.yml's `embedder` / `nlmapper`
      # services, so spec/lib/pito/nl/calibration_spec.rb and
      # spec/lib/pito/nl/mapper_calibration_spec.rb stop skipping (their
      # `calibration_available?` / `mapper_available?` guards) and actually
      # run here, in this same blocking job.
      #
      # No `command:`: the workflow `services:` schema exposes only
      # image/env/ports/volumes/options — there is no field to append CLI
      # args after the image the way docker-compose's `command:` does. The
      # docker-compose CLI flags are re-expressed as llama-server's own
      # `LLAMA_ARG_*` env-var equivalents instead (confirmed locally against
      # this exact digest: `-hf user/repo[:quant]` -> LLAMA_ARG_HF_REPO
      # including the colon-quant suffix, `--embeddings` ->
      # LLAMA_ARG_EMBEDDINGS, `--host`/`--port` -> LLAMA_ARG_HOST /
      # LLAMA_ARG_PORT, `--ctx-size` -> LLAMA_ARG_CTX_SIZE — booting
      # identically to the CLI-arg form used in dev, not the router/lazy-load
      # mode the image falls into with zero model args). The image ships its
      # own HEALTHCHECK baked in, but it always polls port 8080 (llama.cpp's
      # own default) regardless of our --port override, so `options:` below
      # replaces it with the same `/health` probe docker-compose.dev.yml
      # polls, pointed at the real port.
      #
      # No cache: GitHub starts service containers before the job's first
      # step runs (including any `actions/cache` restore step), so there is
      # no point on the job timeline where a cache could be warmed before the
      # sidecar's own boot-time Hugging Face download begins — caching a
      # `services:` container this way is not cleanly possible without
      # replacing the service with hand-rolled `docker run` steps, which
      # trades this file's simplicity for that. Documenting the cost instead:
      # a cold pull + load of embeddinggemma-300m-qat-q8_0 (~300MB) measured
      # at ~30s end-to-end against a warm connection on this exact pinned
      # digest (Qwen3-0.6B-GGUF:Q8_0 measured ~31s the same way); a runner's
      # link to Hugging Face may be slower, so `--health-start-period` below
      # mirrors docker-compose.dev.yml's own existing `start_period: 10m` for
      # the same image/model rather than the measured figure. Both sidecars
      # download in parallel, so the wall-clock cost added to the job is one
      # download's worth, not the sum of both.
      embedder:
        image: ghcr.io/ggml-org/llama.cpp@sha256:6bc9134e3278a0ecab23d7ef2f6a46b4595740014fe9bc2f67e8ba7dca8395b4
        env:
          LLAMA_ARG_HF_REPO: ggml-org/embeddinggemma-300m-qat-q8_0-GGUF
          LLAMA_ARG_EMBEDDINGS: "1"
          LLAMA_ARG_HOST: 0.0.0.0
          LLAMA_ARG_PORT: "8081"
        ports:
          - 8081:8081
        options: >-
          --health-cmd="curl -sf http://localhost:8081/health"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=10m
      nlmapper:
        image: ghcr.io/ggml-org/llama.cpp@sha256:6bc9134e3278a0ecab23d7ef2f6a46b4595740014fe9bc2f67e8ba7dca8395b4
        env:
          LLAMA_ARG_HF_REPO: "Qwen/Qwen3-0.6B-GGUF:Q8_0"
          LLAMA_ARG_HOST: 0.0.0.0
          LLAMA_ARG_PORT: "8082"
          LLAMA_ARG_CTX_SIZE: "2048"
        ports:
          - 8082:8082
        options: >-
          --health-cmd="curl -sf http://localhost:8082/health"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=10m

    env:
      RAILS_ENV: test
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      REDIS_URL: redis://127.0.0.1:6379/0
      RUBOCOP_CACHE_ROOT: tmp/rubocop
      PARALLEL_TEST_PROCESSORS: "8"
      # PITO_EMBEDDER_URL / PITO_NLMAPPER_URL are deliberately NOT exported
      # here at job level (REPAIR, 3.7.1). A prior version of this job did
      # export them job-wide with a comment claiming only the calibration
      # specs' ENV-stubbing specs were affected; a verifier proved that false
      # by replication: WebMock's `allow_localhost: true` (spec/rails_helper.rb)
      # lets ANY unstubbed guard path in the suite reach the live sidecars on
      # 127.0.0.1 once the vars are set process-wide, not just the two
      # calibration files — e.g. spec/requests/chat_spec.rb's no-verb-context
      # example live-routed through Pito::Nl::Router inside ChatDispatchJob,
      # and EventEmbedJob live-embedded every request spec's events. Worse,
      # Pito::Nl::Router#sync!'s self-heal (`sync! unless embedded.exists?`,
      # lib/pito/nl/router.rb) then re-embedded the FULL tools.yml
      # nl_examples corpus (303 entries) on every example that reached the
      # unknown-gate, because transactional fixtures roll `nl_examples` back
      # after each example — multiplicatively expensive across parallel_rspec's
      # 8 processes below. The two vars are exported ONLY on the dedicated
      # "Run NL calibration specs" step further down, scoped to just those two
      # spec files — see that step's comment. Every other spec in the suite
      # (including the "Run RSpec" step's full parallel_rspec fan-out) keeps
      # seeing them blank, which is how the rest of the suite already detects
      # "sidecar not configured" and skips or no-ops (Game::EmbeddingIndexer,
      # Video::EmbeddingIndexer, Pito::Embedding::EventIndexer,
      # Pito::Nl::CompletionClient, EventEmbedJob) — those specs stub ENV
      # directly so this does not change their behavior either way, and
      # spec/lib/pito/nl/mapper_spec.rb's header comment already documents
      # staying deterministic "even when a real PITO_EMBEDDER_URL is exported
      # in the shell".

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install system packages (ffmpeg, imagemagick, libvips)
        # ffmpeg / ffprobe — pito footage subcommand integration tests.
        # imagemagick — historical Active Storage variant pipeline.
        # libvips — image_processing gem auto-loads ruby-vips at first variant
        # generation (Game cover-art specs). Without libvips the Rails boot
        # path is fine but variant code raises at first use.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg imagemagick libvips42

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Prepare RuboCop cache
        uses: actions/cache@v4
        env:
          DEPENDENCIES_HASH: ${{ hashFiles('.ruby-version', '**/.rubocop.yml', '**/.rubocop_todo.yml', 'Gemfile.lock') }}
        with:
          path: ${{ env.RUBOCOP_CACHE_ROOT }}
          key: rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-${{ github.ref_name == github.event.repository.default_branch && github.run_id || 'default' }}
          restore-keys: |
            rubocop-${{ runner.os }}-${{ env.DEPENDENCIES_HASH }}-

      - name: Lint code for consistent style
        run: bin/rubocop -f github

      - name: Scan for common Rails security vulnerabilities using static analysis
        run: bin/brakeman --no-pager

      - name: Scan for known security vulnerabilities in gems used
        run: bin/bundler-audit

      - name: Scan for security vulnerabilities in JavaScript dependencies
        run: bin/importmap audit

      - name: Audit the pito.copy.* dictionary
        # Pure I18n-tree walk (lib/pito/copy/audit.rb) — no ActiveRecord
        # calls, so it runs before the database exists.
        run: bundle exec rake pito:copy:audit

      - name: Set up database
        run: bin/rails db:setup

      - name: Build Tailwind CSS
        run: bundle exec rails tailwindcss:build

      - name: Set up parallel test databases
        # parallel_tests creates `pito_test`, `pito_test2`, ... one per CPU.
        # `parallel:create` is a no-op for the existing `pito_test` provisioned
        # by the previous step; `parallel:load_schema` populates each DB.
        run: bundle exec rake parallel:create parallel:load_schema

      - name: Run RSpec
        # Pass `--options /dev/null` to bypass the repo's `.rspec` file, which
        # locally excludes `type:system` specs via `--tag ~type:system` to keep
        # the default `bin/test` run fast. CI must run the FULL suite including
        # system specs, so we ignore `.rspec` entirely and re-add the only flag
        # it carried (`--require spec_helper`) explicitly.
        #
        # Use `--test-options` (not `--`) because `bundle exec` consumes a
        # bare `--` separator, which would leave parallel_tests trying to
        # `File.stat("--options")` as if it were a spec path.
        run: bundle exec parallel_rspec spec/ --test-options "--options /dev/null --require spec_helper"

      - name: Run NL calibration specs (live sidecars)
        # Split out of the "Run RSpec" step above on purpose (REPAIR, 3.7.1;
        # see the job-level `env:` comment for the full incident). Two
        # deliberate differences from that step:
        #
        # 1. PITO_EMBEDDER_URL / PITO_NLMAPPER_URL are set in THIS step's own
        #    `env:` only, not job-wide, so the parallel_rspec run above never
        #    sees them and every other spec's sidecar-blank guard stays on
        #    its deterministic no-op branch.
        # 2. Plain `bundle exec rspec`, not `parallel_rspec`: both files
        #    self-isolate via before(:all)/after(:all) — Pito::Nl::Router.sync!
        #    once per file (outside the per-example transactional rollback)
        #    and an after(:all) `Example.delete_all` cleanup, see
        #    spec/lib/pito/nl/calibration_spec.rb's own header comment —
        #    rather than per-example fixtures, so parallelizing them buys
        #    nothing and would only multiply live HTTP calls across workers.
        #    Running after "Run RSpec" (steps in a job are sequential, never
        #    concurrent) also means these two live-model files never compete
        #    with parallel_rspec's 8-way fan-out for CPU against
        #    Pito::Nl::CompletionClient's READ_TIMEOUT_SECONDS = 30
        #    (app/services/pito/nl/completion_client.rb).
        #
        # Mirrors the exact local invocation documented in both files'
        # header comments, just with both sidecars' vars set together since
        # the mapper gate needs both.
        env:
          PITO_EMBEDDER_URL: http://127.0.0.1:8081
          PITO_NLMAPPER_URL: http://127.0.0.1:8082
        run: bundle exec rspec spec/lib/pito/nl/calibration_spec.rb spec/lib/pito/nl/mapper_calibration_spec.rb

      - name: Enforce the coverage floor
        # SimpleCov recorded per-process slices during parallel_rspec (the CI
        # env turns it on in spec_helper); this collates the merged resultset
        # and fails the job below the floor — see lib/tasks/coverage.rake.
        # Enforced HERE and not per-process because each parallel group only
        # executes a slice of the suite.
        run: bundle exec rake coverage:floor

      # The `rails` job is the single green "heartbeat": it pings on success too
      # (one all-clear per push). Every OTHER notify across the workflows is
      # failure-only, so green pushes produce exactly ONE Slack message.
      - name: Notify Slack
        if: always()
        continue-on-error: true
        uses: ./.github/actions/slack-notify
        with:
          status: ${{ job.status }}
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          github-token: ${{ github.token }}

  audit-only:
    # Weekly bundler-audit-only run, fired by the `schedule:` trigger above.
    # Does NOT run RSpec, Brakeman, RuboCop, or importmap audit — just
    # `bin/bundler-audit` against the locked gem set, so a newly-disclosed
    # advisory raises a red weekly run even when nothing in the Rails tree
    # changes.
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Scan for known security vulnerabilities in gems used
        run: bin/bundler-audit

      - name: Notify Slack
        if: failure()
        continue-on-error: true
        uses: ./.github/actions/slack-notify
        with:
          status: ${{ job.status }}
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          github-token: ${{ github.token }}

  scripts:
    # Lint the project's shell scripts (the pito operator CLI, dev/test
    # wrappers, and the install/update scripts). shellcheck is preinstalled on
    # ubuntu-latest. Runs on pull_request/push, not the weekly schedule.
    if: |
      github.event_name != 'schedule' &&
      !contains(github.event.head_commit.message, '[skipci]') &&
      !contains(github.event.pull_request.title, '[skipci]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: shellcheck + sh -n
        run: |
          for f in bin/pito bin/boot bin/dev bin/test bin/test-prepare script/install.sh script/update.sh script/deploy-flip.sh; do
            echo "== $f =="
            sh -n "$f" || bash -n "$f"
            shellcheck -S warning "$f"
          done

      - name: Notify Slack
        if: failure()
        continue-on-error: true
        uses: ./.github/actions/slack-notify
        with:
          status: ${{ job.status }}
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          github-token: ${{ github.token }}

  compose:
    # Validates both compose stacks parse + interpolate cleanly. The 3.0.0
    # flagship deliverable (docker-compose.yml / docker-compose.dev.yml) had
    # zero CI coverage before this — `paths:` above now includes both files.
    # `docker compose` ships preinstalled on ubuntu-latest; no setup step
    # needed. Runs on pull_request/push, not the weekly schedule.
    if: |
      github.event_name != 'schedule' &&
      !contains(github.event.head_commit.message, '[skipci]') &&
      !contains(github.event.pull_request.title, '[skipci]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Validate docker-compose.yml
        run: docker compose -f docker-compose.yml config -q

      - name: Validate docker-compose.dev.yml
        run: docker compose -f docker-compose.dev.yml config -q

      - name: Notify Slack
        if: failure()
        continue-on-error: true
        uses: ./.github/actions/slack-notify
        with:
          status: ${{ job.status }}
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          github-token: ${{ github.token }}
