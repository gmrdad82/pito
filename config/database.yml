# Pool sizing rule: at least the Web Puma thread count (config/puma.rb), with
# headroom for SolidQueue's in-process worker. Tune via RAILS_MAX_THREADS.
default: &default
  adapter: postgresql
  encoding: unicode
  host: <%= ENV.fetch("POSTGRES_HOST", "127.0.0.1") %>
  port: <%= ENV.fetch("POSTGRES_PORT", 54327).to_i %>
  pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5).to_i %>

development:
  <<: *default
  database: <%= Rails.application.credentials.dig(:postgres, :development, :database) || "pito_development" %>
  username: <%= Rails.application.credentials.dig(:postgres, :development, :username) || "pito" %>
  password: <%= Rails.application.credentials.dig(:postgres, :development, :password) || "" %>

test:
  <<: *default
  # parallel_tests appends TEST_ENV_NUMBER ("", "2", "3", ...) to suffix per-process
  # databases (`pito_test`, `pito_test_2`, ...). Single-process `bundle exec rspec`
  # leaves TEST_ENV_NUMBER unset and therefore lands on the unsuffixed db.
  database: <%= (Rails.application.credentials.dig(:postgres, :test, :database) || "pito_test") + ENV.fetch("TEST_ENV_NUMBER", "") %>
  username: <%= Rails.application.credentials.dig(:postgres, :test, :username) || "pito" %>
  password: <%= Rails.application.credentials.dig(:postgres, :test, :password) || "" %>

production:
  primary: &production
    <<: *default
    database: <%= Rails.application.credentials.dig(:postgres, :production, :database) %>
    username: <%= Rails.application.credentials.dig(:postgres, :production, :username) %>
    password: <%= Rails.application.credentials.dig(:postgres, :production, :password) %>
  # SolidCache, SolidQueue, SolidCable all share the same physical database.
  # database_tasks: false tells Rails to skip create/migrate/drop for these roles
  # (the primary manages the schema for all of them).
  cache:
    <<: *production
    database_tasks: false
  queue:
    <<: *production
    database_tasks: false
  cable:
    <<: *production
    database_tasks: false
