default: &default
  adapter: mysql2
  encoding: utf8mb4
  collation: utf8mb4_unicode_ci
  charset: utf8mb4
  host: <%= ENV.fetch("MYSQL_HOST", "127.0.0.1") %>
  port: <%= ENV.fetch("MYSQL_PORT", 3306).to_i %>
  pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5).to_i %>
  variables:
    sql_mode: STRICT_ALL_TABLES

development:
  <<: *default
  database: <%= Rails.application.credentials.dig(:mysql, :development, :database) || "pito_development" %>
  username: <%= Rails.application.credentials.dig(:mysql, :development, :username) || "root" %>
  password: <%= Rails.application.credentials.dig(:mysql, :development, :password) || "" %>

test:
  <<: *default
  database: <%= Rails.application.credentials.dig(:mysql, :test, :database) || "pito_test" %>
  username: <%= Rails.application.credentials.dig(:mysql, :test, :username) || "root" %>
  password: <%= Rails.application.credentials.dig(:mysql, :test, :password) || "" %>

production:
  <<: *default
  database: <%= Rails.application.credentials.dig(:mysql, :production, :database) %>
  username: <%= Rails.application.credentials.dig(:mysql, :production, :username) %>
  password: <%= Rails.application.credentials.dig(:mysql, :production, :password) %>
