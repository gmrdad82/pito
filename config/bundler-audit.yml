  # as a dependency of ferrum (the dev-only capture rig) and webmock (test-only);
  # pito serves via Puma and never starts WEBrick — zero production exposure.
  # No patched webrick exists yet. DROP THIS when webrick > 1.9.2 ships
  # (owner-approved unblock, 2026-07-06).
  - CVE-2026-38969
