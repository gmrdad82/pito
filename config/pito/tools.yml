# Tool ontology — the config-driven dispatch system (was verbs.yml pre-2.0).
schema_version: 1

# Universal reply actions offered on followupable events (Share::UniversalActions).
# share:  withheld on :confirmation kind + unresolved messages;
# revoke: additionally gated on a Share record existing for the event.
# `help` is NOT a reply tool — the `--help` FLAG on replies/tools is a separate
# surface and stays.
#
# HOW TO remove share/unshare|revoke from a tool's messages:
#   Add `universal_reply: false` to that tool's entry below (top level, next to
#   `auth:`). Every message that tool emits then gets NO share/unshare|revoke —
#   no reply handle minted just for them, no palette suggestions, and a typed
#   `#handle share` is refused. The tool's OWN reply actions are unaffected.
#   Worked example: the `sync` tool below. Universal actions never override a
#   tool's own declarations: a reply token the target declares itself always
#   routes to the tool, not to the universal set.
universal_reply:
  share:  { mode: append, kinds: [system, enhanced, system_follow_up, enhanced_follow_up, ai] }
  revoke: { mode: append, aliases: [unshare], kinds: [system, enhanced, system_follow_up, enhanced_follow_up, ai] }

# Static + dynamic vocabulary declarations. Faithful transcription of
# lib/pito/grammar/vocabularies.rb — implementations remain in Ruby.
vocabularies:
  nouns:
    members: [channels, vids, games]
    synonyms: {channel: channels, video: vids, videos: vids, vid: vids, game: games, gamez: games}
  slash_tools:
    members: [config, disconnect, help, themes]
  config_providers:
    # AI config has exactly ONE slash surface: `/config ai` (+ kwargs). The
    # per-provider names deliberately do NOT appear here — no spillage.
    members: [ai, tavily, google, igdb, webhook, sound, timezone]
  config_keys:
    members: [client_id, client_secret, redirect_uri, api_key, slack, discord, model]
  genres:
    # ONE vocab for find slots, the chat list filter, --help and MCP (v1.6
    # unification — GameListFilter's private alias maps derive from here).
    # Members mirror the IGDB genres the library actually carries; the
    # member→match-substring behavior stays in Ruby (GameListFilter).
    members: [Shooter, Simulation, RPG, Racing, Strategy, Sports, Puzzle, Platformer,
              Fighting, Adventure, Action, Indie, "Hack and slash"]
    synonyms: {fps: Shooter, shooter: Shooter, sim: Simulation, simulation: Simulation,
               rpg: RPG, "role-playing": RPG, racing: Racing, strategy: Strategy,
               sports: Sports, sport: Sports, puzzle: Puzzle, platformer: Platformer,
               platform: Platformer, fighting: Fighting, adventure: Adventure,
               hack: "Hack and slash", beat: "Hack and slash",
               "hack-and-slash": "Hack and slash"}
  platforms:
    # "Xbox" (the bare family) is a deliberate member: as an ILIKE substring it
    # matches One / Series X / Series S / the combined "Series X|S" — so plain
    # `xbox` tracks the whole family (Series S too, not only X).
    # PlayStation / Xbox Series / Nintendo / Mobile are family members for the
    # same reason: chat `ps`/`playstation`/`sony` cover PS4+PS5, `mobile` covers
    # iOS+Android (v1.6 unification with the chat list filter; Arcade stays
    # dropped).
    members: ["PlayStation 5", "Nintendo Switch", PC, Xbox, "Xbox Series X",
              "Xbox Series S", "PlayStation 4", "Xbox One", iOS, Android,
              PlayStation, "Xbox Series", Nintendo, Mobile]
    synonyms: {ps5: "PlayStation 5", ps4: "PlayStation 4", playstation: PlayStation,
               ps: PlayStation, psn: PlayStation, sony: PlayStation, switch: "Nintendo Switch",
               nintendo: Nintendo, steam: PC, pc: PC, windows: PC,
               xbox: Xbox, microsoft: Xbox, xsx: "Xbox Series X",
               "series x": "Xbox Series X", xss: "Xbox Series S",
               "series s": "Xbox Series S", xbs: "Xbox Series",
               xb1: "Xbox One", xbone: "Xbox One",
               iphone: iOS, ipad: iOS, mobile: Mobile}
  release_status:
    members: [released, upcoming, tba]
    synonyms: {unreleased: upcoming, "to be announced": tba, tbd: tba}
  metrics:
    members: [subs, views, ctr, "watch time"]
    synonyms: {subscriber: subs, subscribers: subs, "watched hours": "watch time", hours: "watch time"}
    fillers: [count, ratio]
  on_off:
    # QUOTED — YAML 1.1 coerces bare on/off/yes/no to booleans.
    members: ["on", "off"]
    synonyms: {"true": "on", "false": "off", enable: "on", disable: "off", "yes": "on", "no": "off",
               enabled: "on", disabled: "off"}
  hashtag_tools:
    members: [with, without]
    synonyms: {drop: without, delete: without, include: with}
  fillers:
    members: []
    fillers: [the, a, an, games, game, please, by, ordered, sorted, show, me]
  connectives:
    members: [and, for]
  games_subcommands:
    members: [import]
  jobs_subcommands:
    members: [status, requeue, run, pause, resume]
  import_nouns:
    members: [game]
    synonyms: {games: game}
  sync_targets:
    members: [channels, vids]
    synonyms: {channel: channels, video: vids, videos: vids, vid: vids}
  schedule_whens:
    members: [slate]
  price_subcommands:
    members: [set, unset]
  platform_subcommands:
    members: [set, unset]
  visit_destinations:
    members: [channel, studio]
    synonyms: {youtube: channel, yt: channel}
  update_nouns:
    members: [game, vid]
    synonyms: {games: game, video: vid, videos: vid, vids: vid}
  update_fields:
    members: [footage, price, platform, description, tags]
  full_flag:
    members: [full]
  show_segments:
    members: ["at-a-glance", channels, detail, game, games, similar, videos]
    synonyms: {similars: similar, vids: videos, "linked-vids": videos}
  analyze_segments:
    members: [numbers, breakdowns]
  search_nouns:
    members: [games, conversations, vids]
    synonyms: {game: games, conversation: conversations, vid: vids, video: vids, videos: vids}
  # Dynamic vocabularies — resolved at runtime via Grammar::Vocabulary resolver lambdas.
  channels:      { resolver: channels }
  conversations: { resolver: conversations }
  game_titles:   { resolver: game_titles }
  video_titles:  { resolver: video_titles }

# NL mapper knobs (3.0.0, Fable-authored) — one ontology, three consumers:
# the router reads thresholds + synonyms; the GBNF mapper retrieval-picks
# the nearest exemplars for its few-shot prompt; the calibration suite
# (spec/fixtures/nl_calibration.yml) measures the thresholds empirically —
# these starting values hold only until that suite pins better ones.
nl:
  # Measured 2026-07-15 against the live sidecar (see the calibration corpus):
  # held-out positives scored 0.71-0.92; short-text noise floors at 0.67-0.73
  # ("asdfghjkl" 0.67, "do the thing" 0.73); the worst wrong-tool hit was 0.88
  # (a write tool — the gate never auto-runs those anyway). auto_run keeps the
  # 0.917 true paraphrase and excludes every measured wrong-tool; suggest
  # rejects all measured noise at the cost of one 0.71 positive the corpus
  # will grow to cover. The calibration suite re-measures on every change.
  thresholds: { auto_run: 0.90, suggest: 0.75 }
  # Lexical snapping BEFORE embedding — the cheap normalization pass.
  synonyms:
    clips: vids
    films: vids
    collection: library
    catalogue: library
    catalog: library
    subscriptions: subs
    achievements: shinies
    milestones: shinies
    trophies: shinies
    recommendations: similar
    lookalikes: similar
    remove: delete
    erase: delete
  # Worked examples for the mapper's few-shot prompt — HARD cases on
  # purpose: numeral-bearing titles, number words, filler-heavy phrasing,
  # multi-slot composition. Disjoint from every tool's nl_examples (the
  # router's neighbors) and from the calibration corpus (the held-out
  # test set) — three sets, three jobs.
  exemplars:
    - { say: "could you please show me everything in my games library", run: "ls games" }
    - { say: "hey pito can you list only the rpg ones", run: "ls rpg games" }
    - { say: "show game twelve", run: "show game 12" }
    - { say: "similar stuff to game forty two", run: "similar 42" }
    - { say: "is there anything like tekken 8 in my library", run: "search games like tekken 8" }
    - { say: "exact matches for games named tekken", run: "search games for tekken" }
    - { say: "search my chats for that time we talked about mortal kombat 2", run: "search conversations for mortal kombat 2" }
    - { say: "what did we decide about thumbnails last month", run: "search conversations for thumbnails" }
    - { say: "link that new vid 14 to elden ring which is game 3", run: "link 14 3" }
    - { say: "unhook vid 9 from whatever game it's on", run: "unlink 9" }
    - { say: "how many hours did I sink into game 8? set it to 12", run: "update game footage 8 12" }
    - { say: "make game 5 cost 19.99", run: "update game price 5 19.99" }
    - { say: "game 7 also runs on the switch", run: "platform set 7 switch" }
    - { say: "take ps5 off game 7", run: "platform unset 7 ps5" }
    - { say: "queue vid 3 to go live saturday", run: "schedule 3 saturday" }
    - { say: "get vid eleven off youtube's public listing", run: "unlist 11" }
    - { say: "the analytics for the last week on vid 4", run: "analyze vid 4" }
    - { say: "give me the lifetime spread for game 2", run: "breakdowns game 2" }
    - { say: "vids for my main channel please", run: "videos" }
    - { say: "who publishes game 3?", run: "channels 3" }
    - { say: "bring hades 2 in from igdb", run: "import game hades 2" }
    - { say: "pull the freshest data for my vids from youtube", run: "sync vids" }
    - { say: "how close am I to my next subs shiny", run: "shinies" }

tools:
  # ─── Chat tools ──────────────────────────────────────────────────────────────

  list:
    # Aliases sourced from lib/pito/grammar/specs.rb — :list spec, aliases: [:ls]
    aliases: [ls]
    description: pito.grammar.chat.list
    nl_examples:
      - "list me the vids"
      - "show me my games"
      - "what's in my library?"
      - "what rpg games do I have?"
      - "list all my channels"
      - "show me everything I've got"
      - "can you list my videos"
      - "what games do I own?"
      - "gimme the game list"
      - "what vids are there?"
      - "list some shooters"
      - "show me my platformer games"
      - "any racing games in the library?"
      - "list all my fighting games"
    mcp:
      tool: pito_list
      read_only: true
      description: "List your library — games, vids (videos), or channels — for browsing/filtering, not single-entity detail (use pito_show for one item). Prefer this over repeated pito_show calls: append extra `columns`, restrict with `filter`, and `sort` in ONE call — the valid values for each are enumerated per-noun in the param descriptions. `ids` restricts to specific numeric ids. E.g. \"what rpg games do I have?\" → \"list games rpg\"; \"list all my channels\" → \"list channels\"; \"show me my platformer games\" → \"list games platformer\"."
      params:
        noun:    { type: string, enum: [games, vids, channels], required: true, hint: "what to list" }
        columns: { type: array,  items: string, required: false, capability: columns, hint: "extra kv-table columns to append to the table" }
        filter:  { type: array,  items: string, required: false, capability: filters, hint: "restrict the list to a subset" }
        sort:    { type: string, required: false, capability: sort, hint: "column to sort by, optionally followed by desc (e.g. price desc)" }
        ids:     { type: array,  items: integer, required: false, hint: "restrict to these numeric ids" }
      input: "list %{noun}"
      input_suffixes:
        ids:     " %{values}"
        filter:  " %{values}"
        columns: " with %{values}"
        sort:    " sort %{value}"
    availability:
      chat: true
      slash: false
    auth: session
    chat:
      dispatch: Chat::Handlers::List
      slots:
        - name: noun
          kind: enum
          source: nouns
          optional: true
    concerns:
      pager:
        page_size: 50
        more_tool: next
    # v1.6 unified grammar — the CONFIG vocabulary --help / MCP / autocomplete read.
    # Behavior (cell/sort procs) stays in Ruby `{Game,Video,Channel}::ListColumns`,
    # keyed by these names; the orphan-guard spec keeps config ↔ Ruby in 1:1 sync.
    capabilities:
      columns:
        games:
          platform:  { aliases: [platforms],  sortable: false, requires_with: true, desc: pito.copy.help.columns.games.platform }
          genre:     { aliases: [genres],      sortable: true,  requires_with: true, desc: pito.copy.help.columns.games.genre }
          developer: { aliases: [dev],         sortable: true,  requires_with: true, desc: pito.copy.help.columns.games.developer }
          publisher: { sortable: true,  requires_with: true, desc: pito.copy.help.columns.games.publisher }
          channels:  { aliases: [channel],     sortable: true,  requires_with: true, desc: pito.copy.help.columns.games.channels }
          footage:   { sortable: true,  requires_with: true, desc: pito.copy.help.columns.games.footage }
          price:     { aliases: [prices],      sortable: true,  requires_with: true, desc: pito.copy.help.columns.games.price }
          views:     { sortable: true,  requires_with: true, desc: pito.copy.help.columns.games.views }
          likes:     { sortable: true,  requires_with: true, desc: pito.copy.help.columns.games.likes }
        vids:
          channel:    { sortable: true,  requires_with: true, desc: pito.copy.help.columns.vids.channel }
          visibility: { aliases: [status],     sortable: true,  requires_with: true, desc: pito.copy.help.columns.vids.visibility }
          game:       { aliases: [games],      sortable: true,  requires_with: true, desc: pito.copy.help.columns.vids.game }
          duration:   { aliases: [length],     sortable: true,  requires_with: true, desc: pito.copy.help.columns.vids.duration }
          views:      { sortable: true,  requires_with: true, desc: pito.copy.help.columns.vids.views }
          likes:      { sortable: true,  requires_with: true, desc: pito.copy.help.columns.vids.likes }
          category:   { aliases: [categories], sortable: false, requires_with: true, desc: pito.copy.help.columns.vids.category }
          publish_at: { aliases: [publish],    sortable: true,  requires_with: true, desc: pito.copy.help.columns.vids.publish_at }
          scheduled:  { internal: true, sortable: false, requires_with: true, desc: pito.copy.help.columns.vids.scheduled }
        channels:
          subs:  { aliases: [sub, subscribers],   sortable: true, requires_with: true, default: true, desc: pito.copy.help.columns.channels.subs }
          views: { aliases: [view],               sortable: true, requires_with: true, default: true, desc: pito.copy.help.columns.channels.views }
          vids:  { aliases: [vid, videos, video], sortable: true, requires_with: true, default: true, desc: pito.copy.help.columns.channels.vids }
          likes: { sortable: true, requires_with: true, desc: pito.copy.help.columns.channels.likes }
      filters:
        games:
          upcoming: { tokens: [upcoming], scope: upcoming, desc: pito.copy.help.filters.games.upcoming }
          genre:    { vocabulary: genres,    desc: pito.copy.help.filters.games.genre }
          platform: { vocabulary: platforms, desc: pito.copy.help.filters.games.platform }
        vids:
          published: { tokens: [published], scope: published, desc: pito.copy.help.filters.vids.published }
          unlisted:  { tokens: [unlisted],  scope: unlisted,  desc: pito.copy.help.filters.vids.unlisted }
          scheduled: { tokens: [scheduled], scope: scheduled, desc: pito.copy.help.filters.vids.scheduled }
          private:   { tokens: [private],   scope: private_unscheduled, desc: pito.copy.help.filters.vids.private }

  show:
    description: pito.grammar.chat.show
    nl_examples:
      - "show me game 42"
      - "open vid 17"
      - "details for game 42"
      - "what do we know about vid 9?"
      - "pull up game 12"
      - "let me see vid 3"
      - "open game 9"
      - "bring up vid 21"
      - "pull up game 3's details"
    mcp:
      tool: pito_show
      read_only: true
      description: "Open one game, vid, or channel in full detail by id — for a quick read use pito_glance, for metrics over time use pito_analyze. `ref` is a numeric id (games/vids), an @handle (channels), or — for games/vids — a title resolved exact-first (falls back to a looser match). Optionally request extra segments such as similar, videos, channels, games, or at-a-glance. E.g. \"show me game 42\" → \"show game 42\"; \"open vid 17\" → \"show vid 17\"; \"pull up game 3's details\" → \"show game 3\"."
      params:
        noun:     { type: string, enum: [game, vid, channel], required: true }
        ref:      { type: string, required: true, hint: "numeric id (e.g. 3); an @handle for channels; or, for games/vids, a title resolved exact-first (falls back to a looser match)" }
        segments: { type: array, items: string, required: false, hint: "extra sections, e.g. [similar, at-a-glance]" }
      input: "show %{noun} %{ref}"
      input_suffixes:
        segments: " with %{values}"
    auth: session
    chat:
      dispatch: Chat::Handlers::Show
      slots:
        - name: id
          kind: free
          optional: true
        - name: full
          kind: enum
          source: full_flag
          optional: true
        - name: with
          kind: enum
          source: show_segments
          optional: true
          repeatable: true
          introducer: with
        - name: only
          kind: enum
          source: show_segments
          optional: true
          repeatable: true
          introducer: only
        - name: without
          kind: enum
          source: show_segments
          optional: true
          repeatable: true
          introducer: without
          introducer: without
      # id_only_resolution! active — title lookup is disabled; handler reads message.raw.
    segments:
      # Ordered emission list per entity; faithfully transcribed from Pito::Chat::Segments::TABLE.
      channel:
        detail:
          builder: MessageBuilder::Channel::Detail
          kind: system
          default: true
          fill: ~
          reply_target: channel_detail
          emit_if: ~
        # The channel's linked GAMES grid: similar-games-style
        # cards (strip cover, #id + per-channel vid count, no title/score),
        # alphabetical, 5 per row. Declared BEFORE videos so `full` lands it
        # between detail and the vids table. Skipped silently when the channel
        # has no linked games (mirrors videos/has_any_videos).
        games:
          builder: MessageBuilder::Channel::Games
          kind: enhanced
          default: false
          fill: ~
          reply_target: channel_games
          emit_if: has_linked_games
        videos:
          builder: MessageBuilder::Channel::Videos
          kind: enhanced
          default: false
          fill: ~
          reply_target: video_list
          emit_if: has_any_videos
          # `show channel @h with vids` — mirror the game.videos segment alias.
          aliases: [vids]
        "at-a-glance":
          builder: MessageBuilder::Analytics::Enhanced
          kind: enhanced
          default: false
          fill: AnalyticsFillJob
          reply_target: analytics_glance
          emit_if: ~
      vid:
        detail:
          builder: MessageBuilder::Video::Detail
          kind: system
          default: true
          fill: ~
          reply_target: video_detail
          emit_if: ~
        # Renamed from "linked-game": a vid always has just
        # one game, so the token is the bare singular — `show vid #3 with game`.
        # No aliases by design. reply_target unchanged (persisted messages).
        game:
          builder: MessageBuilder::Video::LinkedGame
          kind: enhanced
          default: false
          fill: ~
          reply_target: game_detail
          emit_if: has_linked_game
        "at-a-glance":
          builder: MessageBuilder::Analytics::Enhanced
          kind: enhanced
          default: false
          fill: AnalyticsFillJob
          reply_target: analytics_glance
          emit_if: ~
      game:
        detail:
          builder: MessageBuilder::Game::Detail
          kind: system
          default: true
          fill: ~
          reply_target: game_detail
          emit_if: ~
        similar:
          builder: MessageBuilder::Game::SimilarGames
          kind: enhanced
          default: false
          fill: ~
          reply_target: game_similar
          emit_if: ~
          aliases: [similars]
        # Renamed from "linked-videos" — `show game #3 with
        # vids`. reply_target unchanged (persisted messages + the
        # show/analyze/unlink/sort/with/without matrices keep working).
        videos:
          builder: MessageBuilder::Game::LinkedVideos
          kind: enhanced
          default: false
          fill: ~
          reply_target: game_linked_videos
          emit_if: has_linked_videos
          aliases: [vids, linked-vids]
        channels:
          builder: MessageBuilder::Game::Channels
          kind: enhanced
          default: false
          fill: ChannelDistributionFillJob
          reply_target: game_channels
          emit_if: ~
        "at-a-glance":
          builder: MessageBuilder::Analytics::Enhanced
          kind: enhanced
          default: false
          fill: AnalyticsFillJob
          reply_target: analytics_glance
          emit_if: ~
    reply:
      targets:
        channel_games:
          mode: append
          ref: { resolver: game_by_id }          # `show <id>` → that game from the grid
        game_channels:
          mode: append
          ref: { resolver: channel_by_handle }   # `show @handle` → that channel (args = @handle)
        game_imported:
          mode: append
          ref: { resolver: source_entity }        # imported game from the card's game_id payload
        game_linked_videos:
          mode: append
          ref: { resolver: video_by_id }          # `show <id>` → that linked vid (id-only)
        game_list:
          mode: append
          ref: { resolver: id_among_rows }        # `show <id>` scoped to the listed games
        game_similar:
          mode: append
          ref: { resolver: game_by_id }           # `show <id>` → that similar game (id-only)
        video_list:
          mode: append
          ref: { resolver: id_among_rows }        # `show <id>` scoped to the listed vids
        video_search:
          mode: append
          ref: { resolver: id_among_rows }        # `show <id>` scoped to the ranked vids

  analyze:
    aliases: [analytics, stats]
    description: pito.grammar.chat.analyze
    nl_examples:
      - "analyze my channel"
      - "how is vid 12 performing?"
      - "stats for game 42"
      - "run the numbers on my channel"
      - "how are my views doing?"
      - "analytics for vid 7"
      - "how is the channel doing lately?"
      - "are my subs trending up?"
      - "crunch the numbers on vid 4"
      - "how did that vid do?"
    mcp:
      tool: pito_analyze
      read_only: false
      description: "YouTube analytics numbers for a game, vid, or channel over a period — trends over time; for lifetime shape use pito_breakdowns, for a one-screen snapshot use pito_glance. Bare (no noun/ref) analyzes all your channels. `period` accepts e.g. 7d, 28d, or lifetime. First call for a period computes and caches the numbers (may query the YouTube Analytics API); repeat calls read the cache. E.g. \"how is vid 12 performing?\" → \"analyze vid 12\"; \"stats for game 42\" → \"analyze game 42\"."
      params:
        noun:   { type: string, enum: [game, vid, channel], required: false }
        ref:    { type: string, required: false, hint: "numeric id or @handle" }
        period: { type: string, required: false, hint: "e.g. 7d, 28d, lifetime" }
      input: "analyze"
      bare_input: "analyze channels"   # the documented "bare = all your channels"
      input_suffixes:
        noun: " %{value}"
        ref:  " %{value}"
    auth: session
    chat:
      dispatch: Chat::Handlers::Analyze
      slots:
        - name: noun
          kind: enum
          source: nouns
          optional: true
        - name: without
          kind: enum
          source: analyze_segments
          optional: true
          repeatable: true
          introducer: without
          introducer: without
          # Metric tokens in the without clause are also accepted — they pass through
          # as extra_vocabulary and are consumed by MetricSelection independently.
      # Handler reads message.raw for entity/id/handle/period; slot drives ghost only.
    segments:
      # All three entities share ANALYZE_SEGMENTS (MessageBuilder::Analyze::Message::SEGMENT_ROLES).
      # numbers → system scaffold; breakdowns → enhanced scaffold.
      channel:
        numbers:
          builder: MessageBuilder::Analyze::Message
          kind: system
          default: true
          fill: ~
          reply_target: analyze_message
          emit_if: ~
        breakdowns:
          builder: MessageBuilder::Analyze::Message
          kind: enhanced
          default: false
          fill: ~
          reply_target: analyze_message
          emit_if: ~
      vid:
        numbers:
          builder: MessageBuilder::Analyze::Message
          kind: system
          default: true
          fill: ~
          reply_target: analyze_message
          emit_if: ~
        breakdowns:
          builder: MessageBuilder::Analyze::Message
          kind: enhanced
          default: false
          fill: ~
          reply_target: analyze_message
          emit_if: ~
      game:
        numbers:
          builder: MessageBuilder::Analyze::Message
          kind: system
          default: true
          fill: ~
          reply_target: analyze_message
          emit_if: ~
        breakdowns:
          builder: MessageBuilder::Analyze::Message
          kind: enhanced
          default: false
          fill: ~
          reply_target: analyze_message
          emit_if: ~
    reply:
      targets:
        analytics_glance:
          mode: append
          # Bare `analyze` re-runs full analysis on glance's scope entity (scope_type/scope_id).
        channel_detail:
          mode: append
          # Entity from event payload channel_id.
        channel_list:
          mode: append
          # analyze @handle → single channel; bare analyze → all listed channel_ids.
        game_detail:
          mode: append
          # Entity from event payload game_id.
        game_linked_videos:
          mode: append
          # Scope is video_ids array from event payload.
        game_list:
          mode: append
          # analyze #3 → single game by id; bare analyze → all listed game_ids.
        video_detail:
          mode: append
          # Entity from event payload video_id.
        video_list:
          mode: append
          # analyze #3 → single vid; bare analyze → all listed video_ids.

  # ─── Segment tools ─────────────────────────────────────────────────
  # Each promotes ONE :enhanced segment of show/analyze into its own top-level chat
  # tool via the single generic Chat::Handlers::SegmentTool — ADDITIVE; show/analyze
  # are untouched. `segment_of` binds the tool to its (parent, segment) pair; entity
  # availability derives from the parent's segments block (schema-validated). The
  # handler drives the parent's emission path forcing `only <segment>`, so a segment
  # tool is byte-identical to `<parent> <noun> <ref> only <segment>`.

  "at-a-glance":
    aliases: [glance, overview]
    description: pito.grammar.chat.at-a-glance
    nl_examples:
      - "give me the overview"
      - "quick summary of my channel"
      - "how do things look at a glance?"
      - "glance at vid 12"
      - "quick look at game 3"
      - "just the highlights please"
      - "the quick rundown please"
      - "give me a glance at vid 2"
      - "the rundown for vid 2"
    mcp:
      tool: pito_glance
      read_only: false
      description: "Quick one-screen analytics snapshot for one game, vid, or channel — no deep dive; for trends use pito_analyze, for lifetime shape use pito_breakdowns. `period` accepts e.g. 7d, 28d, or lifetime. First call for a period computes and caches the numbers (may query the YouTube Analytics API); repeat calls read the cache. E.g. \"glance at vid 12\" → \"at-a-glance vid 12\"; \"quick look at game 3\" → \"at-a-glance game 3\"."
      params:
        noun:   { type: string, enum: [game, vid, channel], required: true }
        ref:    { type: string, required: true, hint: "numeric id or @handle" }
        period: { type: string, required: false, hint: "e.g. 7d, 28d, lifetime" }
      input: "at-a-glance %{noun} %{ref}"
    auth: session
    chat:
      dispatch: Chat::Handlers::SegmentTool
      segment_of: { tool: show, segment: "at-a-glance" }
      slots:
        - name: noun
          kind: enum
          source: nouns
          optional: true
        - name: id
          kind: free
          optional: true
    reply:
      targets:
        channel_detail: { mode: append }
        game_detail:    { mode: append }
        video_detail:   { mode: append }
        channel_list:   { mode: append }
        game_list:      { mode: append }
        video_list:     { mode: append }
        video_search:   { mode: append }

  # `videos channel @h` AND `vids game #3` — the flat form
  # drives the `videos` segment on whatever entity the noun resolves. Absorbs
  # the retired standalone `linked-videos` tool (linked-vids stays typeable).
  videos:
    aliases: [vids, linked-vids]
    description: pito.grammar.chat.videos
    nl_examples:
      - "what vids does this channel have?"
      - "show the vids linked to game 42"
      - "videos for my channel"
      - "which vids belong to that game?"
      - "list the channel's videos"
      - "the linked vids for game 7"
    mcp:
      tool: pito_videos
      read_only: true
      description: "List the videos of a channel (by @handle) or the videos linked to a game (by numeric id) — a listing, not analytics (use pito_analyze/pito_glance for metrics). E.g. \"what vids does this channel have?\" → \"videos channel @handle\"; \"show the vids linked to game 42\" → \"videos game 42\"."
      params:
        noun: { type: string, enum: [channel, game], required: true }
        ref:  { type: string, required: true, hint: "numeric game id or channel @handle" }
      input: "videos %{noun} %{ref}"
    auth: session
    chat:
      dispatch: Chat::Handlers::SegmentTool
      segment_of: { tool: show, segment: videos }
      slots:
        - name: noun
          kind: enum
          source: nouns
          optional: true
        - name: id
          kind: free
          optional: true
    reply:
      targets:
        # `vids` accepted as a reply wherever `videos` is (tool-level aliases are
        # excluded from reply tokens by design — must be per-target).
        channel_detail: { mode: append, aliases: [vids] }
        game_detail:    { mode: append, aliases: [vids] }
        channel_list:   { mode: append, aliases: [vids] }
        game_list:      { mode: append, aliases: [vids] }

  # Renamed from "linked-game": a vid has just one game,
  # so the tool is the bare singular — `game vid #10`. No aliases by design;
  # the two-word `linked game #7` keyed form below is unaffected.
  game:
    description: pito.grammar.chat.game
    nl_examples:
      - "which game is vid 12 about?"
      - "what game is linked to that vid?"
      - "the game for vid 7 please"
      - "what's vid 3's game?"
      - "which game does vid 5 belong to?"
      - "the game behind vid 8"
    mcp:
      tool: pito_game_of_vid
      read_only: true
      description: "Show which game a given video is linked to. E.g. \"which game is vid 12 about?\" → \"game vid 12\"; \"the game for vid 7 please\" → \"game vid 7\"."
      params:
        vid_ref: { type: string, required: true, hint: "numeric video id" }
      input: "game vid %{vid_ref}"
    auth: session
    chat:
      dispatch: Chat::Handlers::SegmentTool
      segment_of: { tool: show, segment: game }
      slots:
        - name: noun
          kind: enum
          source: nouns
          optional: true
        - name: id
          kind: free
          optional: true
    reply:
      targets:
        video_detail: { mode: append }
        video_list:   { mode: append }
        video_search: { mode: append }

  similar:
    aliases: [similars]
    description: pito.grammar.chat.similar
    nl_examples:
      - "games like game 42"
      - "what's similar to tekken?"
      - "recommend games similar to 12"
      - "show me lookalikes for game 7"
      - "anything else like this game?"
    mcp:
      tool: pito_similar
      read_only: true
      description: "Show games similar to a given game, by numeric id. To seed by title instead of an id, use the chat `search games like <title>` flow (not exposed to MCP). E.g. \"games like game 42\" → \"similar game 42\"; \"show me lookalikes for game 7\" → \"similar game 7\"."
      params:
        game_ref: { type: string, required: true, hint: "numeric game id" }
      input: "similar game %{game_ref}"
    auth: session
    chat:
      dispatch: Chat::Handlers::SegmentTool
      segment_of: { tool: show, segment: similar }
      slots:
        - name: noun
          kind: enum
          source: nouns
          optional: true
        - name: id
          kind: free
          optional: true
    reply:
      targets:
        game_detail: { mode: append }
        game_list: { mode: append }

  channels:
    aliases: [handles]
    description: pito.grammar.chat.channels
    nl_examples:
      - "who publishes this game?"
      - "which channels cover game 42?"
      - "channels for tekken"
      - "who else plays this game?"
      - "which channels play game 9?"
      - "who covers game 3?"
    mcp:
      tool: pito_channels_of_game
      read_only: false
      description: "Show which channels cover a given game (channel distribution), by numeric game id. First call computes watch-time via the YouTube Analytics API and caches it for a day; repeat calls read the cache. E.g. \"which channels cover game 42?\" → \"channels game 42\"; \"who covers game 3?\" → \"channels game 3\"."
      params:
        game_ref: { type: string, required: true, hint: "numeric game id" }
      input: "channels game %{game_ref}"
    auth: session
    chat:
      dispatch: Chat::Handlers::SegmentTool
      segment_of: { tool: show, segment: channels }
      slots:
        - name: noun
          kind: enum
          source: nouns
          optional: true
        - name: id
          kind: free
          optional: true
    reply:
      targets:
        game_detail: { mode: append }
        game_list: { mode: append }

  breakdowns:
    aliases: [breakdown, lifetime, life]
    description: pito.grammar.chat.breakdowns
    nl_examples:
      - "lifetime breakdown for my channel"
      - "how do views distribute over time?"
      - "breakdown of vid 12"
      - "lifetime stats for game 42"
      - "show me the distribution"
    mcp:
      tool: pito_breakdowns
      read_only: false
      description: "Lifetime analytics breakdowns (percentages by dimension) for a game, vid, or channel — the whole-life shape, not a bounded window (use pito_analyze for a period). First call computes and caches the numbers; repeat calls read the cache. E.g. \"breakdown of vid 12\" → \"breakdowns vid 12\"; \"lifetime stats for game 42\" → \"breakdowns game 42\"."
      params:
        noun: { type: string, enum: [game, vid, channel], required: false }
        ref:  { type: string, required: false, hint: "numeric id or @handle" }
      input: "breakdowns"
      input_suffixes:
        noun: " %{value}"
        ref:  " %{value}"
    auth: session
    chat:
      dispatch: Chat::Handlers::SegmentTool
      segment_of: { tool: analyze, segment: breakdowns }
      slots:
        - name: noun
          kind: enum
          source: nouns
          optional: true
        - name: id
          kind: free
          optional: true

  # The `linked` two-word forms — a PER-NOUN keyed `segment_of`.
  # Unlike the flat segment tools above (where the typed noun routes the entity in
  # the parent), here the NOUN names WHAT YOU GET (the segment) and the id belongs
  # to the OTHER entity, so each branch FORCES the parent's entity branch:
  #   linked game #7  → the linked-game card OF vid #7   (== show vid #7 only linked-game)
  #   linked vids #3  → the linked-videos table OF game #3 (== show game #3 only linked-videos)
  # Coexists with the one-word game / videos segment tools. The
  # branch `aliases:` mirror the `nouns` vocabulary synonyms (videos → vids, …).
  linked:
    description: pito.grammar.chat.linked
    nl_examples:
      - "what's linked to vid 12?"
      - "show the links for game 42"
      - "is that vid linked to anything?"
      - "what vids hang off game 7?"
    auth: session
    chat:
      dispatch: Chat::Handlers::SegmentTool
      segment_of:
        game: { tool: show, segment: game,   entity: vid,  aliases: [games, gamez] }
        vids: { tool: show, segment: videos, entity: game, aliases: [videos, video, vid] }
      slots:
        - name: noun
          kind: enum
          source: nouns
          optional: true
        - name: id
          kind: free
          optional: true

  import:
    description: pito.grammar.chat.import
    nl_examples:
      - "import tekken 8 from igdb"
      - "add a new game called hades"
      - "bring in elden ring"
      - "import game inscryption"
      - "add that game to my library"
    auth: session
    # Import progress/result messages are operational chatter — not shareable.
    universal_reply: false
    chat:
      dispatch: Chat::Handlers::Import
      slots:
        # The noun is optional now — `import <title>` imports a game (games
        # are the only importable thing). `import game[s] <title>` still works,
        # and `import videos` stays the sync-vids alias.
        - name: noun
          kind: enum
          source: import_nouns
          optional: true
        - name: title
          kind: free
          optional: true

  sync:
    description: pito.grammar.chat.sync
    nl_examples:
      - "sync my vids"
      - "pull the latest from youtube"
      - "refresh my channels"
      - "sync everything from youtube"
      - "update my library from youtube"
    auth: session
    # Sync status messages are operational chatter — not shareable (see the
    # HOW-TO on the universal_reply block at the top of this file).
    universal_reply: false
    chat:
      dispatch: Chat::Handlers::Sync
      slots:
        - name: target
          kind: enum
          source: sync_targets
          optional: true
      # Handler reads message.raw for noun/ref routing.
    reply:
      targets:
        channel_detail:
          mode: append
          ref: { resolver: source_entity }   # channel from payload channel_id
        game_detail:
          mode: append
          ref: { resolver: source_entity }   # game from payload game_id
        video_detail:
          mode: append
          ref: { resolver: source_entity }   # video from payload video_id

  footage:
    description: pito.grammar.chat.footage
    nl_examples:
      - "set footage for game 12 to 8.5 hours"
      - "I recorded 3 more hours of game 42"
      - "update the footage on tekken"
      - "log 2 hours of footage for game 7"
    auth: session
    chat:
      dispatch: Chat::Handlers::Footage
      slots:
        - name: title
          kind: enum
          source: game_titles
          optional: true
    reply:
      targets:
        game_detail:
          mode: append
          ref: { resolver: source_entity }   # game from payload game_id
          args:
            hours: { resolver: footage_hours }   # `footage [update] <hours>` → 0.5-step Rational

  price:
    description: pito.grammar.chat.price
    nl_examples:
      - "set the price of game 12 to 59.99"
      - "game 42 cost me 20 euros"
      - "clear the price on game 7"
      - "price game 3 at 15 euros"
    auth: session
    chat:
      dispatch: Chat::Handlers::Price
      slots:
        - name: subcommand
          kind: enum
          source: price_subcommands
          optional: true
        - name: title
          kind: free
          optional: true
    reply:
      targets:
        game_detail:
          mode: append
          ref: { resolver: source_entity }   # game from payload game_id
          args:
            amount: { resolver: price_amount }   # `price [set] <amount>` → BigDecimal (2dp) | :unset
        game_list:
          mode: append
          ref: { resolver: id_among_rows }   # `price <id> …` scoped to the listed games
          args:
            amount: { resolver: price_amount }   # `<amount>` after the sliced row id

  delete:
    aliases: [rm, del]
    description: pito.grammar.chat.delete
    nl_examples:
      - "delete vid 12"
      - "remove game 42 from my library"
      - "get rid of that game"
      - "drop vid 9"
    auth: session
    chat:
      dispatch: Chat::Handlers::Delete
      slots:
        - name: title
          kind: enum
          source: game_titles
          optional: true
    reply:
      targets:
        game_detail:
          mode: append
          aliases: [rm, del]
          ref: { resolver: source_entity }   # game from payload game_id
        game_list:
          mode: append
          aliases: [rm, del]
          ref: { resolver: id_among_rows }   # `delete <id>` scoped to the listed games
        video_detail:
          mode: append
          aliases: [rm, del]
          ref: { resolver: source_entity }   # video from payload video_id
        video_list:
          mode: append
          aliases: [rm, del]
          ref: { resolver: id_among_rows }   # `delete <id>` scoped to the listed vids
        video_search:
          mode: append
          aliases: [rm, del]
          ref: { resolver: id_among_rows }   # `delete <id>` scoped to the ranked vids

  reindex:
    description: pito.grammar.chat.reindex
    nl_examples:
      - "reindex game 42"
      - "re-embed vid 12"
      - "refresh the embedding for tekken"
      - "rebuild game 7's index"
      - "re-embed that game again"
      - "refresh vid 4's embedding"
    auth: session
    chat:
      dispatch: Chat::Handlers::Reindex
      slots:
        - name: title
          kind: enum
          source: game_titles
          optional: true
    reply:
      targets:
        game_detail:
          mode: append
          ref: { resolver: source_entity }   # game from payload game_id
        video_detail:
          mode: append
          ref: { resolver: source_entity }   # video from payload video_id

  platform:
    description: pito.grammar.chat.platform
    nl_examples:
      - "add ps5 to game 12"
      - "game 42 is also on switch"
      - "remove pc from game 7"
      - "set game 3's platform to xbox"
    auth: session
    chat:
      dispatch: Chat::Handlers::Platform
      slots:
        - name: subcommand
          kind: enum
          source: platform_subcommands
          optional: true
        - name: title
          kind: free
          optional: true
    reply:
      targets:
        game_detail:
          mode: append
          ref: { resolver: source_entity }   # game from payload game_id
          args:
            value: { resolver: platform_value }   # `platform [set|unset] <value>` → canonical logo family
        game_list:
          mode: append
          ref: { resolver: id_among_rows }   # `platform <id> …` scoped to the listed games
          args:
            value: { resolver: platform_value }   # `<value>` after the sliced row id

  publish:
    aliases: [pub]
    description: pito.grammar.chat.publish
    nl_examples:
      - "publish vid 12"
      - "make vid 7 public"
      - "push that vid live"
      - "release vid 3 now"
    auth: session
    chat:
      dispatch: Chat::Handlers::Publish
      slots:
        - name: title
          kind: free
          optional: true
    reply:
      targets:
        video_detail:
          mode: append
          aliases: [pub]
          ref: { resolver: source_entity }   # video from payload video_id
        video_list:
          mode: append
          aliases: [pub]
          ref: { resolver: id_among_rows }   # `publish <id>` scoped to the listed vids
        video_search:
          mode: append
          aliases: [pub]
          ref: { resolver: id_among_rows }   # `publish <id>` scoped to the ranked vids

  unlist:
    description: pito.grammar.chat.unlist
    nl_examples:
      - "unlist vid 12"
      - "hide vid 7 from the public"
      - "take vid 3 off the listing"
    auth: session
    chat:
      dispatch: Chat::Handlers::Unlist
      slots:
        - name: title
          kind: free
          optional: true
    reply:
      targets:
        video_detail:
          mode: append
          ref: { resolver: source_entity }   # video from payload video_id
        video_list:
          mode: append
          ref: { resolver: id_among_rows }   # `unlist <id>` scoped to the listed vids
        video_search:
          mode: append
          ref: { resolver: id_among_rows }   # `unlist <id>` scoped to the ranked vids

  schedule:
    description: pito.grammar.chat.schedule
    nl_examples:
      - "schedule vid 12 for friday"
      - "publish vid 7 next monday"
      - "set vid 3 to go live on the slate"
      - "queue vid 9 for release"
    auth: session
    chat:
      dispatch: Chat::Handlers::Schedule
      slots:
        - name: title
          kind: free
          optional: true
        - name: slate
          kind: enum
          source: schedule_whens
          optional: true
      # Handler parses id + <when> from message.raw via Schedule::TimeParser.
    reply:
      targets:
        video_detail:
          mode: append
          ref: { resolver: source_entity }   # video from payload video_id
          args:
            when: { resolver: schedule_expression }   # reply args ARE the when-phrase
        video_list:
          mode: append
          ref: { resolver: id_among_rows }   # row id sliced from the leading token
          args:
            when: { resolver: schedule_expression }   # `<when>` after the sliced row id
        video_search:
          mode: append
          ref: { resolver: id_among_rows }   # row id sliced from the leading token
          args:
            when: { resolver: schedule_expression }   # `<when>` after the sliced row id

  find:
    description: pito.grammar.chat.find
    nl_examples:
      - "find vids about tekken"
      - "which vids are rpg?"
      - "find my videos on ps5 games"
      - "find vids titled boss fight"
    auth: session
    chat:
      slots:
        - name: status
          kind: enum
          source: release_status
          optional: true
        - name: genre
          kind: enum
          source: genres
          optional: true
          repeatable: true
        - name: platform
          kind: enum
          source: platforms
          optional: true
          introducer: for

  # `search games like <title>` — similarity search. The free `query` slot
  # slurps "[games] like <title>"; the handler extracts the seed after `like`,
  # runs Recommendation::GameSimilarity, and renders a game_list card (so #id
  # replies, sort/with, and more/next paging all work via the existing pager).
  search:
    description: pito.grammar.chat.search
    nl_examples:
      - "search games like tekken"
      - "find games similar to street fighter"
      - "search games for tekken"
      - "which games are called tekken something?"
      - "search conversations for tekken combos"
      - "find the chat where we discussed thumbnails"
      - "look up conversations about pricing"
      - "where did we talk about that game?"
    auth: session
    chat:
      dispatch: Chat::Handlers::Search
      slots:
        - name: noun
          kind: enum
          source: search_nouns
          optional: true
        - name: query
          kind: free
          optional: true
    concerns:
      pager:
        page_size: 20
        more_tool: next
        max_page_size: 100

  # The consolidated metadata-setter tool — the commands the AI suggests and
  # only the owner runs. Game fields (footage/price/platform) write locally at
  # once; vid fields (description/tags) stage a confirmation whose `yes` pushes
  # ONLY that field to YouTube. The old typed `footage update` / `price set` /
  # `platform set` forms redirect here; their reply forms (`#g3 price 20`, …)
  # are unchanged. `<id>` + the raw rest-of-line value parse from message.raw.
  update:
    description: pito.grammar.chat.update
    nl_examples:
      - "update game 12 price to 20"
      - "change vid 7's description"
      - "set new tags on vid 3"
      - "change game 5's price to 30"
      - "set the footage on game 2"
      - "update the footage on game 42"
    auth: session
    chat:
      dispatch: Chat::Handlers::Update
      slots:
        - name: noun
          kind: enum
          source: update_nouns
          optional: true
        - name: field
          kind: enum
          source: update_fields
          optional: true

  # The AI entry tool — everything after `@ai` is raw free text handed to the
  # orchestrator loop (the handler reads message.raw; the grammar never
  # normalizes it). The parser fuses the lexer's bare "@" + word and downcases,
  # so @AI/@Ai/@aI all reach here. Deliberately NOT exposed to MCP.
  # Reply form: `#a7 @ai <text>` continues the thread anchored on that answer —
  # the orchestrator guarantees the anchored exchange rides in the model's
  # context even when it has scrolled out of the history window.
  "@ai":
    description: pito.grammar.chat.ai
    auth: session
    chat:
      dispatch: Chat::Handlers::Ai
      # Explicit per-message opt-in for the web tool pair (P14): only a prompt
      # carrying this flag hands web_search/web_fetch to the model.
      web_flag: "--web"
      slots:
        - name: prompt
          kind: free
          optional: true
    reply:
      targets:
        ai_message:
          mode: append

  link:
    description: pito.grammar.chat.link
    nl_examples:
      - "link vid 12 to game 42"
      - "vid 7 belongs to tekken"
      - "connect that vid to game 3"
      - "attach vid 9 to game 5"
    auth: session
    chat:
      dispatch: Chat::Handlers::Link
      slots:
        - name: title
          kind: free
          optional: true
      # Handler splits on ` to ` to extract game ref and video ref.
    reply:
      targets:
        # Dual-ref: `link [5] to [video] 12` carries a SOURCE (the card's payload
        # entity, or the id LEFT of the connector) AND a TARGET list (the ids after
        # `to`/`with`). `link_source` + `link_targets` split on the connector
        # themselves and derive the source/target class from the reply_target.
        game_detail:
          mode: append
          ref: { resolver: link_source }              # source game (payload game_id)
          args:
            linked_ref: { resolver: link_targets }    # target video(s) after `to`/`with`
        game_list:
          mode: append
          ref: { resolver: link_source }              # source game (id LEFT of the connector)
          args:
            linked_ref: { resolver: link_targets }    # target video(s) after `to`/`with`
        video_detail:
          mode: append
          ref: { resolver: link_source }              # source video (payload video_id)
          args:
            linked_ref: { resolver: link_targets }    # target game(s) after `to`/`with`
        video_list:
          mode: append
          ref: { resolver: link_source }              # source video (id LEFT of the connector)
          args:
            linked_ref: { resolver: link_targets }    # target game(s) after `to`/`with`
        video_search:
          mode: append
          ref: { resolver: link_source }              # source video (id LEFT of the connector)
          args:
            linked_ref: { resolver: link_targets }    # target game(s) after `to`/`with`

  unlink:
    description: pito.grammar.chat.unlink
    nl_examples:
      - "unlink vid 12 from game 42"
      - "detach that vid from its game"
      - "remove the link on vid 7"
    auth: session
    chat:
      dispatch: Chat::Handlers::Unlink
      slots:
        - name: title
          kind: free
          optional: true
    reply:
      targets:
        # Same dual-ref shape as `link` (connector = `from`). game_linked_videos
        # resolves its SOURCE as the parent Game via the payload game_id (its
        # reply_target ≠ "video*"), and its TARGET as the typed video id.
        game_detail:
          mode: append
          ref: { resolver: link_source }              # source game (payload game_id)
          args:
            linked_ref: { resolver: link_targets }    # target video(s) after `from`
        game_linked_videos:
          mode: append
          ref: { resolver: link_source }              # source Game (payload game_id)
          args:
            linked_ref: { resolver: link_targets }    # target video id (among the listed videos)
        game_list:
          mode: append
          ref: { resolver: link_source }              # source game (id LEFT of the connector)
          args:
            linked_ref: { resolver: link_targets }    # target video(s) after `from`
        video_detail:
          mode: append
          ref: { resolver: link_source }              # source video (payload video_id)
          args:
            linked_ref: { resolver: link_targets }    # target game(s) after `from`
        video_list:
          mode: append
          ref: { resolver: link_source }              # source video (id LEFT of the connector)
          args:
            linked_ref: { resolver: link_targets }    # target game(s) after `from`
        video_search:
          mode: append
          ref: { resolver: link_source }              # source video (id LEFT of the connector)
          args:
            linked_ref: { resolver: link_targets }    # target game(s) after `from`

  help:
    # Chat branch: displays all follow-up targets grouped by entity.
    # Slash branch: full sectioned help (authenticated) or login hint (unauthenticated).
    description: pito.grammar.chat.help
    nl_examples:
      # (no bare "help" phrase — the literal word parses via the grammar; as
      # a router row it was a single-token similarity magnet, like greet's.)
      - "what can you do?"
      - "show me the commands"
      - "how does this work?"
      - "list the tools"
      - "what are you capable of?"
      - "how do I use this thing?"
      - "what is pito able to do?"
    auth: session
    # Help pages are reference chrome — not shareable.
    universal_reply: false
    chat:
      dispatch: Chat::Handlers::Help
      slots: []
    slash:
      auth: any
      description: pito.grammar.slash.help
      slots: []
      dispatch: Slash::Handlers::Help

  shinies:
    description: pito.grammar.chat.shinies
    nl_examples:
      - "show my shinies"
      - "what achievements do I have?"
      - "any new milestones?"
      - "achievement progress for my channel"
      - "how close am I to the next shiny?"
    mcp:
      tool: pito_shinies
      read_only: true
      description: "Show the shinies (achievement chips / award ladders) earned by a game, vid, or channel. E.g. \"achievement progress for my channel\" → \"shinies channel @handle\"; \"what achievements do I have?\" → \"shinies channel @handle\" (swap noun/ref for a game or vid)."
      params:
        noun: { type: string, enum: [game, vid, channel], required: true }
        ref:  { type: string, required: true, hint: "numeric id or @handle" }
      input: "shinies %{noun} %{ref}"
    auth: session
    chat:
      dispatch: Chat::Handlers::Shinies
      slots:
        - name: target
          kind: free
          optional: true
      # Handler reads noun (channel/video/game) + ref from message.raw.
    reply:
      targets:
        # Bare `shinies` on a channel card reads the source entity —
        # completes the owner's show/list x channel/vid/game reply matrix.
        channel_detail:
          mode: append
          ref: { resolver: source_entity }
        channel_list:
          mode: append
          ref: { resolver: channel_by_handle }   # `shinies @handle` (args = @handle)
        game_detail:
          mode: append
          ref: { resolver: source_entity }        # game from payload game_id
        game_list:
          mode: append
          ref: { resolver: id_among_rows }        # `shinies <id>` scoped to the listed games
        video_detail:
          mode: append
          ref: { resolver: source_entity }        # video from payload video_id
        video_list:
          mode: append
          ref: { resolver: id_among_rows }        # `shinies <id>` scoped to the listed vids
        video_search:
          mode: append
          ref: { resolver: id_among_rows }        # `shinies <id>` scoped to the ranked vids

  greet:
    description: pito.grammar.chat.greet
    nl_examples:
      - "hi"
      - "hello pito"
      - "hey there"
      - "good morning"
      - "yo"
    auth: session
    chat:
      dispatch: Chat::Handlers::Greeting
      slots: []
      # Recognised by whole-input phrase match in Pito::Chat::Parser (single or multi-word,
      # case-insensitive, punctuation-tolerant). Spec exists for handler↔spec parity + help.

  farewell:
    description: pito.grammar.chat.farewell
    nl_examples:
      - "bye"
      - "goodnight pito"
      - "see you later"
      - "I'm off"
      - "cya"
    auth: session
    chat:
      dispatch: Chat::Handlers::Farewell
      slots: []
      # Recognised by whole-input phrase match in Pito::Chat::Parser. Spec for parity + help.

  # ─── Reply-only tools (no chat branch) ───────────────────────────────────────

  next:
    # Pager tool: `more_tool: next` in the list pager concern.
    # No chat branch — only available as a follow-up reply on paginated list targets.
    # `more` is accepted as a per-target alias (natural word for "show more").
    reply:
      targets:
        channel_list:
          mode: append
          concern: pager
          aliases: [more]
        game_list:
          mode: append
          concern: pager
          aliases: [more]
        video_list:
          mode: append
          concern: pager
          aliases: [more]

  visit:
    # Reply-only tool on channel_detail — opens YouTube channel page or Studio in browser.
    # Bare `visit` (no destination) returns needs_destination error.
    reply:
      targets:
        channel_detail:
          mode: append
          ref: { resolver: source_entity }              # channel from payload channel_id
          args:
            destination: { resolver: visit_destination } # reply args = the destination word

  sort:
    aliases: [order]
    # Reply-only tool on list targets — re-sorts the stamped list in place.
    # Accepts optional leading `by` particle; trailing `desc`/`asc` direction.
    # Unknown column token is a lenient no-op (rows stay in stamped order).
    reply:
      targets:
        channel_list:
          mode: mutate
          aliases: [order]
          args:
            clause: { resolver: sort_clause }
        game_linked_videos:
          mode: mutate
          aliases: [order]
          args:
            clause: { resolver: sort_clause }
        game_list:
          mode: mutate
          aliases: [order]
          args:
            clause: { resolver: sort_clause }
        video_list:
          mode: mutate
          aliases: [order]
          args:
            clause: { resolver: sort_clause }

  with:
    # Reply tool with two distinct semantics depending on target:
    #   analytics cards → metric inclusion (MetricSelection)
    #   list targets    → column inclusion (ListColumns vocabulary)
    # Mode differs per target (append on analytics_glance, mutate on others).
    reply:
      targets:
        analytics_glance:
          mode: append
          args:
            metrics: { resolver: metric_list }
        analyze_message:
          mode: mutate
          args:
            metrics: { resolver: metric_list }
        game_linked_videos:
          mode: mutate
          args:
            columns: { resolver: column_list }
        game_list:
          mode: mutate
          args:
            columns: { resolver: column_list }
        video_list:
          mode: mutate
          args:
            columns: { resolver: column_list }
        video_search:
          mode: mutate
          args:
            columns: { resolver: column_list }
        channel_list:
          mode: mutate
          args:
            columns: { resolver: column_list }

  without:
    # Inverse of `with`: metric exclusion (analytics) or column removal (lists).
    reply:
      targets:
        analytics_glance:
          mode: append
          args:
            metrics: { resolver: metric_list }
        analyze_message:
          mode: mutate
          args:
            metrics: { resolver: metric_list }
        game_linked_videos:
          mode: mutate
          args:
            columns: { resolver: column_list }
        game_list:
          mode: mutate
          args:
            columns: { resolver: column_list }
        video_list:
          mode: mutate
          args:
            columns: { resolver: column_list }
        video_search:
          mode: mutate
          args:
            columns: { resolver: column_list }
        channel_list:
          mode: mutate
          args:
            columns: { resolver: column_list }

  confirm:
    # Reply tool on confirmation events — executes the pending command.
    # Aliases per Confirmation::ACTION_ALIASES: yes/y/ok/approve/true → confirm.
    aliases: ["yes", y, ok, approve, "true"]
    reply:
      targets:
        confirmation:
          mode: append

  cancel:
    # Reply tool on confirmation events — cancels the pending command.
    # Aliases per Confirmation::ACTION_ALIASES: no/n/false/discard → cancel.
    aliases: ["no", "n", "false", discard]  # "no" QUOTED — YAML 1.1 boolean
    reply:
      targets:
        confirmation:
          mode: append

  consume:
    # Internal reply tool on channel_visit events.
    # Triggered programmatically by pito--auto-visit Stimulus controller via
    # Channels::VisitsController#consume; NOT shown in user-facing palettes.
    # Flips the visit card from :visiting → :visited state (mutate in place).
    internal: true
    reply:
      targets:
        channel_visit:
          mode: mutate

  # ─── Slash tools ─────────────────────────────────────────────────────────────
  # Controller-routed specs (login/logout/connect/new/resume): NO handler class in
  # lib/pito/slash/handlers/ — the chat_controller slash path executes them,
  # declared via `dispatch: { controller: <tool> }`. Grammar comes from config.

  login:
    aliases: [authenticate]
    # Login confirmations carry session context — never shareable.
    universal_reply: false
    slash:
      auth: unauthenticated_only
      description: pito.grammar.slash.login
      slots:
        - name: code
          kind: free
          optional: false
      dispatch:
        controller: login

  logout:
    aliases: [exit, quit]
    slash:
      auth: authenticated_only
      description: pito.grammar.slash.logout
      slots: []
      dispatch:
        controller: logout

  connect:
    slash:
      auth: authenticated_only
      description: pito.grammar.slash.connect
      slots: []
      dispatch:
        controller: connect

  new:
    # Slash: create a new named conversation (controller-routed).
    # Reply: create the named conversation from a resume_missing card (aliases: create).
    slash:
      auth: authenticated_only
      description: pito.grammar.slash.new
      slots:
        - name: name
          kind: free
          optional: true
      dispatch:
        controller: new
    reply:
      targets:
        resume_missing:
          mode: append
          aliases: [create]
          # Name taken from event payload `resume_name`; creates + renames Conversation.

  resume:
    slash:
      auth: authenticated_only
      description: pito.grammar.slash.resume
      slots:
        # `name` doubles as a conversation title OR a uuid (controller detects the
        # shape); `event_id` only applies in the uuid form — the message to jump
        # to on arrival (anchor-jump reuse, see ChatController#handle_resume_uuid).
        - name: name
          kind: free
          optional: true
        - name: event_id
          kind: free
          optional: true
      dispatch:
        controller: resume
    # GET /resume.json is a cursor feed for the pito-tui conversation picker
    # (viewport-driven `limit`, owner 2026-07-15) — page_size mirrors
    # Conversation::SIDEBAR_PAGE_SIZE so limit-less callers see no change.
    concerns:
      pager:
        page_size: 50
        more_tool: next
        max_page_size: 100

  # Slash tools with handler files in lib/pito/slash/handlers/

  games:
    # Grammar from config (namespace: :slash) + Slash::Handlers::Games.
    # `/games import [title]` opens the IGDB search sidebar (sidebar_open: "games_import").
    # Controller intercepts `/games import` before async pipeline; handler covers job path.
    #
    # ALSO a chat segment tool: free-chat
    # `games channel @h` drives the channel's games grid — shape-routing keeps
    # the two surfaces apart (`/games …` slash vs bare `games …` chat).
    description: pito.grammar.chat.games
    nl_examples:
      - "show the channel's games"
      - "cover grid please"
      - "which games does my channel have?"
      - "game covers for my channel"
    mcp:
      tool: pito_games
      read_only: true
      description: "List the games a channel plays, as its linked-games cover grid, by @handle. E.g. \"which games does my channel have?\" → \"games channel @handle\"; \"show the channel's games\" → \"games channel @handle\"."
      params:
        channel_ref: { type: string, required: true, hint: "channel @handle" }
      input: "games channel %{channel_ref}"
    auth: session
    chat:
      dispatch: Chat::Handlers::SegmentTool
      segment_of: { tool: show, segment: games }
      slots:
        - name: noun
          kind: enum
          source: nouns
          optional: true
        - name: id
          kind: free
          optional: true
    reply:
      targets:
        channel_detail: { mode: append }
        channel_list:   { mode: append }
    slash:
      auth: authenticated_only
      description: pito.grammar.slash.games
      slots:
        - name: subcommand
          kind: enum
          source: games_subcommands
          optional: true
        - name: title
          kind: free
          optional: true
      dispatch: Slash::Handlers::Games
    # POST /games/search is a cursor feed for the /games import sidebar's IGDB
    # search (viewport-driven `limit`, owner 2026-07-15) — page_size mirrors
    # Pito::Search::Modules::IgdbGames' own default so limit-less callers see
    # no change; max_page_size stays well under IGDB's documented 500-row cap.
    concerns:
      pager:
        page_size: 10
        more_tool: next
        max_page_size: 50

  config:
    # `/config <provider> [key=value …]` — credential + toggle provider management.
    # The grammar uses the `literal` sentinel provider, a conditional `when:` enum
    # (only `sound` takes on/off), and a repeatable `kv` for credential keys — the
    # provider→keys palette shape.
    slash:
      auth: authenticated_only
      description: pito.grammar.slash.config
      slots:
        - name: provider
          kind: literal
          source: config_providers
        - name: state
          kind: enum
          source: on_off
          optional: true
          when:
            provider: [sound]
        - name: settings
          kind: kv
          source: config_keys
          optional: true
          repeatable: true
          when:
            provider: [ai, google, igdb, webhook, me]
      dispatch: Slash::Handlers::Config

  disconnect:
    slash:
      auth: authenticated_only
      description: pito.grammar.slash.disconnect
      slots:
        - name: channel
          kind: enum
          source: channels
          optional: true
      dispatch: Slash::Handlers::Disconnect

  jobs:
    # `/jobs [subcommand] [id|key]` — SolidQueue operator control.
    # validates_own_arity: true — handler manages polymorphic arity (requeue <id>, run <key>).
    slash:
      auth: authenticated_only
      description: pito.grammar.slash.jobs
      slots:
        - name: subcommand
          kind: enum
          source: jobs_subcommands
          optional: true
      dispatch: Slash::Handlers::Jobs

  notifications:
    aliases: [notifs]
    # Opens the notifications sidebar panel (sidebar_open: "notifications").
    # Broadcasts via Pito::Stream::Broadcaster#broadcast_notifications_sidebar.
    slash:
      auth: authenticated_only
      description: pito.grammar.slash.notifications
      slots: []
      dispatch: Slash::Handlers::Notifications
    # GET /notifications.json is a cursor feed for the pito-tui notifications
    # panel (viewport-driven `limit`, owner 2026-07-15) — page_size mirrors
    # Notification::PAGE_SIZE so limit-less callers see no change.
    concerns:
      pager:
        page_size: 50
        more_tool: next
        max_page_size: 100

  rename:
    slash:
      auth: authenticated_only
      description: pito.grammar.slash.rename
      slots:
        - name: title
          kind: free
          optional: true
      dispatch: Slash::Handlers::Rename

  themes:
    # Opens the theme picker sidebar entirely client-side (sidebar_open: "theme").
    # Theme selection and preview happen in the sidebar UI via PATCH /settings/theme;
    # there are no subcommands. The dispatcher's arity guard rejects any extra token.
    slash:
      auth: authenticated_only
      description: pito.grammar.slash.theme
      slots: []
      dispatch:
        client: theme

# ── MCP reader tools — no backing tool; read persisted app history ────────
# Declared here (a sibling of `tools:`, not a tool) because they dispatch NOTHING
# through the Router: the Pito::Mcp readers SELECT persisted Conversation/Event rows
# (source: "app" only) and project them through Pito::Mcp::EventText. Read-only by
# construction — there is no chat/slash/reply surface.
mcp_readers:
  pito_conversations:
    tool: pito_conversations
    read_only: true
    description: "List your saved conversations, recency-grouped: uuid, title, and last activity — use this to find which conversation to read, then pass its uuid to pito_messages."
  pito_messages:
    tool: pito_messages
    read_only: true
    description: "Read recent messages from one conversation, newest last. Defaults to the latest active conversation when no uuid is given — call pito_conversations first if you need a different one. Call again for fresher state: pito is pull-only, there is no push."
    params:
      conversation_uuid: { type: string,  required: false, hint: "from pito_conversations; defaults to the latest active conversation" }
      limit:             { type: integer, required: false, hint: "how many recent messages (default 30)" }
