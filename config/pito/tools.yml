# Tool ontology — the config-driven dispatch system (was verbs.yml pre-2.0).
schema_version: 1

# Universal reply actions offered on followupable events (Share::UniversalActions).
# share:  withheld on :confirmation kind + unresolved messages;
# revoke: additionally gated on a Share record existing for the event.
# `help` is NOT a reply tool — the `--help` FLAG on replies/tools is a separate
# surface and stays.
#
# HOW TO remove share/unshare|revoke from a tool's messages:
#   Add `universal_reply: false` to that tool's entry below (top level, next to
#   `auth:`). Every message that tool emits then gets NO share/unshare|revoke —
#   no reply handle minted just for them, no palette suggestions, and a typed
#   `#handle share` is refused. The tool's OWN reply actions are unaffected.
#   Worked example: the `sync` tool below. Universal actions never override a
#   tool's own declarations: a reply token the target declares itself always
#   routes to the tool, not to the universal set.
universal_reply:
  share:  { mode: append, kinds: [system, enhanced, system_follow_up, enhanced_follow_up, ai] }
  revoke: { mode: append, aliases: [unshare], kinds: [system, enhanced, system_follow_up, enhanced_follow_up, ai] }

# Static + dynamic vocabulary declarations. Faithful transcription of
# lib/pito/grammar/vocabularies.rb — implementations remain in Ruby.
vocabularies:
  nouns:
    members: [channels, vids, games]
    synonyms: {channel: channels, video: vids, videos: vids, vid: vids, game: games, gamez: games}
  slash_tools:
    members: [config, disconnect, help, themes]
  config_providers:
    # AI config has exactly ONE slash surface: `/config ai` (+ kwargs). The
    # per-provider names deliberately do NOT appear here — no spillage.
    # `embeddings` (P8, 3.0.1) is getter-only — a status readout (embedder
    # reachability + embedded/total counts), never a credential provider.
    members: [ai, tavily, google, igdb, webhook, sound, timezone, embeddings]
  config_keys:
    members: [client_id, client_secret, redirect_uri, api_key, slack, discord, model]
  genres:
    # ONE vocab for find slots, the chat list filter, --help and MCP (v1.6
    # unification — GameListFilter's private alias maps derive from here).
    # Members mirror the IGDB genres the library actually carries; the
    # member→match-substring behavior stays in Ruby (GameListFilter).
    members: [Shooter, Simulation, RPG, Racing, Strategy, Sports, Puzzle, Platformer,
              Fighting, Adventure, Action, Indie, "Hack and slash"]
    synonyms: {fps: Shooter, shooter: Shooter, sim: Simulation, simulation: Simulation,
               rpg: RPG, "role-playing": RPG, racing: Racing, strategy: Strategy,
               sports: Sports, sport: Sports, puzzle: Puzzle, platformer: Platformer,
               platform: Platformer, fighting: Fighting, adventure: Adventure,
               hack: "Hack and slash", beat: "Hack and slash",
               "hack-and-slash": "Hack and slash"}
  platforms:
    # "Xbox" (the bare family) is a deliberate member: as an ILIKE substring it
    # matches One / Series X / Series S / the combined "Series X|S" — so plain
    # `xbox` tracks the whole family (Series S too, not only X).
    # PlayStation / Xbox Series / Nintendo / Mobile are family members for the
    # same reason: chat `ps`/`playstation`/`sony` cover PS4+PS5, `mobile` covers
    # iOS+Android (v1.6 unification with the chat list filter; Arcade stays
    # dropped).
    members: ["PlayStation 5", "Nintendo Switch", PC, Xbox, "Xbox Series X",
              "Xbox Series S", "PlayStation 4", "Xbox One", iOS, Android,
              PlayStation, "Xbox Series", Nintendo, Mobile]
    synonyms: {ps5: "PlayStation 5", ps4: "PlayStation 4", playstation: PlayStation,
               ps: PlayStation, psn: PlayStation, sony: PlayStation, switch: "Nintendo Switch",
               nintendo: Nintendo, steam: PC, pc: PC, windows: PC,
               xbox: Xbox, microsoft: Xbox, xsx: "Xbox Series X",
               "series x": "Xbox Series X", xss: "Xbox Series S",
               "series s": "Xbox Series S", xbs: "Xbox Series",
               xb1: "Xbox One", xbone: "Xbox One",
               iphone: iOS, ipad: iOS, mobile: Mobile}
  release_status:
    members: [released, upcoming, tba]
    synonyms: {unreleased: upcoming, "to be announced": tba, tbd: tba}
  metrics:
    members: [subs, views, ctr, "watch time"]
    synonyms: {subscriber: subs, subscribers: subs, "watched hours": "watch time", hours: "watch time"}
    fillers: [count, ratio]
  on_off:
    # QUOTED — YAML 1.1 coerces bare on/off/yes/no to booleans.
    members: ["on", "off"]
    synonyms: {"true": "on", "false": "off", enable: "on", disable: "off", "yes": "on", "no": "off",
               enabled: "on", disabled: "off"}
  hashtag_tools:
    members: [with, without]
    synonyms: {drop: without, delete: without, include: with}
  fillers:
    members: []
    fillers: [the, a, an, games, game, please, by, ordered, sorted, show, me]
  connectives:
    members: [and, for]
  games_subcommands:
    members: [import]
  jobs_subcommands:
    members: [status, requeue, run, pause, resume]
  import_nouns:
    members: [game]
    synonyms: {games: game}
  sync_targets:
    members: [channels, vids]
    synonyms: {channel: channels, video: vids, videos: vids, vid: vids}
  schedule_whens:
    members: [slate]
  visit_destinations:
    members: [youtube, studio]
    synonyms: {channel: youtube, yt: youtube}
  update_nouns:
    members: [game, vid]
    synonyms: {games: game, video: vid, videos: vid, vids: vid}
  update_fields:
    members: [footage, price, platform, description, tags]
  full_flag:
    members: [full]
  show_segments:
    members: ["at-a-glance", channels, detail, game, games, similar, videos]
    synonyms: {similars: similar, vids: videos, "linked-vids": videos}
  analyze_segments:
    members: [numbers, breakdowns]
  search_nouns:
    members: [games, conversations, vids]
    synonyms: {game: games, conversation: conversations, vid: vids, video: vids, videos: vids}
  # Dynamic vocabularies — resolved at runtime via Grammar::Vocabulary resolver lambdas.
  channels:      { resolver: channels }
  conversations: { resolver: conversations }
  game_titles:   { resolver: game_titles }
  video_titles:  { resolver: video_titles }

# NL mapper knobs (3.0.0, Fable-authored) — one ontology, three consumers:
# the router reads thresholds + synonyms; the GBNF mapper retrieval-picks
# the nearest exemplars for its few-shot prompt; the calibration suite
# (spec/fixtures/nl_calibration.yml) measures the thresholds empirically —
# these starting values hold only until that suite pins better ones.
nl:
  # Measured 2026-07-16 against the live sidecar, PREFIXED embeddings (the
  # EmbeddingGemma `task: sentence similarity | query: ` prompt prefix now
  # applied at the wire level to every vector — see
  # app/services/pito/embedding/client.rb) — a full live run of the 58-entry
  # calibration fixture against the 189-phrase corpus, both sides prefixed.
  # True-garbage ceiling is now ~0.709 ("do the thing"; "asdfghjkl" 0.57);
  # domain-adjacent rejects reach as high as 0.81 ("write a description for
  # vid 3") but are TOLERATED by design — a confirm-first did-you-mean for
  # those is correct behavior, not a false positive (see
  # spec/fixtures/nl_calibration.yml's tolerated_suggest: tier). The
  # genuine-positive floor recovered at 0.72 (three positives now live
  # between 0.72-0.754, previously swallowed whole by the old 0.75 floor).
  # auto_run's top band holds >=0.88, all correct-tool; the worst wrong-tool
  # score measured was ~0.75 — comfortably below 0.90, so auto_run is
  # unchanged. DECISION (X6, 3.0.1): suggest 0.75 -> 0.72; auto_run stays
  # 0.90. Two of the hardest positives ("dig up the clip where I rage quit
  # tekken" 0.7078, "tekken 8 just dropped to 39.99" 0.7169) still fall short
  # even at 0.72 — moved to nl_calibration.yml's known_gaps: for corpus
  # growth to rescue later. The calibration suite re-measures on every change.
  # DECISION (owner, 2026-07-20/21 interview): auto_run 0.90 -> 0.85;
  # suggest 0.72 -> 0.65 (briefly 0.50 the same night; the interview's
  # noise review settled 0.65 — silences the sub-0.65 junk band
  # (weather 0.553, mash 0.584, world cup 0.599, pasta 0.608) while
  # keeping the two hardest real positives, 0.7078/0.7169, as
  # did-you-means). Tolerated by owner ruling despite sitting above the
  # floor: "do the thing" 0.71; "can you edit my thumbnail" 0.667 is a
  # veto-in-spirit — corpus-shape it down when possible. "make me
  # famous" measures exactly 0.65: boundary, re-measure each change.
  # The calibration suite re-measures on every change.
  thresholds: { auto_run: 0.85, suggest: 0.65 }
  # Lexical snapping BEFORE embedding — the cheap normalization pass.
  synonyms:
    clips: vids
    films: vids
    collection: library
    catalogue: library
    catalog: library
    subscriptions: subs
    achievements: shinies
    milestones: shinies
    trophies: shinies
    recommendations: similar
    lookalikes: similar
    remove: delete
    erase: delete
    # 2026-07-20/21 owner interview batch. NO soulslike snap by ruling —
    # soulslike is a trait tag now (config/pito/traits.yml), so the word must
    # reach the embedding intact. NOTE on the two multi-word keys ("kid
    # friendly", "for the kids"): approved as-is, but INERT today —
    # Pito::Nl::Router#normalize and Pito::Nl::Mapper#normalize both fold
    # synonyms token-by-token (single-word lookup), so a multi-word key never
    # matches until a phrase-level pass lands. Declared anyway so the ruling
    # is on record and the pass has its data waiting.
    punishing: brutal
    kid friendly: family friendly
    for the kids: family friendly
    covers: games
    shelf: games
    wall: games
    gimme: show
    peek: glance
    rundown: glance
    snapshot: glance
  # Worked examples for the mapper's few-shot prompt — HARD cases on
  # purpose: numeral-bearing titles, number words, filler-heavy phrasing,
  # multi-slot composition. Disjoint from every tool's nl_examples (the
  # router's neighbors) and from the calibration corpus (the held-out
  # test set) — three sets, three jobs.
  exemplars:
    - { say: "could you please show me everything in my games library", run: "ls games" }
    - { say: "hey pito can you list only the rpg ones", run: "ls rpg games" }
    - { say: "show game twelve", run: "show game 12" }
    - { say: "similar stuff to game forty two", run: "similar 42" }
    - { say: "is there anything like tekken 8 in my library", run: "search games like tekken 8" }
    - { say: "exact matches for games named tekken", run: "search games for tekken" }
    - { say: "search my chats for that time we talked about mortal kombat 2", run: "search conversations for mortal kombat 2" }
    - { say: "what did we decide about thumbnails last month", run: "search conversations for thumbnails" }
    # 3.1.1 — qualitative, vibe-first phrasing (no title, no named seed) that
    # should compose the new `about` keyword, not `like` (needs a seed to
    # rank against) or `for` (exact wording). Distinct pattern from the two
    # `search` pairs above: those name or quote something exact; these
    # describe a feeling.
    - { say: "something brutal but worth every second", run: "search games about brutal but worth every second" }
    - { say: "relaxing games i can chill with", run: "search games about relaxing chill" }
    - { say: "vids about scary moments", run: "search vids about scary moments" }
    - { say: "a story that actually got to me emotionally", run: "search games about story that got to me emotionally" }
    - { say: "something chaotic and fast paced that never lets up", run: "search games about chaotic fast paced never lets up" }
    - { say: "link that new vid 14 to elden ring which is game 3", run: "link 14 3" }
    - { say: "unhook vid 9 from whatever game it's on", run: "unlink 9" }
    - { say: "how many hours did I sink into game 8? set it to 12", run: "update game footage 8 12" }
    - { say: "make game 5 cost 19.99", run: "update game price 5 19.99" }
    - { say: "game 7 also runs on the switch", run: "update game platform 7 switch" }
    - { say: "queue vid 3 to go live saturday", run: "schedule 3 saturday" }
    - { say: "get vid eleven off youtube's public listing", run: "unlist 11" }
    - { say: "the analytics for the last week on vid 4", run: "analyze vid 4" }
    - { say: "give me the lifetime spread for game 2", run: "breakdowns game 2" }
    - { say: "vids for my main channel please", run: "videos" }
    - { say: "who publishes game 3?", run: "channels 3" }
    - { say: "bring hades 2 in from igdb", run: "import game hades 2" }
    - { say: "pull the freshest data for my vids from youtube", run: "sync vids" }
    - { say: "how close am I to my next subs shiny", run: "shinies" }
    # X7 (3.0.1) — indirect/no-verb-cue phrasings for the 5 patterns measured
    # live as mapper blind spots (spec/fixtures/nl_mapper_calibration.yml
    # known_gaps:). Distinct wording from those fixture `say:` strings on
    # purpose (teach the PATTERN, don't memorize the held-out test).
    - { say: "surface whatever info you're holding on vid 8", run: "show vid 8" }
    - { say: "give me the two-second version of how vid 9 is doing", run: "at-a-glance vid 9" }
    - { say: "go see if there are any new uploads waiting to be pulled in", run: "sync vids" }
    - { say: "what else in my library scratches the same itch as game 11", run: "similar game 11" }
    - { say: "vid 14 must belong to some title in my library, which one", run: "game vid 14" }
    # 3.8.0 repair batch (2026-07-20/21 interview): Q27b-B HOLDS `similar`
    # for style/vein phrasing and orders exemplar growth — the 3.8.0
    # ontology chain had flipped the mapper's composition for that family to
    # `search … like` (see spec/fixtures/nl_mapper_calibration.yml). Plus
    # first exemplar coverage for the analyze-full composition family the
    # Q23/Q27 pins expect ("analyze channels full" / "analyze vid N full").
    - { say: "other games with the same style as game 18", run: "similar game 18" }
    - { say: "stuff in the same vein as game 4", run: "similar game 4" }
    - { say: "crack the channel wide open for me", run: "analyze channels full" }
    - { say: "crack open vid 12, the full picture", run: "analyze vid 12 full" }
    # Mapper-hardening batch (2026-07-20/21 interview — same pass as the
    # write-tool guard in lib/pito/nl/mapper.rb). One worked example per
    # family the interview pinned, each disjoint from every nl_examples row
    # and both calibration fixtures (Q55 law — same intent, fresh wording):
    #   * trend-ask -> the analyze-full shape (Q23 pin; last measured
    #     mis-composition was "channels trend this month" -> :channels);
    #   * pull-up-details -> "show game 7 full" (Q21 pin; game-7 id on
    #     purpose — this embedder is heavily id-token sensitive);
    #   * crack-open -> "analyze vid 30 full" (Q27 pin's remaining exemplar
    #     work: the composition kept dropping the id — see
    #     spec/fixtures/nl_calibration.yml's crack-open comment);
    #   * peek/rundown -> glance shapes, authored in POST-SNAP vocabulary
    #     (peek/rundown/snapshot all fold to `glance` via nl.synonyms before
    #     the prompt is built, so the exemplar matches what the model sees);
    #   * id-similarity law (Q51): "similar in style to game N" wording
    #     composes `similar N` — NEVER a search-like command for an
    #     id-referenced ask;
    #   * pair-order: link taught with the GAME named first — the command
    #     stays `link <vid> <game>` regardless of phrase order;
    #   * play-next -> the Q49 backlog-shaped list the corpus pass pinned
    #     (nl_calibration.yml's suggest-tier run:, byte-identical).
    - { say: "how has the channel been trending lately", run: "analyze channels full" }
    - { say: "pull up everything we have on game 7", run: "show game 7 full" }
    - { say: "crack vid 30 open all the way", run: "analyze vid 30 full" }
    - { say: "just a quick glance at vid 21", run: "at-a-glance vid 21" }
    - { say: "glance over game 6 for me", run: "at-a-glance game 6" }
    - { say: "something in a similar style to game 33", run: "similar 33" }
    - { say: "attach game 5 to vid 22", run: "link 22 5" }
    - { say: "which title should I fire up next", run: "ls games with footage sort footage" }

tools:
  # ─── Chat tools ──────────────────────────────────────────────────────────────

  list:
    # Aliases sourced from lib/pito/grammar/specs.rb — :list spec, aliases: [:ls]
    aliases: [ls]
    description: pito.grammar.chat.list
    nl_examples:
      - "list me the vids"
      - "show me my games"
      - "what's in my library?"
      - "what rpg games do I have?"
      - "list all my channels"
      - "show me everything I've got"
      - "can you list my videos"
      - "what games do I own?"
      - "gimme the game list"
      - "what vids are there?"
      - "list some shooters"
      - "show me my platformer games"
      - "any racing games in the library?"
      - "list all my fighting games"
      # 3.8.0 repair batch (2026-07-20 live measurement): the Q49 design pick
      # answers "what should I play next?" with a backlog-shaped list (see
      # nl_calibration.yml's suggest-tier comment) — without these rows the
      # play-next ask drifted to similar's "if I loved game 9, what's next?"
      # @0.734; "which game should I pick up next?" re-anchors it to list
      # @0.903.
      - "which game should I pick up next?"
      - "what's next up on my backlog?"
    mcp:
      tool: pito_list
      read_only: true
      description: "List your library — games, vids (videos), or channels — for browsing/filtering, not single-entity detail (use pito_show for one item). Prefer this over repeated pito_show calls: append extra `columns`, restrict with `filter`, and `sort` in ONE call — the valid values for each are enumerated per-noun in the param descriptions. `ids` restricts to specific numeric ids. E.g. \"what rpg games do I have?\" → \"list games rpg\"; \"list all my channels\" → \"list channels\"; \"show me my platformer games\" → \"list games platformer\"."
      params:
        noun:    { type: string, enum: [games, vids, channels], required: true, hint: "what to list" }
        columns: { type: array,  items: string, required: false, capability: columns, hint: "extra kv-table columns to append to the table" }
        filter:  { type: array,  items: string, required: false, capability: filters, hint: "restrict the list to a subset" }
        sort:    { type: string, required: false, capability: sort, hint: "column to sort by, optionally followed by desc (e.g. price desc)" }
        ids:     { type: array,  items: integer, required: false, hint: "restrict to these numeric ids" }
      input: "list %{noun}"
      input_suffixes:
        ids:     " %{values}"
        filter:  " %{values}"
        columns: " with %{values}"
        sort:    " sort %{value}"
    availability:
      chat: true
      slash: false
    auth: session
    chat:
      dispatch: Chat::Handlers::List
      slots:
        - name: noun
          kind: enum
          source: nouns
          optional: true
    concerns:
      pager:
        page_size: 50
        more_tool: next
    # v1.6 unified grammar — the CONFIG vocabulary --help / MCP / autocomplete read.
    # Behavior (cell/sort procs) stays in Ruby `{Game,Video,Channel}::ListColumns`,
    # keyed by these names; the orphan-guard spec keeps config ↔ Ruby in 1:1 sync.
    capabilities:
      columns:
        games:
          platform:  { aliases: [platforms],  sortable: false, requires_with: true, desc: pito.copy.help.columns.games.platform }
          genre:     { aliases: [genres],      sortable: true,  requires_with: true, desc: pito.copy.help.columns.games.genre }
          developer: { aliases: [dev],         sortable: true,  requires_with: true, desc: pito.copy.help.columns.games.developer }
          publisher: { sortable: true,  requires_with: true, desc: pito.copy.help.columns.games.publisher }
          channels:  { aliases: [channel],     sortable: true,  requires_with: true, desc: pito.copy.help.columns.games.channels }
          footage:   { sortable: true,  requires_with: true, desc: pito.copy.help.columns.games.footage }
          price:     { aliases: [prices],      sortable: true,  requires_with: true, desc: pito.copy.help.columns.games.price }
          views:     { sortable: true,  requires_with: true, desc: pito.copy.help.columns.games.views }
          likes:     { sortable: true,  requires_with: true, desc: pito.copy.help.columns.games.likes }
        vids:
          channel:    { sortable: true,  requires_with: true, desc: pito.copy.help.columns.vids.channel }
          visibility: { aliases: [status],     sortable: true,  requires_with: true, desc: pito.copy.help.columns.vids.visibility }
          game:       { aliases: [games],      sortable: true,  requires_with: true, desc: pito.copy.help.columns.vids.game }
          duration:   { aliases: [length],     sortable: true,  requires_with: true, desc: pito.copy.help.columns.vids.duration }
          views:      { sortable: true,  requires_with: true, desc: pito.copy.help.columns.vids.views }
          likes:      { sortable: true,  requires_with: true, desc: pito.copy.help.columns.vids.likes }
          category:   { aliases: [categories], sortable: false, requires_with: true, desc: pito.copy.help.columns.vids.category }
          publish_at: { aliases: [publish],    sortable: true,  requires_with: true, desc: pito.copy.help.columns.vids.publish_at }
          scheduled:  { internal: true, sortable: false, requires_with: true, desc: pito.copy.help.columns.vids.scheduled }
        channels:
          subs:  { aliases: [sub, subscribers],   sortable: true, requires_with: true, default: true, desc: pito.copy.help.columns.channels.subs }
          views: { aliases: [view],               sortable: true, requires_with: true, default: true, desc: pito.copy.help.columns.channels.views }
          vids:  { aliases: [vid, videos, video], sortable: true, requires_with: true, default: true, desc: pito.copy.help.columns.channels.vids }
          likes: { sortable: true, requires_with: true, desc: pito.copy.help.columns.channels.likes }
      filters:
        games:
          upcoming: { tokens: [upcoming], scope: upcoming, desc: pito.copy.help.filters.games.upcoming }
          genre:    { vocabulary: genres,    desc: pito.copy.help.filters.games.genre }
          platform: { vocabulary: platforms, desc: pito.copy.help.filters.games.platform }
        vids:
          published: { tokens: [published], scope: published, desc: pito.copy.help.filters.vids.published }
          unlisted:  { tokens: [unlisted],  scope: unlisted,  desc: pito.copy.help.filters.vids.unlisted }
          scheduled: { tokens: [scheduled], scope: scheduled, desc: pito.copy.help.filters.vids.scheduled }
          # `draft` is a token ALIAS for the same private_unscheduled scope,
          # not a separate filter (3.0.1 P11) — YouTube Studio's own UI calls
          # an unpublished, not-yet-scheduled upload a "draft", so an owner
          # typing `ls draft vids` means exactly what `ls private vids` means.
          private:   { tokens: [private, draft], scope: private_unscheduled, desc: pito.copy.help.filters.vids.private }

  show:
    description: pito.grammar.chat.show
    nl_examples:
      - "show me game 42"
      - "open vid 17"
      - "details for game 42"
      - "what do we know about vid 9?"
      - "pull up game 12"
      - "let me see vid 3"
      - "open game 9"
      - "bring up vid 21"
      - "pull up game 3's details"
      - "pull up my channel"
      - "open @gmrdad82"
      - "show the channel page for @gmrdad82"
      - "what does game 7 look like?"
      # 3.8.0 repair batch (2026-07-20 live measurement): Q36's approved
      # "show me game 7's connections" (linked) landed nearer the auto_run
      # fixture row "pull up the details for game 7" than any show anchor
      # (linked @0.850 vs show @0.841) — this embedder is heavily id-token
      # sensitive, so only a game-7 show row re-anchors it (show @0.964).
      - "bring up game 7's details"
    mcp:
      tool: pito_show
      read_only: true
      description: "Open one game, vid, or channel in full detail by id — for a quick read use pito_glance, for metrics over time use pito_analyze. `ref` is a numeric id (games/vids), an @handle (channels), or — for games/vids — a title resolved exact-first (falls back to a looser match). Optionally request extra segments such as similar, videos, channels, games, or at-a-glance. E.g. \"show me game 42\" → \"show game 42\"; \"open vid 17\" → \"show vid 17\"; \"pull up game 3's details\" → \"show game 3\"."
      params:
        noun:     { type: string, enum: [game, vid, channel], required: true }
        ref:      { type: string, required: true, hint: "numeric id (e.g. 3); an @handle for channels; or, for games/vids, a title resolved exact-first (falls back to a looser match)" }
        segments: { type: array, items: string, required: false, hint: "extra sections, e.g. [similar, at-a-glance]" }
      input: "show %{noun} %{ref}"
      input_suffixes:
        segments: " with %{values}"
    auth: session
    chat:
      dispatch: Chat::Handlers::Show
      slots:
        - name: id
          kind: free
          optional: true
        - name: full
          kind: enum
          source: full_flag
          optional: true
        - name: with
          kind: enum
          source: show_segments
          optional: true
          repeatable: true
          introducer: with
        - name: only
          kind: enum
          source: show_segments
          optional: true
          repeatable: true
          introducer: only
        - name: without
          kind: enum
          source: show_segments
          optional: true
          repeatable: true
          introducer: without
          introducer: without
      # id_only_resolution! active — title lookup is disabled; handler reads message.raw.
    segments:
      # Ordered emission list per entity; faithfully transcribed from Pito::Chat::Segments::TABLE.
      channel:
        detail:
          builder: MessageBuilder::Channel::Detail
          kind: system
          default: true
          fill: ~
          reply_target: channel_detail
          emit_if: ~
        # The channel's linked GAMES grid: similar-games-style
        # cards (strip cover, #id + per-channel vid count, no title/score),
        # alphabetical, 5 per row. Declared BEFORE videos so `full` lands it
        # between detail and the vids table. Skipped silently when the channel
        # has no linked games (mirrors videos/has_any_videos).
        games:
          builder: MessageBuilder::Channel::Games
          kind: enhanced
          default: false
          fill: ~
          reply_target: channel_games
          emit_if: has_linked_games
        videos:
          builder: MessageBuilder::Channel::Videos
          kind: enhanced
          default: false
          fill: ~
          reply_target: video_list
          emit_if: has_any_videos
          # `show channel @h with vids` — mirror the game.videos segment alias.
          aliases: [vids]
        "at-a-glance":
          builder: MessageBuilder::Analytics::Enhanced
          kind: enhanced
          default: false
          fill: AnalyticsFillJob
          reply_target: analytics_glance
          emit_if: ~
      vid:
        detail:
          builder: MessageBuilder::Video::Detail
          kind: system
          default: true
          fill: ~
          reply_target: video_detail
          emit_if: ~
        # Renamed from "linked-game": a vid always has just
        # one game, so the token is the bare singular — `show vid #3 with game`.
        # No aliases by design. reply_target unchanged (persisted messages).
        game:
          builder: MessageBuilder::Video::LinkedGame
          kind: enhanced
          default: false
          fill: ~
          reply_target: game_detail
          emit_if: has_linked_game
        "at-a-glance":
          builder: MessageBuilder::Analytics::Enhanced
          kind: enhanced
          default: false
          fill: AnalyticsFillJob
          reply_target: analytics_glance
          emit_if: ~
      game:
        detail:
          builder: MessageBuilder::Game::Detail
          kind: system
          default: true
          fill: ~
          reply_target: game_detail
          emit_if: ~
        similar:
          builder: MessageBuilder::Game::SimilarGames
          kind: enhanced
          default: false
          fill: ~
          reply_target: game_similar
          emit_if: ~
          aliases: [similars]
        # Renamed from "linked-videos" — `show game #3 with
        # vids`. reply_target unchanged (persisted messages + the
        # show/analyze/unlink/sort/with/without matrices keep working).
        videos:
          builder: MessageBuilder::Game::LinkedVideos
          kind: enhanced
          default: false
          fill: ~
          reply_target: game_linked_videos
          emit_if: has_linked_videos
          aliases: [vids, linked-vids]
        channels:
          builder: MessageBuilder::Game::Channels
          kind: enhanced
          default: false
          fill: ChannelDistributionFillJob
          reply_target: game_channels
          emit_if: ~
        "at-a-glance":
          builder: MessageBuilder::Analytics::Enhanced
          kind: enhanced
          default: false
          fill: AnalyticsFillJob
          reply_target: analytics_glance
          emit_if: ~
    reply:
      targets:
        channel_games:
          mode: append
          ref: { resolver: game_by_id }          # `show <id>` → that game from the grid
        game_channels:
          mode: append
          ref: { resolver: channel_by_handle }   # `show @handle` → that channel (args = @handle)
        game_imported:
          mode: append
          ref: { resolver: source_entity }        # imported game from the card's game_id payload
        game_linked_videos:
          mode: append
          ref: { resolver: video_by_id }          # `show <id>` → that linked vid (id-only)
        game_list:
          mode: append
          ref: { resolver: id_among_rows }        # `show <id>` scoped to the listed games
        game_similar:
          mode: append
          ref: { resolver: game_by_id }           # `show <id>` → that similar game (id-only)
        video_list:
          mode: append
          ref: { resolver: id_among_rows }        # `show <id>` scoped to the listed vids
        video_search:
          mode: append
          ref: { resolver: id_among_rows }        # `show <id>` scoped to the ranked vids

  analyze:
    aliases: [analytics, stats]
    description: pito.grammar.chat.analyze
    # NL auto-run gate (P13): executing this mutates no owner data — distinct
    # from mcp.read_only, the strict MCP readOnlyHint (cache warming / external
    # API calls count there, not here). See Pito::Dispatch::Schema::TOOL_KEYS.
    read_only: true
    nl_examples:
      - "analyze my channel"
      - "how is vid 12 performing?"
      - "stats for game 42"
      - "run the numbers on my channel"
      - "how are my views doing?"
      - "analytics for vid 7"
      - "how is the channel doing lately?"
      - "are my subs trending up?"
      - "crunch the numbers on vid 4"
      - "how did that vid do?"
      # 2026-07-20/21 owner interview batch — Q48b: a bare "how are we
      # doing…" is ANALYZE, not glance/breakdowns.
      - "how are we doing this month?"
      - "did the channel grow this week?"
      - "is vid 4 still pulling views?"
      # 3.8.0 repair batch — Q27 ("crack open vid 30 for me" pinned auto_run
      # "analyze vid 30 full"): the crack-open-means-analyze family had zero
      # corpus coverage, so the pinned phrase routed :show @0.762 ("let me
      # see vid 3"). Measured 2026-07-20: same-wording rows with OTHER ids
      # top out ~0.76-0.79 on this id-token-sensitive embedder (a single
      # swapped digit alone costs ~0.10 cosine), so the family carries one
      # vid-30 row in genuinely different wording — the fixture phrase
      # itself stays held out. Re-measured: routes analyze @0.882.
      - "crack open the channel for me"
      - "crack open game 12's numbers"
      - "crack vid 30 open and show me everything"
    mcp:
      tool: pito_analyze
      read_only: false
      description: "YouTube analytics numbers for a game, vid, or channel over a period — trends over time; for lifetime shape use pito_breakdowns, for a one-screen snapshot use pito_glance. Bare (no noun/ref) analyzes all your channels. `period` accepts e.g. 7d, 28d, or lifetime. First call for a period computes and caches the numbers (may query the YouTube Analytics API); repeat calls read the cache. E.g. \"how is vid 12 performing?\" → \"analyze vid 12\"; \"stats for game 42\" → \"analyze game 42\"."
      params:
        noun:   { type: string, enum: [game, vid, channel], required: false }
        ref:    { type: string, required: false, hint: "numeric id or @handle" }
        period: { type: string, required: false, hint: "e.g. 7d, 28d, lifetime" }
      input: "analyze"
      bare_input: "analyze channels"   # the documented "bare = all your channels"
      input_suffixes:
        noun: " %{value}"
        ref:  " %{value}"
    auth: session
    chat:
      dispatch: Chat::Handlers::Analyze
      slots:
        - name: noun
          kind: enum
          source: nouns
          optional: true
        - name: full
          kind: enum
          source: full_flag
          optional: true
          # Mirrors show's `full` (see the show tool's slot below): every
          # segment for the entity — both `numbers` (the default :system
          # card) AND `breakdowns` (the :enhanced card), i.e. ANALYZE_SEGMENTS
          # in full. Pito::Chat::SegmentSelection already recognizes a
          # standalone `full` token generically (see its FULL_RE) regardless
          # of this slot's presence — this declaration exists so the grammar
          # consumers (ghost-text completion, the NL mapper's GBNF grammar)
          # offer/accept it too, matching `show`'s "analyze vid 30 full" /
          # "analyze channels full" / "analyze channel full" auto-run shapes.
        - name: without
          kind: enum
          source: analyze_segments
          optional: true
          repeatable: true
          introducer: without
          introducer: without
          # Metric tokens in the without clause are also accepted — they pass through
          # as extra_vocabulary and are consumed by MetricSelection independently.
      # Handler reads message.raw for entity/id/handle/period; slot drives ghost only.
    segments:
      # All three entities share ANALYZE_SEGMENTS (MessageBuilder::Analyze::Message::SEGMENT_ROLES).
      # numbers → system scaffold; breakdowns → enhanced scaffold.
      channel:
        numbers:
          builder: MessageBuilder::Analyze::Message
          kind: system
          default: true
          fill: ~
          reply_target: analyze_message
          emit_if: ~
        breakdowns:
          builder: MessageBuilder::Analyze::Message
          kind: enhanced
          default: false
          fill: ~
          reply_target: analyze_message
          emit_if: ~
      vid:
        numbers:
          builder: MessageBuilder::Analyze::Message
          kind: system
          default: true
          fill: ~
          reply_target: analyze_message
          emit_if: ~
        breakdowns:
          builder: MessageBuilder::Analyze::Message
          kind: enhanced
          default: false
          fill: ~
          reply_target: analyze_message
          emit_if: ~
      game:
        numbers:
          builder: MessageBuilder::Analyze::Message
          kind: system
          default: true
          fill: ~
          reply_target: analyze_message
          emit_if: ~
        breakdowns:
          builder: MessageBuilder::Analyze::Message
          kind: enhanced
          default: false
          fill: ~
          reply_target: analyze_message
          emit_if: ~
    reply:
      targets:
        analytics_glance:
          mode: append
          # Bare `analyze` re-runs full analysis on glance's scope entity (scope_type/scope_id).
        channel_detail:
          mode: append
          # Entity from event payload channel_id.
        channel_list:
          mode: append
          # analyze @handle → single channel; bare analyze → all listed channel_ids.
        game_detail:
          mode: append
          # Entity from event payload game_id.
        game_linked_videos:
          mode: append
          # Scope is video_ids array from event payload.
        game_list:
          mode: append
          # analyze #3 → single game by id; bare analyze → all listed game_ids.
        video_detail:
          mode: append
          # Entity from event payload video_id.
        video_list:
          mode: append
          # analyze #3 → single vid; bare analyze → all listed video_ids.

  # ─── Segment tools ─────────────────────────────────────────────────
  # Each promotes ONE :enhanced segment of show/analyze into its own top-level chat
  # tool via the single generic Chat::Handlers::SegmentTool — ADDITIVE; show/analyze
  # are untouched. `segment_of` binds the tool to its (parent, segment) pair; entity
  # availability derives from the parent's segments block (schema-validated). The
  # handler drives the parent's emission path forcing `only <segment>`, so a segment
  # tool is byte-identical to `<parent> <noun> <ref> only <segment>`.

  "at-a-glance":
    aliases: [glance, overview]
    description: pito.grammar.chat.at-a-glance
    read_only: true # NL auto-run gate (P13): mutates no owner data (≠ mcp.read_only — see analyze)
    nl_examples:
      - "give me the overview"
      - "quick summary of my channel"
      - "how do things look at a glance?"
      - "glance at vid 12"
      - "quick look at game 3"
      - "just the highlights please"
      - "the quick rundown please"
      - "give me a glance at vid 2"
      - "the rundown for vid 2"
      - "what's the tl;dr on vid 9?"
      - "give me the snapshot for game 4"
      - "quick peek at my channel numbers"
      # 2026-07-20/21 owner interview batch — the gimme/rundown wording
      # family ("gimme the rundown on vid 11" was a nl_calibration.yml
      # known_gap; owner-approved into the corpus, so it LEFT the fixture per
      # the Q55 disjointness law) plus the one-screen framing.
      - "gimme the rundown on vid 11"
      - "quick peek at game 4"
      - "the thirty-second version of my channel"
      - "vid 9 in one screen"
      # 3.8.0 measured nudges (2026-07-20 live calibration): glance-ON-game
      # phrasing in post-snap vocabulary (snapshot/peek/rundown all snap to
      # `glance` now, and "give me the snapshot on game 9" had drifted to
      # :show @0.811), plus a channel-scoped N-second row so the version-of
      # family covers entities beyond "my channel".
      - "glance at game 9 for me"
      - "the quick glance on game 2"
      - "the sixty-second version of the channel"
    mcp:
      tool: pito_glance
      read_only: false
      description: "Quick one-screen analytics snapshot for one game, vid, or channel — no deep dive; for trends use pito_analyze, for lifetime shape use pito_breakdowns. `period` accepts e.g. 7d, 28d, or lifetime. First call for a period computes and caches the numbers (may query the YouTube Analytics API); repeat calls read the cache. E.g. \"glance at vid 12\" → \"at-a-glance vid 12\"; \"quick look at game 3\" → \"at-a-glance game 3\"."
      params:
        noun:   { type: string, enum: [game, vid, channel], required: true }
        ref:    { type: string, required: true, hint: "numeric id or @handle" }
        period: { type: string, required: false, hint: "e.g. 7d, 28d, lifetime" }
      input: "at-a-glance %{noun} %{ref}"
    auth: session
    chat:
      dispatch: Chat::Handlers::SegmentTool
      segment_of: { tool: show, segment: "at-a-glance" }
      slots:
        - name: noun
          kind: enum
          source: nouns
          optional: true
        - name: id
          kind: free
          optional: true
    reply:
      targets:
        channel_detail: { mode: append }
        game_detail:    { mode: append }
        video_detail:   { mode: append }
        channel_list:   { mode: append }
        game_list:      { mode: append }
        video_list:     { mode: append }
        video_search:   { mode: append }

  # `videos channel @h` AND `vids game #3` — the flat form
  # drives the `videos` segment on whatever entity the noun resolves. Absorbs
  # the retired standalone `linked-videos` tool (linked-vids stays typeable).
  videos:
    aliases: [vids, linked-vids]
    description: pito.grammar.chat.videos
    nl_examples:
      - "what vids does this channel have?"
      - "show the vids linked to game 42"
      - "videos for my channel"
      - "which vids belong to that game?"
      - "list the channel's videos"
      - "the linked vids for game 7"
      # 2026-07-20/21 owner interview batch.
      - "everything filmed on game 7"
      - "all the clips for tekken"
      - "the full vid list for game 2"
      # 3.8.0 measured nudge (2026-07-20 live calibration): question-form
      # filmed-on asks drifted to the game tool's "the game behind vid 8"
      # ("what got filmed on game 8?" -> game @0.826 vs this row @0.887).
      - "all the vids filmed on game 8"
    mcp:
      tool: pito_videos
      read_only: true
      description: "List the videos of a channel (by @handle) or the videos linked to a game (by numeric id) — a listing, not analytics (use pito_analyze/pito_glance for metrics). E.g. \"what vids does this channel have?\" → \"videos channel @handle\"; \"show the vids linked to game 42\" → \"videos game 42\"."
      params:
        noun: { type: string, enum: [channel, game], required: true }
        ref:  { type: string, required: true, hint: "numeric game id or channel @handle" }
      input: "videos %{noun} %{ref}"
    auth: session
    chat:
      dispatch: Chat::Handlers::SegmentTool
      segment_of: { tool: show, segment: videos }
      slots:
        - name: noun
          kind: enum
          source: nouns
          optional: true
        - name: id
          kind: free
          optional: true
    reply:
      targets:
        # `vids` accepted as a reply wherever `videos` is (tool-level aliases are
        # excluded from reply tokens by design — must be per-target).
        channel_detail: { mode: append, aliases: [vids] }
        game_detail:    { mode: append, aliases: [vids] }
        channel_list:   { mode: append, aliases: [vids] }
        game_list:      { mode: append, aliases: [vids] }

  # Renamed from "linked-game": a vid has just one game,
  # so the tool is the bare singular — `game vid #10`. No aliases by design;
  # the two-word `linked game #7` keyed form below is unaffected.
  game:
    description: pito.grammar.chat.game
    nl_examples:
      - "which game is vid 12 about?"
      - "what game is linked to that vid?"
      - "the game for vid 7 please"
      - "what's vid 3's game?"
      - "which game does vid 5 belong to?"
      - "the game behind vid 8"
    mcp:
      tool: pito_game_of_vid
      read_only: true
      description: "Show which game a given video is linked to. E.g. \"which game is vid 12 about?\" → \"game vid 12\"; \"the game for vid 7 please\" → \"game vid 7\"."
      params:
        vid_ref: { type: string, required: true, hint: "numeric video id" }
      input: "game vid %{vid_ref}"
    auth: session
    chat:
      dispatch: Chat::Handlers::SegmentTool
      segment_of: { tool: show, segment: game }
      slots:
        - name: noun
          kind: enum
          source: nouns
          optional: true
        - name: id
          kind: free
          optional: true
    reply:
      targets:
        video_detail: { mode: append }
        video_list:   { mode: append }
        video_search: { mode: append }

  similar:
    aliases: [similars]
    description: pito.grammar.chat.similar
    nl_examples:
      - "games like game 42"
      - "what's similar to tekken?"
      - "recommend games similar to 12"
      - "show me lookalikes for game 7"
      - "anything else like this game?"
      # 2026-07-20/21 owner interview batch.
      - "more like game 5 please"
      - "same vibe as game 12"
      - "if I loved game 9, what's next?"
      - "what scratches the same itch as game 3?"
      # 3.8.0 measured nudge (2026-07-20 live calibration): the energy
      # wording of the vibe family ("more games with game 7's energy" ->
      # videos @0.769 without it, similar @0.876 with it).
      - "games with the same energy as game 7"
    mcp:
      tool: pito_similar
      read_only: true
      description: "Show games similar to a given game, by numeric id. To seed by title instead of an id, use the chat `search games like <title>` flow (not exposed to MCP). E.g. \"games like game 42\" → \"similar game 42\"; \"show me lookalikes for game 7\" → \"similar game 7\"."
      params:
        game_ref: { type: string, required: true, hint: "numeric game id" }
      input: "similar game %{game_ref}"
    auth: session
    chat:
      dispatch: Chat::Handlers::SegmentTool
      segment_of: { tool: show, segment: similar }
      slots:
        - name: noun
          kind: enum
          source: nouns
          optional: true
        - name: id
          kind: free
          optional: true
    reply:
      targets:
        game_detail: { mode: append }
        game_list: { mode: append }

  channels:
    aliases: [handles]
    description: pito.grammar.chat.channels
    read_only: true # NL auto-run gate (P13): mutates no owner data (≠ mcp.read_only — see analyze)
    nl_examples:
      - "who publishes this game?"
      - "which channels cover game 42?"
      - "channels for tekken"
      - "who else plays this game?"
      - "which channels play game 9?"
      - "who covers game 3?"
      # 3.8.0 measured nudge (2026-07-20 live calibration): the interview's
      # `covers -> games` synonym rewrites who-else-COVERS asks into
      # "who else games …" before embedding, which drifted the family to
      # :show ("who else covers game 9?" -> show @0.842 vs channels @0.838).
      # This row re-anchors it (re-measured -> channels @0.876).
      - "who else is putting out game 9 vids?"
    mcp:
      tool: pito_channels_of_game
      read_only: false
      description: "Show which channels cover a given game (channel distribution), by numeric game id. First call computes watch-time via the YouTube Analytics API and caches it for a day; repeat calls read the cache. E.g. \"which channels cover game 42?\" → \"channels game 42\"; \"who covers game 3?\" → \"channels game 3\"."
      params:
        game_ref: { type: string, required: true, hint: "numeric game id" }
      input: "channels game %{game_ref}"
    auth: session
    chat:
      dispatch: Chat::Handlers::SegmentTool
      segment_of: { tool: show, segment: channels }
      slots:
        - name: noun
          kind: enum
          source: nouns
          optional: true
        - name: id
          kind: free
          optional: true
    reply:
      targets:
        game_detail: { mode: append }
        game_list: { mode: append }

  breakdowns:
    aliases: [breakdown, lifetime, life]
    description: pito.grammar.chat.breakdowns
    read_only: true # NL auto-run gate (P13): mutates no owner data (≠ mcp.read_only — see analyze)
    nl_examples:
      - "lifetime breakdown for my channel"
      - "how do views distribute over time?"
      - "breakdown of vid 12"
      - "lifetime stats for game 42"
      - "show me the distribution"
      # 2026-07-20/21 owner interview batch.
      - "where do game 4's views come from?"
      - "split my channel's watch time up"
      - "what carries vid 9, browse or search?"
      # 3.8.0 measured nudge (2026-07-20 live calibration): split-up wording
      # scoped to a GAME id — without it the id token dragged the ask to
      # at-a-glance's "quick look at game 3" ("split game 3's views up for
      # me" -> at-a-glance @0.758 vs this row @0.849).
      - "split game 3's watch time up by source"
    mcp:
      tool: pito_breakdowns
      read_only: false
      description: "Lifetime analytics breakdowns (percentages by dimension) for a game, vid, or channel — the whole-life shape, not a bounded window (use pito_analyze for a period). First call computes and caches the numbers; repeat calls read the cache. E.g. \"breakdown of vid 12\" → \"breakdowns vid 12\"; \"lifetime stats for game 42\" → \"breakdowns game 42\"."
      params:
        noun: { type: string, enum: [game, vid, channel], required: false }
        ref:  { type: string, required: false, hint: "numeric id or @handle" }
      input: "breakdowns"
      input_suffixes:
        noun: " %{value}"
        ref:  " %{value}"
    auth: session
    chat:
      dispatch: Chat::Handlers::SegmentTool
      segment_of: { tool: analyze, segment: breakdowns }
      slots:
        - name: noun
          kind: enum
          source: nouns
          optional: true
        - name: id
          kind: free
          optional: true

  # The `linked` two-word forms — a PER-NOUN keyed `segment_of`.
  # Unlike the flat segment tools above (where the typed noun routes the entity in
  # the parent), here the NOUN names WHAT YOU GET (the segment) and the id belongs
  # to the OTHER entity, so each branch FORCES the parent's entity branch:
  #   linked game #7  → the linked-game card OF vid #7   (== show vid #7 only linked-game)
  #   linked vids #3  → the linked-videos table OF game #3 (== show game #3 only linked-videos)
  # Coexists with the one-word game / videos segment tools. The
  # branch `aliases:` mirror the `nouns` vocabulary synonyms (videos → vids, …).
  linked:
    description: pito.grammar.chat.linked
    read_only: true # NL auto-run gate (P13): mutates no owner data (see analyze)
    nl_examples:
      - "what's linked to vid 12?"
      - "show the links for game 42"
      - "is that vid linked to anything?"
      - "what vids hang off game 7?"
      # 2026-07-20/21 owner interview batch.
      - "is vid 9 attached to anything?"
      - "what's hanging off game 3?"
      - "does vid 2 have a game yet?"
      - "show me game 7's connections"
    auth: session
    chat:
      dispatch: Chat::Handlers::SegmentTool
      segment_of:
        game: { tool: show, segment: game,   entity: vid,  aliases: [games, gamez] }
        vids: { tool: show, segment: videos, entity: game, aliases: [videos, video, vid] }
      slots:
        - name: noun
          kind: enum
          source: nouns
          optional: true
        - name: id
          kind: free
          optional: true

  import:
    description: pito.grammar.chat.import
    nl_examples:
      - "import tekken 8 from igdb"
      - "add a new game called hades"
      - "bring in elden ring"
      - "import game inscryption"
      - "add that game to my library"
      # 2026-07-20/21 owner interview batch.
      - "grab silksong from igdb"
      - "add that new zelda to the shelf"
    auth: session
    # Import progress/result messages are operational chatter — not shareable.
    universal_reply: false
    chat:
      dispatch: Chat::Handlers::Import
      slots:
        # The noun is optional now — `import <title>` imports a game (games
        # are the only importable thing). `import game[s] <title>` still works,
        # and `import videos` stays the sync-vids alias.
        - name: noun
          kind: enum
          source: import_nouns
          optional: true
        - name: title
          kind: free
          optional: true

  sync:
    description: pito.grammar.chat.sync
    nl_examples:
      - "sync my vids"
      - "pull the latest from youtube"
      - "refresh my channels"
      - "sync everything from youtube"
      - "update my library from youtube"
      # 2026-07-20/21 owner interview batch.
      - "check youtube for new uploads"
    auth: session
    # Sync status messages are operational chatter — not shareable (see the
    # HOW-TO on the universal_reply block at the top of this file).
    universal_reply: false
    chat:
      dispatch: Chat::Handlers::Sync
      slots:
        - name: target
          kind: enum
          source: sync_targets
          optional: true
      # Handler reads message.raw for noun/ref routing.
    reply:
      targets:
        channel_detail:
          mode: append
          ref: { resolver: source_entity }   # channel from payload channel_id
        game_detail:
          mode: append
          ref: { resolver: source_entity }   # game from payload game_id
        video_detail:
          mode: append
          ref: { resolver: source_entity }   # video from payload video_id

  delete:
    aliases: [rm, del]
    description: pito.grammar.chat.delete
    nl_examples:
      - "delete vid 12"
      - "remove game 42 from my library"
      - "get rid of that game"
      - "drop vid 9"
      # 2026-07-20/21 owner interview batch (Q55 corpus side — held-out twins
      # live in spec/fixtures/nl_calibration.yml's suggest tier).
      - "kill vid 4"
      - "game 12 was a mistake, drop it"
      - "trash that vid"
      - "wipe game 3 off the shelf"
      # 3.8.0 repair batch (2026-07-20 live measurement): Q14-B/Q15-A want
      # DELETE offered for get-rid/throw-away asks, but the held-out twins
      # lost to same-id magnets ("get rid of vid 3" -> unlist's "take vid 3
      # off the listing" @0.926; "throw away game 9" -> show's "open game 9"
      # @0.822) — on this id-token-sensitive embedder only same-id rows in
      # different wording outrank them (re-measured: delete @0.935/@0.954).
      - "vid 3 needs to go, delete it"
      - "throw game 9 in the trash"
    auth: session
    chat:
      dispatch: Chat::Handlers::Delete
      slots:
        - name: title
          kind: enum
          source: game_titles
          optional: true
    reply:
      targets:
        game_detail:
          mode: append
          aliases: [rm, del]
          ref: { resolver: source_entity }   # game from payload game_id
        game_list:
          mode: append
          aliases: [rm, del]
          ref: { resolver: id_among_rows }   # `delete <id>` scoped to the listed games
        video_detail:
          mode: append
          aliases: [rm, del]
          ref: { resolver: source_entity }   # video from payload video_id
        video_list:
          mode: append
          aliases: [rm, del]
          ref: { resolver: id_among_rows }   # `delete <id>` scoped to the listed vids
        video_search:
          mode: append
          aliases: [rm, del]
          ref: { resolver: id_among_rows }   # `delete <id>` scoped to the ranked vids

  reindex:
    description: pito.grammar.chat.reindex
    nl_examples:
      - "reindex game 42"
      - "re-embed vid 12"
      - "refresh the embedding for tekken"
      - "rebuild game 7's index"
      - "re-embed that game again"
      - "refresh vid 4's embedding"
      # 2026-07-20/21 owner interview batch.
      - "redo game 5's embedding"
    auth: session
    chat:
      dispatch: Chat::Handlers::Reindex
      slots:
        - name: title
          kind: enum
          source: game_titles
          optional: true
    reply:
      targets:
        game_detail:
          mode: append
          ref: { resolver: source_entity }   # game from payload game_id
        video_detail:
          mode: append
          ref: { resolver: source_entity }   # video from payload video_id

  publish:
    aliases: [pub]
    description: pito.grammar.chat.publish
    nl_examples:
      - "publish vid 12"
      - "make vid 7 public"
      - "push that vid live"
      - "release vid 3 now"
      # 2026-07-20/21 owner interview batch.
      - "vid 9 is ready, ship it"
      - "put vid 3 out now"
      - "go live with vid 7"
      - "flip vid 2 to public"
    auth: session
    chat:
      dispatch: Chat::Handlers::Publish
      slots:
        - name: title
          kind: free
          optional: true
    reply:
      targets:
        video_detail:
          mode: append
          aliases: [pub]
          ref: { resolver: source_entity }   # video from payload video_id
        video_list:
          mode: append
          aliases: [pub]
          ref: { resolver: id_among_rows }   # `publish <id>` scoped to the listed vids
        video_search:
          mode: append
          aliases: [pub]
          ref: { resolver: id_among_rows }   # `publish <id>` scoped to the ranked vids

  unlist:
    description: pito.grammar.chat.unlist
    nl_examples:
      - "unlist vid 12"
      - "hide vid 7 from the public"
      - "take vid 3 off the listing"
      - "make vid 5 unlisted"
      - "vid 8 shouldn't be public anymore"
      - "pull vid 2 out of public view"
      - "switch vid 6 to unlisted"
    auth: session
    chat:
      dispatch: Chat::Handlers::Unlist
      slots:
        - name: title
          kind: free
          optional: true
    reply:
      targets:
        video_detail:
          mode: append
          ref: { resolver: source_entity }   # video from payload video_id
        video_list:
          mode: append
          ref: { resolver: id_among_rows }   # `unlist <id>` scoped to the listed vids
        video_search:
          mode: append
          ref: { resolver: id_among_rows }   # `unlist <id>` scoped to the ranked vids

  schedule:
    description: pito.grammar.chat.schedule
    nl_examples:
      - "schedule vid 12 for friday"
      - "publish vid 7 next monday"
      - "set vid 3 to go live on the slate"
      - "queue vid 9 for release"
      - "vid 5 should drop next tuesday"
      - "put vid 2 on the calendar for the weekend"
      - "let's go live with vid 8 tomorrow"
      - "vid 4 goes out the 20th"
      # 2026-07-20/21 owner interview batch.
      - "queue vid 5 for tomorrow evening"
      - "put vid 8 out saturday morning"
      - "vid 12 goes live in three days"
      - "line up vid 4 for next friday at 5pm"
      # 3.8.0 repair batch (2026-07-20 live measurement): the slot-in /
      # pencil-in wording family — without it the held-out twin "slot vid 6
      # in for sunday night" routed :unlist @0.669; with these it lands
      # schedule @0.741.
      - "pencil vid 9 in for saturday night"
      - "slot vid 3 into thursday evening"
    auth: session
    chat:
      dispatch: Chat::Handlers::Schedule
      slots:
        - name: title
          kind: free
          optional: true
        - name: slate
          kind: enum
          source: schedule_whens
          optional: true
      # Handler parses id + <when> from message.raw via Schedule::TimeParser.
    reply:
      targets:
        video_detail:
          mode: append
          ref: { resolver: source_entity }   # video from payload video_id
          args:
            when: { resolver: schedule_expression }   # reply args ARE the when-phrase
        video_list:
          mode: append
          ref: { resolver: id_among_rows }   # row id sliced from the leading token
          args:
            when: { resolver: schedule_expression }   # `<when>` after the sliced row id
        video_search:
          mode: append
          ref: { resolver: id_among_rows }   # row id sliced from the leading token
          args:
            when: { resolver: schedule_expression }   # `<when>` after the sliced row id

  # `find:` intentionally declares NO chat/slash branch (3.0.1 P6) — it exists
  # ONLY to keep its nl_examples: feeding the NL corpus. Its old chat: block
  # first-token-captured every "find …" input with no chat.dispatch handler
  # behind it, so "find vids about tekken" (its own documented example)
  # permanently returned tool_not_implemented and the NL gate never got a
  # chance to route it. Removing the branch lets "find …" fall through to
  # :unknown, where the NL gate (router score → mapper → auto-run /
  # did-you-mean) actually resolves it — typically to search/list.
  # `reply: {}` is a deliberate no-op stub, not a real branch: Schema requires
  # every tool to declare at least one of chat/slash/reply
  # (Pito::Dispatch::Schema "tool declares no branch"), and an empty targets-
  # less reply block satisfies that without generating a grammar Spec (only
  # chat:/slash: keys do — Pito::Grammar::ConfigSource) or a real reply target.
  find:
    description: pito.grammar.chat.find
    nl_examples:
      - "find vids about tekken"
      - "which vids are rpg?"
      - "find my videos on ps5 games"
      - "find vids titled boss fight"
      - "find that boss fight clip"
      - "find vids where I talk about controller settings"
      - "any vids about the tekken 8 launch?"
      - "find the highlight reel from last month"
    reply: {}

  # `search games|vids|conversations like|for|about <query>` — the library
  # search. The free `query` slot slurps "[noun] <keyword> <query>"; the
  # handler parses the earliest-typed keyword: `like` = seed similarity
  # (GameSimilarity / vid neighbors) for games/vids, `for` = lexical matching
  # (every noun), `about` (3.1.1 games/vids, 2026-07-18 owner unlock adds
  # conversations) = free-text semantic search via Pito::Search::Semantic for
  # games/vids. No keyword = `about` for games/vids (3.1.2, the owner's
  # vectors catch-all) but stays lexical `for` for conversations — bare never
  # had seed-resolution semantics for THIS noun to escape from, so there's no
  # gap for `about` to fill (see Pito::Chat::Handlers::SearchConversations'
  # class header). Conversations' `like` and `about` are synonyms of ONE
  # semantic path (Pito::Chat::Handlers::SearchConversations#search_like) —
  # a conversation has no title to seed `like` from the way a game/vid does,
  # so both keywords just embed the query text. Games render a game_list card
  # (so #id replies, sort/with, and more/next paging all work via the
  # existing pager).
  search:
    description: pito.grammar.chat.search
    read_only: true # NL auto-run gate (P13): mutates no owner data (see analyze)
    nl_examples:
      - "search games like tekken"
      - "find games similar to street fighter"
      - "search games for tekken"
      - "which games are called tekken something?"
      - "search conversations for tekken combos"
      - "find the chat where we discussed thumbnails"
      - "look up conversations about pricing"
      - "where did we talk about that game?"
      # 2026-07-20/21 owner interview batch — conversation recall in owner
      # voice.
      - "when did we talk about thumbnails?"
      - "what did we decide about pricing?"
      - "that chat where we planned the tekken series"
      # traits-design.md section 8 (3.1.0) — difficulty/relaxing/worth-it
      # flavored phrases so free-text trait talk routes here, where the query
      # embeds against game vectors that now carry trait words (Game::EmbedText).
      - "games with hard bosses"
      - "something brutally difficult"
      - "got a souls-like challenge for me?"
      - "relaxing games for tonight"
      - "something chill and cozy to play"
      - "easy games I can play with the kids"
      - "which games were worth every buck?"
      - "games actually worth my time"
      - "story games that hit me in the feels"
      - "fast paced chaotic action games"
      # 3.1.1 — the trait batch above is games-only; `about` also searches
      # vids (videos.summary_embedding), a phrasing space this corpus never
      # covered before (every other vids-noun phrase above is a `like`/`for`
      # keyword match, not a vibe).
      - "clips about my funniest fails"
      - "videos where things go hilariously wrong"
      - "vids about my most intense moments"
      # 2026-07-20/21 owner interview batch (Q1-Q4 ruling): trait/vibe
      # wording is SEARCH, always — even dressed in my-library / do-I-own
      # clothes; ownership framing never turns a vibe ask into list. The
      # held-out proof rows (punishing boss fights / soulslike / cozy pick)
      # stay in nl_calibration.yml and must route :search.
      - "any soulslike in my collection"
      - "something cozy for tonight"
      - "brutal boss-fight games I own"
      - "games that will absolutely wreck me"
      - "which of my games are family friendly?"
      - "a mellow one to wind down with after work"
      - "something wholesome for the kids in my library"
      # 3.8.0 measured nudges (2026-07-20 live calibration): trait wording
      # WITH the "in/from my library" ownership frame — without these, the
      # frame's pull toward list's "what's in my library?" beat the trait
      # signal ("anything with punishing boss fights in my library?" ->
      # list @0.757; "what's a cozy pick from my library?" -> list @0.844).
      - "any brutal bosses in my library?"
      - "cozy picks from my library"
      # 3.8.0 repair batch — Q22-A ("find my boss fight vids" rescued into
      # search vids): the boss-fight VIDS wording had no corpus row (the
      # trait rows above are games-noun), so the held-out phrase routed
      # :list @0.752. Re-measured 2026-07-20 with these: search @0.967.
      - "search my vids for boss fights"
      - "find vids of me fighting bosses"
    auth: session
    chat:
      dispatch: Chat::Handlers::Search
      slots:
        - name: noun
          kind: enum
          source: search_nouns
          optional: true
        - name: query
          kind: free
          optional: true
    concerns:
      pager:
        page_size: 20
        more_tool: next
        max_page_size: 100

  # The consolidated metadata-setter tool — the commands the AI suggests and
  # only the owner runs. Game fields (footage/price/platform) write locally at
  # once; vid fields (description/tags) stage a confirmation whose `yes` pushes
  # ONLY that field to YouTube. The old typed `footage update` form redirects
  # here. OWNER DIRECTIVE Q16/Q16b (3.8.0): the standalone `price` and
  # `platform` tools — chat AND their card/list reply forms (`#g3 price 20`,
  # `#g3 platform ps5`) alike — are RETIRED; `update` is now the only surface
  # for every game-field write. `<id>` + the raw rest-of-line value parse from
  # message.raw.
  update:
    description: pito.grammar.chat.update
    nl_examples:
      - "update game 12 price to 20"
      - "change vid 7's description"
      - "set new tags on vid 3"
      - "change game 5's price to 30"
      - "set the footage on game 2"
      - "update the footage on game 42"
      # Migrated from the retired `price` tool's nl_examples (Q16b) — GOOD
      # set-flavored phrasings only; unset/clear-flavored ones dropped (update
      # has no clear-to-null equivalent).
      - "set the price of game 12 to 59.99"
      - "game 42 cost me 20 euros"
      - "game 3 goes for 15 euros"
      - "tekken 8 is 49.99 now"
      - "game 9 is free now"
      - "game 6 dropped to 9.99"
      - "put a 25 dollar price tag on game 2"
      # Migrated from the retired `platform` tool's nl_examples (Q16b) —
      # ADD-flavored phrasings only; remove-flavored ones dropped (update
      # never removes a platform).
      - "add ps5 to game 12"
      - "game 42 is also on switch"
      - "set game 3's platform to xbox"
      - "tekken 8 just came out on switch"
      - "add pc as a platform for game 4"
      - "game 6 also plays on ps5"
      # 2026-07-20/21 owner interview batch — footage DELTAS in owner voice
      # ("logged three more hours", not "set footage to N"; footage is the
      # one field the NL gate may auto-run — see nl_auto_run_fields below).
      - "logged three more hours on elden ring"
      - "recorded another session of game 4"
      - "add two hours of footage to game 7"
      - "played game 9 for another ninety minutes"
      # …and price in owner voice (still confirm-gated like every non-footage
      # field).
      - "picked up game 5 for 12 bucks"
      - "game 3 was on sale, 9.99"
      - "paid full whack for game 8 — seventy"
      # 3.8.0 measured nudge (2026-07-20 live calibration): UK-slang price
      # amounts scored below the 0.65 floor without an anchor ("grabbed
      # game 10 for a tenner" -> nil @0.619; @0.823 with this row).
      - "paid a tenner for game 6"
    auth: session
    # OWNER DIRECTIVE Q17 (3.8.0): footage updates are NL-AUTO-RUN. The NL
    # gate never auto-runs a write tool — EXCEPT for the field(s) declared
    # here: a routed/mapped `update … footage …` command may run without a
    # confirm because footage is a LOCAL-ONLY, freely reversible column
    # (games.footage_hours never pushes anything to YouTube, and a wrong
    # total is one more `update game footage` away from fixed). Every OTHER
    # update field stays confirm-gated — description/tags push to YouTube,
    # price/platform are writes the owner still wants gated — and every
    # other write tool is untouched. The gate check is FIELD-AWARE (the
    # mapped command's own field token — Pito::Chat::Handlers::Unknown
    # #auto_run_field?), never tool-blanket; the schema-integrity suite pins
    # this exact declared set, so widening it is a reviewed act.
    nl_auto_run_fields: [footage]
    chat:
      dispatch: Chat::Handlers::Update
      slots:
        - name: noun
          kind: enum
          source: update_nouns
          optional: true
        - name: field
          kind: enum
          source: update_fields
          optional: true

  # The AI entry tool — everything after `@ai` is raw free text handed to the
  # orchestrator loop (the handler reads message.raw; the grammar never
  # normalizes it). The parser fuses the lexer's bare "@" + word and downcases,
  # so @AI/@Ai/@aI all reach here. Deliberately NOT exposed to MCP.
  #
  # Reply form: `#<handle> @ai <text>` continues the thread ANCHORED on the
  # replied-to card — every list/show/analyze mint below, not only a prior
  # :ai answer (the owner's "their full options" scoping; nothing outside
  # this roster gets it). One target-agnostic path (Chat::Handlers::Ai via
  # ToolDelegator + the uniform Router contract) handles ALL of them: the
  # orchestrator guarantees the anchored exchange rides in the model's
  # context even when it has scrolled out of the history window, and
  # projects the anchored card's REAL content under an explicit ANCHOR block
  # (Ai::Projector) — never raw jsonb, never a lossy history accident.
  #
  # `enabled_if: ai_configured` (Pito::Dispatch::Availability) is a
  # PRESENTATION-ONLY gate: when no AI provider/model/key is configured,
  # `@ai` drops out of every reply palette/help listing (Pito::FollowUp::
  # Registry#presentable_actions_for) and the chat palette (a sibling task) —
  # but a typed `@ai …` / `#<handle> @ai …` still dispatches HONESTLY into
  # the existing polite not_configured error (AiOrchestratorJob rescues
  # Ai::Client::NotConfigured); presentation is gated, dispatch never lies.
  "@ai":
    description: pito.grammar.chat.ai
    auth: session
    enabled_if: ai_configured
    chat:
      dispatch: Chat::Handlers::Ai
      # Explicit per-message opt-in for the web tool pair (P14): only a prompt
      # carrying this flag hands web_search/web_fetch to the model.
      web_flag: "--web"
      slots:
        - name: prompt
          kind: free
          optional: true
    reply:
      targets:
        # The list mints (Chat::Handlers::List) — table_rows cards.
        game_list:
          mode: append
        video_list:
          mode: append
        channel_list:
          mode: append
        # The show mints (Chat::Handlers::Show segments) — detail cards +
        # their enhanced card sub-targets.
        channel_detail:
          mode: append
        video_detail:
          mode: append
        game_detail:
          mode: append
        channel_games:
          mode: append
        game_channels:
          mode: append
        game_similar:
          mode: append
        game_linked_videos:
          mode: append
        # The analyze mint (MessageBuilder::Analyze::Message) — both roles
        # (numbers/breakdowns) stamp this SAME target.
        analyze_message:
          mode: append
        # The show `at-a-glance` segment mint (MessageBuilder::Analytics::Enhanced).
        analytics_glance:
          mode: append
        # The pre-existing target: a prior :ai answer.
        ai_message:
          mode: append

  link:
    description: pito.grammar.chat.link
    nl_examples:
      - "link vid 12 to game 42"
      - "vid 7 belongs to tekken"
      - "connect that vid to game 3"
      - "attach vid 9 to game 5"
      - "vid 4 is actually elden ring, link it up"
      - "hook vid 8 up with game 5"
      - "tie vid 2 to the tekken 8 entry"
      - "this vid goes with game 11"
      # 2026-07-20/21 owner interview batch (Q47) — relink directives in
      # owner voice: a mis-filed vid names its REAL game, no link verb.
      - "vid 3 is actually hollow knight"
      - "that vid's on the wrong game — it's game 8"
      - "vid 11 and game 2 go together"
    auth: session
    chat:
      dispatch: Chat::Handlers::Link
      slots:
        - name: title
          kind: free
          optional: true
      # Handler splits on ` to ` to extract game ref and video ref.
    reply:
      targets:
        # Dual-ref: `link [5] to [video] 12` carries a SOURCE (the card's payload
        # entity, or the id LEFT of the connector) AND a TARGET list (the ids after
        # `to`/`with`). `link_source` + `link_targets` split on the connector
        # themselves and derive the source/target class from the reply_target.
        game_detail:
          mode: append
          ref: { resolver: link_source }              # source game (payload game_id)
          args:
            linked_ref: { resolver: link_targets }    # target video(s) after `to`/`with`
        game_list:
          mode: append
          ref: { resolver: link_source }              # source game (id LEFT of the connector)
          args:
            linked_ref: { resolver: link_targets }    # target video(s) after `to`/`with`
        video_detail:
          mode: append
          ref: { resolver: link_source }              # source video (payload video_id)
          args:
            linked_ref: { resolver: link_targets }    # target game(s) after `to`/`with`
        video_list:
          mode: append
          ref: { resolver: link_source }              # source video (id LEFT of the connector)
          args:
            linked_ref: { resolver: link_targets }    # target game(s) after `to`/`with`
        video_search:
          mode: append
          ref: { resolver: link_source }              # source video (id LEFT of the connector)
          args:
            linked_ref: { resolver: link_targets }    # target game(s) after `to`/`with`

  unlink:
    description: pito.grammar.chat.unlink
    nl_examples:
      - "unlink vid 12 from game 42"
      - "detach that vid from its game"
      - "remove the link on vid 7"
      - "vid 9 isn't actually tekken, unlink it"
      - "pull vid 4 off of game 2"
      - "that vid got linked to the wrong game, unlink 6"
      - "break the connection between vid 3 and its game"
      # 2026-07-20/21 owner interview batch (Q47).
      - "divorce vid 6 from its game"
    auth: session
    chat:
      dispatch: Chat::Handlers::Unlink
      slots:
        - name: title
          kind: free
          optional: true
    reply:
      targets:
        # Same dual-ref shape as `link` (connector = `from`). game_linked_videos
        # resolves its SOURCE as the parent Game via the payload game_id (its
        # reply_target ≠ "video*"), and its TARGET as the typed video id.
        game_detail:
          mode: append
          ref: { resolver: link_source }              # source game (payload game_id)
          args:
            linked_ref: { resolver: link_targets }    # target video(s) after `from`
        game_linked_videos:
          mode: append
          ref: { resolver: link_source }              # source Game (payload game_id)
          args:
            linked_ref: { resolver: link_targets }    # target video id (among the listed videos)
        game_list:
          mode: append
          ref: { resolver: link_source }              # source game (id LEFT of the connector)
          args:
            linked_ref: { resolver: link_targets }    # target video(s) after `from`
        video_detail:
          mode: append
          ref: { resolver: link_source }              # source video (payload video_id)
          args:
            linked_ref: { resolver: link_targets }    # target game(s) after `from`
        video_list:
          mode: append
          ref: { resolver: link_source }              # source video (id LEFT of the connector)
          args:
            linked_ref: { resolver: link_targets }    # target game(s) after `from`
        video_search:
          mode: append
          ref: { resolver: link_source }              # source video (id LEFT of the connector)
          args:
            linked_ref: { resolver: link_targets }    # target game(s) after `from`

  help:
    # Chat branch: displays all follow-up targets grouped by entity.
    # Slash branch: full sectioned help (authenticated) or login hint (unauthenticated).
    description: pito.grammar.chat.help
    read_only: true # NL auto-run gate (P13): mutates no owner data (see analyze)
    nl_examples:
      # (no bare "help" phrase — the literal word parses via the grammar; as
      # a router row it was a single-token similarity magnet, like greet's.)
      - "what can you do?"
      - "show me the commands"
      - "how does this work?"
      - "list the tools"
      - "what are you capable of?"
      - "how do I use this thing?"
      - "what is pito able to do?"
    auth: session
    # Help pages are reference chrome — not shareable.
    universal_reply: false
    chat:
      dispatch: Chat::Handlers::Help
      slots: []
    slash:
      auth: any
      description: pito.grammar.slash.help
      slots: []
      dispatch: Slash::Handlers::Help

  shinies:
    description: pito.grammar.chat.shinies
    nl_examples:
      - "show my shinies"
      - "what achievements do I have?"
      - "any new milestones?"
      - "achievement progress for my channel"
      - "how close am I to the next shiny?"
      # 2026-07-20/21 owner interview batch.
      - "any new trophies this week?"
      - "what did I unlock lately?"
      - "how close is game 2 to its next milestone?"
      - "brag sheet for my channel"
      # 3.8.0 measured nudge (2026-07-20 live calibration): a vid-scoped
      # trophy row — without one, vid+trophy asks drifted to analyze's
      # vid-numbers family ("how far is vid 4 from its next trophy?" ->
      # analyze @0.775).
      - "how close is vid 7 to its next trophy?"
    mcp:
      tool: pito_shinies
      read_only: true
      description: "Show the shinies (achievement chips / award ladders) earned by a game, vid, or channel. E.g. \"achievement progress for my channel\" → \"shinies channel @handle\"; \"what achievements do I have?\" → \"shinies channel @handle\" (swap noun/ref for a game or vid)."
      params:
        noun: { type: string, enum: [game, vid, channel], required: true }
        ref:  { type: string, required: true, hint: "numeric id or @handle" }
      input: "shinies %{noun} %{ref}"
    auth: session
    chat:
      dispatch: Chat::Handlers::Shinies
      slots:
        - name: target
          kind: free
          optional: true
      # Handler reads noun (channel/video/game) + ref from message.raw.
    reply:
      targets:
        # Bare `shinies` on a channel card reads the source entity —
        # completes the owner's show/list x channel/vid/game reply matrix.
        channel_detail:
          mode: append
          ref: { resolver: source_entity }
        channel_list:
          mode: append
          ref: { resolver: channel_by_handle }   # `shinies @handle` (args = @handle)
        game_detail:
          mode: append
          ref: { resolver: source_entity }        # game from payload game_id
        game_list:
          mode: append
          ref: { resolver: id_among_rows }        # `shinies <id>` scoped to the listed games
        video_detail:
          mode: append
          ref: { resolver: source_entity }        # video from payload video_id
        video_list:
          mode: append
          ref: { resolver: id_among_rows }        # `shinies <id>` scoped to the listed vids
        video_search:
          mode: append
          ref: { resolver: id_among_rows }        # `shinies <id>` scoped to the ranked vids

  greet:
    description: pito.grammar.chat.greet
    nl_examples:
      - "hi"
      - "hello pito"
      - "hey there"
      - "good morning"
      - "yo"
    auth: session
    chat:
      dispatch: Chat::Handlers::Greeting
      slots: []
      # Recognised by whole-input phrase match in Pito::Chat::Parser (single or multi-word,
      # case-insensitive, punctuation-tolerant). Spec exists for handler↔spec parity + help.

  farewell:
    description: pito.grammar.chat.farewell
    nl_examples:
      - "bye"
      - "goodnight pito"
      - "see you later"
      - "I'm off"
      - "cya"
    auth: session
    chat:
      dispatch: Chat::Handlers::Farewell
      slots: []
      # Recognised by whole-input phrase match in Pito::Chat::Parser. Spec for parity + help.

  # ─── Reply-only tools (no chat branch) ───────────────────────────────────────

  next:
    # Pager tool: `more_tool: next` in the list pager concern.
    # No chat branch — only available as a follow-up reply on paginated list targets.
    # `more` is accepted as a per-target alias (natural word for "show more").
    reply:
      targets:
        channel_list:
          mode: append
          concern: pager
          aliases: [more]
        game_list:
          mode: append
          concern: pager
          aliases: [more]
        video_list:
          mode: append
          concern: pager
          aliases: [more]
        # search vids pager parity with game_list: a ranked_ids cursor pages
        # the same way a plain list's does (see Pito::FollowUp::Handlers::
        # VideoList#list_next_videos, inherited by VideoSearch). sort/order/
        # analyze stay undeclared for video_search — re-sorting or
        # re-analyzing a ranking doesn't make sense the way it does for a
        # real list.
        video_search:
          mode: append
          concern: pager
          aliases: [more]

  visit:
    # Opens a vid's YouTube page, or a channel's YouTube page / Studio, in
    # browser (lib/pito/chat/handlers/visit.rb — typed AND reply, one handler).
    # Bare `visit` (no destination) returns needs_destination error.
    description: pito.grammar.chat.visit
    nl_examples:
      - "open vid 5 on youtube"
      - "take me to vid 7 in studio"
      - "open my channel on youtube"
      - "jump to the studio page for vid 3"
      - "visit vid 12 on yt"
      - "take me to the studio page for vid 8"
      - "open channel @gmrdad82 on youtube"
      - "pull up my channel's studio page"
      - "go to vid 9's youtube page"
      - "open the youtube page for @gmrdad82"
    auth: session
    chat:
      dispatch: Chat::Handlers::Visit
      slots:
        - name: target
          kind: free
          optional: true
      # Handler parses the subject (vid/channel/bare) + destination from message.raw.
    reply:
      targets:
        channel_detail:
          mode: append
          ref: { resolver: source_entity }              # channel from payload channel_id
          args:
            destination: { resolver: visit_destination } # reply args = the destination word
        video_detail:
          mode: append
          ref: { resolver: source_entity }              # video from payload video_id
          args:
            destination: { resolver: visit_destination }
        video_list:
          mode: append
          ref: { resolver: id_among_rows }               # row id sliced from the leading token
          args:
            destination: { resolver: visit_destination } # destination after the sliced row id
        video_search:
          mode: append
          ref: { resolver: id_among_rows }               # row id sliced from the leading token
          args:
            destination: { resolver: visit_destination }
        game_linked_videos:
          mode: append
          ref: { resolver: id_among_rows }               # bare row id scoped to the linked vids
          args:
            destination: { resolver: visit_destination }
        channel_list:
          mode: append
          ref: { resolver: channel_by_handle }           # `visit @handle <destination>`
          args:
            destination: { resolver: visit_destination }
        game_channels:
          mode: append
          ref: { resolver: channel_by_handle }           # `visit @handle <destination>`
          args:
            destination: { resolver: visit_destination }

  sort:
    aliases: [order]
    # Reply-only tool on list targets — re-sorts the stamped list in place.
    # Accepts optional leading `by` particle; trailing `desc`/`asc` direction.
    # Unknown column token is a lenient no-op (rows stay in stamped order).
    reply:
      targets:
        channel_list:
          mode: mutate
          aliases: [order]
          args:
            clause: { resolver: sort_clause }
        game_linked_videos:
          mode: mutate
          aliases: [order]
          args:
            clause: { resolver: sort_clause }
        game_list:
          mode: mutate
          aliases: [order]
          args:
            clause: { resolver: sort_clause }
        video_list:
          mode: mutate
          aliases: [order]
          args:
            clause: { resolver: sort_clause }

  with:
    # Reply tool with two distinct semantics depending on target:
    #   analytics cards → metric inclusion (MetricSelection)
    #   list targets    → column inclusion (ListColumns vocabulary)
    # Mode differs per target (append on analytics_glance, mutate on others).
    reply:
      targets:
        analytics_glance:
          mode: append
          args:
            metrics: { resolver: metric_list }
        analyze_message:
          mode: mutate
          args:
            metrics: { resolver: metric_list }
        game_linked_videos:
          mode: mutate
          args:
            columns: { resolver: column_list }
        game_list:
          mode: mutate
          args:
            columns: { resolver: column_list }
        video_list:
          mode: mutate
          args:
            columns: { resolver: column_list }
        video_search:
          mode: mutate
          args:
            columns: { resolver: column_list }
        channel_list:
          mode: mutate
          args:
            columns: { resolver: column_list }

  without:
    # Inverse of `with`: metric exclusion (analytics) or column removal (lists).
    reply:
      targets:
        analytics_glance:
          mode: append
          args:
            metrics: { resolver: metric_list }
        analyze_message:
          mode: mutate
          args:
            metrics: { resolver: metric_list }
        game_linked_videos:
          mode: mutate
          args:
            columns: { resolver: column_list }
        game_list:
          mode: mutate
          args:
            columns: { resolver: column_list }
        video_list:
          mode: mutate
          args:
            columns: { resolver: column_list }
        video_search:
          mode: mutate
          args:
            columns: { resolver: column_list }
        channel_list:
          mode: mutate
          args:
            columns: { resolver: column_list }

  apply:
    # Reply tool on :ai messages — STAGES the answer's suggested command into
    # the chatbox; it NEVER runs it. The web client intercepts this token
    # client-side (chat_form_controller.js: Enter on `#<handle> apply|use|
    # accept` clicks the answer's accept chip — the
    # [data-pito-use-widget-fill] span, wired to pito--chat-prefill#fill,
    # which writes straight into the chatbox textarea, no clipboard, no
    # POST). This reply-tool branch is the non-web FALLBACK (see
    # follow_up/handlers/ai_message.rb): it hands the command text back as a
    # system message for the owner to copy/type themselves.
    # Aliases live on the TARGET (not top-level, unlike confirm/cancel below)
    # so use/accept surface as their own actions_for("ai_message") tokens —
    # the follow-up palette needs them selectable, not just chat-context
    # synonyms of apply (see resume_missing's new → aliases:[create] for the
    # same per-target pattern).
    reply:
      targets:
        ai_message:
          mode: append
          aliases: [use, accept]

  confirm:
    # Reply tool on confirmation events — executes the pending command.
    # Aliases per Confirmation::ACTION_ALIASES: yes/y/ok/approve/true → confirm.
    aliases: ["yes", y, ok, approve, "true"]
    reply:
      targets:
        confirmation:
          mode: append

  cancel:
    # Reply tool on confirmation events — cancels the pending command.
    # Aliases per Confirmation::ACTION_ALIASES: no/n/false/discard → cancel.
    aliases: ["no", "n", "false", discard]  # "no" QUOTED — YAML 1.1 boolean
    reply:
      targets:
        confirmation:
          mode: append

  consume:
    # Internal reply tool on channel_visit / video_visit events.
    # Triggered programmatically by pito--auto-visit Stimulus controller via
    # Channels::VisitsController#consume / Videos::VisitsController#consume;
    # NOT shown in user-facing palettes.
    # Flips the visit card from :visiting → :visited state (mutate in place).
    internal: true
    reply:
      targets:
        channel_visit:
          mode: mutate
        video_visit:
          mode: mutate

  # ─── Slash tools ─────────────────────────────────────────────────────────────
  # Controller-routed specs (login/logout/connect/new/resume): NO handler class in
  # lib/pito/slash/handlers/ — the chat_controller slash path executes them,
  # declared via `dispatch: { controller: <tool> }`. Grammar comes from config.

  login:
    aliases: [authenticate]
    # Login confirmations carry session context — never shareable.
    universal_reply: false
    slash:
      auth: unauthenticated_only
      description: pito.grammar.slash.login
      slots:
        - name: code
          kind: free
          optional: false
      dispatch:
        controller: login

  logout:
    aliases: [exit, quit]
    # Slash result chrome, not a shareable artifact (see the HOW-TO at the top
    # of this file) — same reasoning applies to every remaining slash tool below.
    universal_reply: false
    slash:
      auth: authenticated_only
      description: pito.grammar.slash.logout
      slots: []
      dispatch:
        controller: logout

  connect:
    universal_reply: false
    slash:
      auth: authenticated_only
      description: pito.grammar.slash.connect
      slots: []
      dispatch:
        controller: connect

  new:
    # Slash: create a new named conversation (controller-routed).
    # Reply: create the named conversation from a resume_missing card (aliases: create).
    universal_reply: false
    slash:
      auth: authenticated_only
      description: pito.grammar.slash.new
      slots:
        - name: name
          kind: free
          optional: true
      dispatch:
        controller: new
    reply:
      targets:
        resume_missing:
          mode: append
          aliases: [create]
          # Name taken from event payload `resume_name`; creates + renames Conversation.

  resume:
    universal_reply: false
    slash:
      auth: authenticated_only
      description: pito.grammar.slash.resume
      slots:
        # `name` doubles as a conversation title OR a uuid (controller detects the
        # shape); `event_id` only applies in the uuid form — the message to jump
        # to on arrival (anchor-jump reuse, see ChatController#handle_resume_uuid).
        - name: name
          kind: free
          optional: true
        - name: event_id
          kind: free
          optional: true
      dispatch:
        controller: resume
    # GET /resume.json is a cursor feed for the pito-tui conversation picker
    # (viewport-driven `limit`, owner 2026-07-15) — page_size mirrors
    # Conversation::SIDEBAR_PAGE_SIZE so limit-less callers see no change.
    concerns:
      pager:
        page_size: 50
        more_tool: next
        max_page_size: 100

  # Slash tools with handler files in lib/pito/slash/handlers/

  games:
    # Grammar from config (namespace: :slash) + Slash::Handlers::Games.
    # `/games import [title]` opens the IGDB search sidebar (sidebar_open: "games_import").
    # Controller intercepts `/games import` before async pipeline; handler covers job path.
    #
    # ALSO a chat segment tool: free-chat
    # `games channel @h` drives the channel's games grid — shape-routing keeps
    # the two surfaces apart (`/games …` slash vs bare `games …` chat).
    description: pito.grammar.chat.games
    nl_examples:
      - "show the channel's games"
      - "cover grid please"
      - "which games does my channel have?"
      - "game covers for my channel"
      # 2026-07-20/21 owner interview batch — the shelf/wall/box-art wording
      # family (single-channel world: bare "my shelf" needs no handle).
      - "show me the shelf"
      - "the cover wall please"
      - "what's on @gmrdad82's shelf?"
      - "what's on my shelf"
      - "all the box art for my channel"
      # 3.8.0 measured nudges (2026-07-20 live calibration): the interview's
      # `shelf/wall -> games` synonyms rewrite every shelf/wall INPUT into
      # "games" wording before embedding while the rows above embed raw, so
      # list's "what games do I own?" out-pulled this family (@0.853 vs
      # nothing). These rows carry the post-snap vocabulary ("games wall" /
      # "games shelf") so snapped inputs still land here.
      - "the games wall, what's on it these days?"
      - "what's sitting on the games shelf right now?"
      - "what's sitting on the games wall these days?"
      # 3.8.0 repair (2026-07-20 live measurement): the literal approved
      # phrase "show me the shelf" snaps to "show me the games" at the
      # router's input while the row above embeds raw, so list's "show me my
      # games" out-pulled it (@0.951 -> :list). This post-snap row catches
      # the snapped input exactly (games @1.0).
      - "show me the games"
    mcp:
      tool: pito_games
      read_only: true
      description: "List the games a channel plays, as its linked-games cover grid, by @handle. E.g. \"which games does my channel have?\" → \"games channel @handle\"; \"show the channel's games\" → \"games channel @handle\"."
      params:
        channel_ref: { type: string, required: true, hint: "channel @handle" }
      input: "games channel %{channel_ref}"
    auth: session
    universal_reply: false
    chat:
      dispatch: Chat::Handlers::SegmentTool
      segment_of: { tool: show, segment: games }
      slots:
        - name: noun
          kind: enum
          source: nouns
          optional: true
        - name: id
          kind: free
          optional: true
    reply:
      targets:
        channel_detail: { mode: append }
        channel_list:   { mode: append }
    slash:
      auth: authenticated_only
      description: pito.grammar.slash.games
      slots:
        - name: subcommand
          kind: enum
          source: games_subcommands
          optional: true
        - name: title
          kind: free
          optional: true
      dispatch: Slash::Handlers::Games
    # POST /games/search is a cursor feed for the /games import sidebar's IGDB
    # search (viewport-driven `limit`, owner 2026-07-15) — page_size mirrors
    # Pito::Search::Modules::IgdbGames' own default so limit-less callers see
    # no change; max_page_size stays well under IGDB's documented 500-row cap.
    concerns:
      pager:
        page_size: 10
        more_tool: next
        max_page_size: 50

  config:
    # `/config <provider> [key=value …]` — credential + toggle provider management.
    # The grammar uses the `literal` sentinel provider, a conditional `when:` enum
    # (only `sound` takes on/off), and a repeatable `kv` for credential keys — the
    # provider→keys palette shape.
    universal_reply: false
    slash:
      auth: authenticated_only
      description: pito.grammar.slash.config
      slots:
        - name: provider
          kind: literal
          source: config_providers
        - name: state
          kind: enum
          source: on_off
          optional: true
          when:
            provider: [sound]
        - name: settings
          kind: kv
          source: config_keys
          optional: true
          repeatable: true
          when:
            provider: [ai, google, igdb, webhook, me]
      dispatch: Slash::Handlers::Config

  disconnect:
    universal_reply: false
    slash:
      auth: authenticated_only
      description: pito.grammar.slash.disconnect
      slots:
        - name: channel
          kind: enum
          source: channels
          optional: true
      dispatch: Slash::Handlers::Disconnect

  jobs:
    # `/jobs [subcommand] [id|key]` — SolidQueue operator control.
    # validates_own_arity: true — handler manages polymorphic arity (requeue <id>, run <key>).
    universal_reply: false
    slash:
      auth: authenticated_only
      description: pito.grammar.slash.jobs
      slots:
        - name: subcommand
          kind: enum
          source: jobs_subcommands
          optional: true
      dispatch: Slash::Handlers::Jobs

  notifications:
    aliases: [notifs]
    # Opens the notifications sidebar panel (sidebar_open: "notifications").
    # Broadcasts via Pito::Stream::Broadcaster#broadcast_notifications_sidebar.
    universal_reply: false
    slash:
      auth: authenticated_only
      description: pito.grammar.slash.notifications
      slots: []
      dispatch: Slash::Handlers::Notifications
    # GET /notifications.json is a cursor feed for the pito-tui notifications
    # panel (viewport-driven `limit`, owner 2026-07-15) — page_size mirrors
    # Notification::PAGE_SIZE so limit-less callers see no change.
    concerns:
      pager:
        page_size: 50
        more_tool: next
        max_page_size: 100

  rename:
    universal_reply: false
    slash:
      auth: authenticated_only
      description: pito.grammar.slash.rename
      slots:
        - name: title
          kind: free
          optional: true
      dispatch: Slash::Handlers::Rename

  themes:
    # Opens the theme picker sidebar entirely client-side (sidebar_open: "theme").
    # Theme selection and preview happen in the sidebar UI via PATCH /settings/theme;
    # there are no subcommands. The dispatcher's arity guard rejects any extra token.
    universal_reply: false
    slash:
      auth: authenticated_only
      description: pito.grammar.slash.theme
      slots: []
      dispatch:
        client: theme

# ── MCP reader tools — no backing tool; read persisted app history ────────
# Declared here (a sibling of `tools:`, not a tool) because they dispatch NOTHING
# through the Router: the Pito::Mcp readers SELECT persisted Conversation/Event rows
# (source: "app" only) and project them through Pito::Mcp::EventText. Read-only by
# construction — there is no chat/slash/reply surface.
mcp_readers:
  pito_conversations:
    tool: pito_conversations
    read_only: true
    description: "List your saved conversations, recency-grouped: uuid, title, and last activity — use this to find which conversation to read, then pass its uuid to pito_messages."
  pito_messages:
    tool: pito_messages
    read_only: true
    description: "Read recent messages from one conversation, newest last. Defaults to the latest active conversation when no uuid is given — call pito_conversations first if you need a different one. Call again for fresher state: pito is pull-only, there is no push."
    params:
      conversation_uuid: { type: string,  required: false, hint: "from pito_conversations; defaults to the latest active conversation" }
      limit:             { type: integer, required: false, hint: "how many recent messages (default 30)" }
