# SolidQueue recurring schedule
# https://github.com/rails/solid_queue#recurring-schedule
#
# Entries migrated from config/sidekiq_cron.yml (reboot/beta).
#
# Dropped entries:
#   - reindex_meilisearch         — Meilisearch removed
#   - notification_scheduler      — Notifications deferred (post-reboot)
#   - notification_cleanup        — Notifications deferred (post-reboot)
#   - viewer_time_daily_refresh   — Analytics deferred (post-reboot)
#   - youtube_analytics_sync      — Analytics deferred (post-reboot)
#   - youtube_analytics_retention — Analytics deferred (post-reboot)
#   - daily_digest_scheduler      — Digest deferred (post-reboot)
#   - milestone_evaluator         — Pito::Calendar::MilestoneEvaluator never built (dead job removed)
#   - calendar_occurred_flipper   — Pito::Calendar::OccurredFlipper never built (dead job removed)
#
# Scheduled data sync (see the production/development blocks below):
#   - NightlySyncJob        — daily 01:00; fans out ChannelSync + VideoSyncJob
#                             (import new/private uploads + reconcile updates/
#                             deletions) + GameIgdbNightlyRefresh per channel.
#   - VideoStatsSnapshotJob — 09:00 + 17:00; Pito::Stats-only refresh (no upsert).
#                             With the 01:00 nightly_sync this is 3 stats passes/day.
#
# Manual-only (chat `sync` verb, not scheduled):
#   - SyncChannelStatsJob         — triggered via chat `sync` verb
#   - NightlyReindexJob           — triggered via chat `sync` verb
#   - SyncStarredChannelsJob      — triggered via chat `sync` verb
#   - VoyageReindexJob            — triggered via chat `sync` verb

production:
  # Notifications cleanup — daily at 01:00 UTC
  cleanup_notifications:
    class: CleanupNotificationsJob
    schedule: "0 1 * * *"
    description: "Delete notifications read more than 7 days ago"

  # Nightly data sync — daily at 01:00 UTC. The daily new-video detection pass.
  # Fans out per connected channel: ChannelSync + VideoSyncJob (import new/private
  # uploads + reconcile updates/deletions, refreshing Pito::Stats on upsert), then
  # GameIgdbNightlyRefresh (re-syncs every stale upcoming Game). Supersedes the
  # standalone IGDB entry.
  nightly_sync:
    class: NightlySyncJob
    schedule: "0 1 * * *"
    description: "Daily channel + new-video sync; fans out IGDB stale-refresh"

  # Video stats snapshot — Pito::Stats only (no playlist/upsert), 09:00 + 17:00 UTC.
  # With the 01:00 nightly_sync, this gives 3 stats refreshes per day.
  video_stats_snapshot_morning:
    class: VideoStatsSnapshotJob
    schedule: "0 9 * * *"
    description: "Intraday Pito::Stats refresh for existing videos (AM)"
  video_stats_snapshot_afternoon:
    class: VideoStatsSnapshotJob
    schedule: "0 17 * * *"
    description: "Intraday Pito::Stats refresh for existing videos (PM)"

  # SolidQueue housekeeping — clear finished jobs every hour
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

  # Cloudflare trusted proxies — weekly Monday at 09:00 UTC
  cloudflare_trusted_proxies_refresher:
    class: CloudflareTrustedProxiesRefresherJob
    schedule: "0 9 * * 1"
    description: "Weekly drift check between production.rb trusted_proxies and Cloudflare's published lists"

  # YouTube reauth check — daily at 01:00 UTC
  youtube_reauth_check:
    class: YoutubeReauthCheckJob
    schedule: "0 1 * * *"
    description: "Notify for every YoutubeConnection with needs_reauth: true"

  # Release countdown — daily at 01:00 UTC
  release_countdown:
    class: ReleaseCountdownJob
    schedule: "0 1 * * *"
    description: "Notify a dated countdown for every game releasing within 30 days"

development:
  # Notifications cleanup — daily at 01:00
  cleanup_notifications:
    class: CleanupNotificationsJob
    schedule: "0 1 * * *"
    description: "Delete notifications read more than 7 days ago"

  # Nightly data sync — daily at 01:00. Fans out ChannelSync + VideoSyncJob
  # (import + reconcile + Pito::Stats on upsert) + GameIgdbNightlyRefresh per channel.
  nightly_sync:
    class: NightlySyncJob
    schedule: "0 1 * * *"
    description: "Daily channel + new-video sync; fans out IGDB stale-refresh"

  # Video stats snapshot — Pito::Stats only, 09:00 + 17:00 (3 passes/day with 01:00).
  video_stats_snapshot_morning:
    class: VideoStatsSnapshotJob
    schedule: "0 9 * * *"
    description: "Intraday Pito::Stats refresh for existing videos (AM)"
  video_stats_snapshot_afternoon:
    class: VideoStatsSnapshotJob
    schedule: "0 17 * * *"
    description: "Intraday Pito::Stats refresh for existing videos (PM)"

  # YouTube reauth check — daily at 01:00
  youtube_reauth_check:
    class: YoutubeReauthCheckJob
    schedule: "0 1 * * *"
    description: "Notify for every YoutubeConnection with needs_reauth: true"

  # Release countdown — daily at 01:00
  release_countdown:
    class: ReleaseCountdownJob
    schedule: "0 1 * * *"
    description: "Notify a dated countdown for every game releasing within 30 days"
