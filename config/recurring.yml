# SolidQueue recurring schedule
# https://github.com/rails/solid_queue#recurring-schedule
#
# Entries migrated from config/sidekiq_cron.yml (reboot/beta).
#
# Dropped entries:
#   - reindex_meilisearch         — Meilisearch removed
#   - notification_scheduler      — Notifications deferred (post-reboot)
#   - notification_cleanup        — Notifications deferred (post-reboot)
#   - viewer_time_daily_refresh   — Analytics deferred (post-reboot)
#   - youtube_analytics_sync      — Analytics deferred (post-reboot)
#   - youtube_analytics_retention — Analytics deferred (post-reboot)
#   - daily_digest_scheduler      — Digest deferred (post-reboot)
#   - milestone_evaluator         — Pito::Calendar::MilestoneEvaluator never built (dead job removed)
#   - calendar_occurred_flipper   — Pito::Calendar::OccurredFlipper never built (dead job removed)
#
# Scheduled data sync (see the production/development blocks below):
#   - NightlySyncJob        — daily 01:00; fans out ChannelSync + VideoSyncJob
#                             (import new/private uploads + reconcile updates/
#                             deletions) + GameIgdbNightlyRefresh per channel.
#   - VideoStatsSnapshotJob — 09:00 + 17:00; Pito::Stats-only refresh (no upsert).
#                             With the 01:00 nightly_sync this is 3 stats passes/day.
#
# Manual-only (chat `sync` verb, not scheduled):
#   - SyncChannelStatsJob         — triggered via chat `sync` verb
#   - NightlyReindexJob           — triggered via chat `sync` verb
#   - SyncStarredChannelsJob      — triggered via chat `sync` verb

production:
  # Version heartbeat — every 5 minutes (G80): pushes the running build onto
  # pito:global so open tabs notice a server update under them and raise the
  # refresh nudge. Recurring on purpose — a boot-time broadcast races the
  # clients' post-update reconnects; a heartbeat catches everyone eventually.
  version_heartbeat:
    class: VersionHeartbeatJob
    schedule: every 5 minutes
    description: "Push the running build version to open tabs (refresh nudge)"

  # Notifications cleanup — daily at 01:00 UTC
  cleanup_notifications:
    class: CleanupNotificationsJob
    schedule: "0 1 * * *"
    description: "Delete notifications read more than 7 days ago"

  # AI model catalog + pricing refresh — daily at 01:30 UTC (owner: nightly is
  # enough). Re-fetches every reachable provider's model list (keyed providers,
  # OpenCode Zen, OpenRouter — the pricing mirror), replacing lazy TTL refreshes.
  ai_model_catalog_refresh:
    class: AiModelCatalogRefreshJob
    schedule: "30 1 * * *"
    description: "Nightly AI model catalog + pricing mirror refresh"

  # Private-vids reminder — daily at 01:45 UTC (after the 01:00 nightly_sync
  # has imported the night's private uploads). Counts Video.private_unscheduled
  # (D2) uploaded more than a day ago and drives
  # Pito::Notifications::Source::PrivateReminder, which owns the dictionary
  # line + once-per-day dedupe (P19/T19.2b).
  private_reminder:
    class: PrivateReminderJob
    schedule: "45 1 * * *"
    description: "Nightly nag for private, unscheduled vids uploaded >1 day ago"

  # Nightly data sync — daily at 01:00 UTC. The daily new-video detection pass.
  # Fans out per connected channel: ChannelSync + VideoSyncJob (import new/private
  # uploads + reconcile updates/deletions, refreshing Pito::Stats on upsert), then
  # GameIgdbNightlyRefresh (re-syncs every awaited Game nightly — TBA or a
  # future/TBA date on any platform; Item 51). Supersedes the
  # standalone IGDB entry.
  nightly_sync:
    class: NightlySyncJob
    schedule: "0 1 * * *"
    description: "Daily channel + new-video sync; fans out IGDB stale-refresh"

  # Midday sync — same channel + video fan-out at 13:00 UTC, but WITHOUT the
  # IGDB upcoming-games refresh (that stays nightly-only; owner D4). The
  # trailing hash arrives as true kwargs: SolidQueue serializes recurring
  # args through ActiveJob::Arguments (symbol keys survive) and applies
  # Hash.ruby2_keywords_hash before the splat.
  nightly_sync_midday:
    class: NightlySyncJob
    schedule: "0 13 * * *"
    args:
      - igdb: false
    description: "Midday channel + new-video sync (IGDB skipped)"

  # Video stats snapshot — Pito::Stats only (no playlist/upsert), 09:00 + 17:00 UTC.
  # With the 01:00/13:00 syncs, stats land four times a day (01/09/13/17).
  video_stats_snapshot_morning:
    class: VideoStatsSnapshotJob
    schedule: "0 9 * * *"
    description: "Intraday Pito::Stats refresh for existing videos (AM)"
  video_stats_snapshot_afternoon:
    class: VideoStatsSnapshotJob
    schedule: "0 17 * * *"
    description: "Intraday Pito::Stats refresh for existing videos (PM)"

  # Achievements refresh — AchievementMetric upsert + milestone unlock, 3×/day.
  # Runs 1 hour after each stats pass (stats at 01/09/17 UTC → achievements at
  # 02/10/18 UTC) so the latest video data is already present when milestones
  # are evaluated.
  achievements_refresh_early:
    class: AchievementsRefreshJob
    schedule: "0 2 * * *"
    description: "Achievements upsert + milestone unlock pass (early)"
  achievements_refresh_morning:
    class: AchievementsRefreshJob
    schedule: "0 10 * * *"
    description: "Achievements upsert + milestone unlock pass (morning)"
  achievements_refresh_afternoon:
    class: AchievementsRefreshJob
    schedule: "0 18 * * *"
    description: "Achievements upsert + milestone unlock pass (afternoon)"

  # Analytics cache warming — 01:35 + 13:35 UTC. Runs the REAL glance/analyze
  # fill fan-outs per connected channel (Pito::Analytics::Warmup) so the
  # owner's interactive `show`/`analyze`/`breakdowns` land on warm primitives
  # + cells. Live windows expire after 4h (Window policy), so add slots here
  # if afternoon/evening cold turns ever grate.
  analytics_warmup_night:
    class: AnalyticsWarmupJob
    schedule: "35 1 * * *"
    description: "Pre-fill glance/analyze/breakdown caches (post-nightly-sync)"
  analytics_warmup_midday:
    class: AnalyticsWarmupJob
    schedule: "35 13 * * *"
    description: "Pre-fill glance/analyze/breakdown caches (midday)"

  # SolidQueue housekeeping — clear finished jobs every hour
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

  # Cloudflare trusted proxies — weekly Monday at 09:00 UTC
  cloudflare_trusted_proxies_refresher:
    class: CloudflareTrustedProxiesRefresherJob
    schedule: "0 9 * * 1"
    description: "Weekly drift check between production.rb trusted_proxies and Cloudflare's published lists"

  # YouTube reauth check — daily at 01:00 UTC
  youtube_reauth_check:
    class: YoutubeReauthCheckJob
    schedule: "0 1 * * *"
    description: "Notify for every YoutubeConnection with needs_reauth: true"

  # Release countdown — daily at 01:00 UTC
  release_countdown:
    class: ReleaseCountdownJob
    schedule: "0 1 * * *"
    description: "Notify a dated countdown for every game releasing within 30 days"

  # Auto-purge unnamed conversations — daily at 03:00 UTC (after the 01:00/02:00
  # nightly roster). Deletes UNNAMED conversations idle >30 days, one per-id job
  # each (never named ones). See PurgeUnnamedConversationsJob.
  purge_unnamed_conversations:
    class: PurgeUnnamedConversationsJob
    schedule: "0 3 * * *"
    description: "Delete unnamed conversations with no activity in 30 days"

  # Cache hygiene — daily at 04:00 UTC (after the nightly cluster). Sweeps
  # expired analytics_cache + analytics_primitives rows and api_requests audit
  # rows past 90d. Lazy expiry covers correctness; this is the ONE recurring
  # touch the derived caches get (0.9.0 Phase 2).
  cache_sweep:
    class: CacheSweepJob
    schedule: "0 4 * * *"
    description: "Sweep expired analytics cache/primitive rows + old api_requests"

development:
  # Version heartbeat — every 5 minutes (G80; dev parity — dev "updates" are
