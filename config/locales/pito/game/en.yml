en:
  pito:
    game:
      platform_label:
        ps: "PlayStation"
        switch: "Switch"
        xbox: "Xbox"
        steam: "Steam"
      detail:
        title: "Title"
        id: "ID"
        developer: "Developer"
        publisher: "Publisher"
        release: "Release"
        footage: "Footage"
        price: "Price"
        last_sync_at: "Last sync at"
        platforms: "Platforms"
        description: "Description"
        genres: "Genres"
        themes: "Themes"
        perspective: "Perspective"
      release_label:
        # User-facing presenter labels for `Game#release_label`. Branch is
        # picked by component nullability — see
        # `docs/architecture.md` § "Game release-date representation".
        #
        # `day` gets its date string from Pito::Formatter::HouseDate.date (the
        # house shape — "15 Oct" this year, "15 Oct '26" otherwise); only the
        # precision-specific text lives here.
        day: "%{date}"                  # e.g. "15 Oct '26"
        month_year: "%{month} %{year}"  # e.g. "October 2026"
        quarter_year: "Q%{quarter} %{year}"
        year: "%{year}"
        month_day_unknown_year: "%{month} %{day}"
        tba: "TBA"
      ttb:
        main: "main"
        extras: "extras"
        completionist: "completionist"
        footage: "footage"
        hours_short: "%{n}h"
        em_dash: "—"
