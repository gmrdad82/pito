en:
  pito:
    youtube_connections:
      callback:
        stale_intent: "Google sign-in via this route is not supported."
        partial_grant: >-
          Google account connected, but some required scopes were not granted.
          Run /connect again and leave every box checked on the Google consent screen.
        no_channels: "Google account connected. No channels found under this account."
        channel_connected: |
          <span class="font-bold">"%{title}"</span> — <span class="text-cyan">%{handle}</span> connected.
        channels_added:
          one: "%{titles} connected."
          other: "%{count} channels connected: %{titles}."
        already_linked:
          one: |
            Channel <span class="font-bold">"%{title}"</span> — <span class="text-cyan">%{handle}</span> is already connected.
        channel_lookup_error: >-
          Google account connected. Couldn't look up the channel right now (%{error}).
          Run /connect again to retry.
        session_expired: "Session expired. Please sign in again and retry /connect."
        auth_failed: "Google sign-in failed (%{reason})."
        connected_extras:
          - "Good luck! Have fun!"
          - "The tubes are connected. The you is ready."
          - "Your content and the cloud: it's complicated."
          - "Monetisation awaits. Or at least 48 hours of review."
          - "The algorithm has been notified. It cares deeply."
          - "Upload responsibly. Or don't. We're not your dad."
          - "Your thumbnail game better match this energy."
          - "Trending page, here you come. Eventually."
          - "May your bitrate be high and your copyright strikes low."
          - "The comment section now belongs to you. Good luck."
          - "We bridged the gap between you and infinite scrolling."
          - "Your videos have a home. It's in a Google datacenter. Romantic."
          - "The upload button just got a lot more real."
          - "Stream on, you crazy diamond. Or record. Whatever."
          - "Your backlog is now our backlog. Welcome to the family."
          - "Analytics-enabled. Self-esteem not included."
          - "The connection is strong. The wifi: that's on you."
          - "Your content, our infrastructure. A beautiful, one-sided friendship."
          - "Go forth and create. We'll handle the server farms."
          - "Your channel is now in the system. The system says hi."
          - "Connected. The void stares back, but politely."
          - "Your videos have found their forever home. Or until Google changes something."
          - "The pipeline is open. Try not to flood it."
          - "We've established a link. Use it for good. Or views."
          - "Your channel is live in our database. Throw it a party."
          - "Connected. May your retention graph be a flat line... at 100%."
          - "The tubes are aligned. The you is primed."
          - "Your content now has a backend. Fancy."
          - "Link established. Go make something the algorithm can't ignore."
          - "Connected. Remember: with great upload speed comes great responsibility."
          - "Channel acquired. The grind shall continue, but elsewhere now."
          - "We caught it. It's ours. Legally. Mostly."
          - "Welcome aboard. Mind the gap between you and virality."
          - "Linked. Your future self will pretend this was easy."
          - "The handshake was firm. We respect that."
          - "Onboarded. No tour, no lanyard, straight to work."
          - "Your channel just joined the cool table. Don't blow it."
          - "Synced. The pixels are aligned in your favour."
          - "Plugged in. Try not to trip over the cable."
          - "Channel ingested. We promise we chewed first."
          - "Linked and loaded. Point it at something interesting."
          - "We shook hands with YouTube. They have cold hands."
          - "Your channel is now reachable. Reach responsibly."
          - "Connection confirmed. The robots approve of you."
          - "Bound together now. It's basically a tiny wedding."
          - "Wired up. Sparks optional, views encouraged."
          - "Your channel checked in. Room service is metaphorical."
          - "Hooked up to the firehose. Open mouth carefully."
          - "Registered. You're a real boy now, Pinocchio."
          - "Done. Go be insufferable about your subscriber count."
        already_connected_extras:
          - "We've met. Remember? You were there too."
          - "This channel already moved in. It has a key."
          - "Déjà vu? No, just you, again."
          - "Already linked. No take-backsies, no double-ups."
          - "We heard you the first time. The channel did too."
          - "It's still here. It never left. Awkward."
          - "Connecting twice would be greedy. Once is plenty."
          - "This one's a regular. It knows the bartender."
          - "Old news. This channel is basically furniture now."
          - "Re-connecting? It's not going anywhere, promise."
          - "Already on the books. Page one, actually."
          - "We've got it. We've had it. We continue to have it."
          - "This channel and pito are already an item."
          - "No need to knock twice. The door was open."
          - "Save your /connect for one that's playing hard to get."
          - "Already paired. Like socks, but they match."
          - "This one's been here since before it was cool."
          - "Connection exists. Reality remains unchanged."
          - "It's a returning champion, not a new contender."
          - "We pinky-swore on this channel a while ago."
          - "Still linked. Still loyal. Still here."
          - "You can stop now. We've got this one memorised."
          - "Already in the family photo. Front row, even."
          - "This channel filed its paperwork ages ago."
          - "Connected. Encore not required."
          - "Same channel, same link, same as last time."
          - "It's already wearing the pito badge."
          - "We'd connect it again, but physics says no."
          - "This one's a known associate. Watched closely."
          - "Re-link denied: it's already a card-carrying member."
          - "The channel waved back. You two have history."
          - "Nothing to add. It's been here the whole time."
          - "Already plugged in. The socket's occupied."
          - "This channel's got tenure here."
          - "We checked the list twice. It's there. Both times."
          - "Loyalty noted, but it never wandered off."
          - "Connected and accounted for. As before."
          - "It's already on the inside looking out."
          - "No duplicate channels. We run a tight ship."
          - "This one's been clocked in since day one."
          - "Same handle, same home. Welcome back to nothing new."
          - "Already bonded. Reattaching would just be clingy."
          - "It's here. It's linked. It's vibing."
          - "We don't do reruns of the connect handshake."
          - "This channel already drank our coffee."
          - "Linked once, linked forever. That's the deal."
          - "The system shrugged: 'already got that one.'"
          - "Familiar face. Familiar feed. Already filed."
          - "It's a member, not a guest. No re-entry stamp."
          - "Already connected. Go find it some new friends."
        errors:
          quota_exceeded: "quota exceeded"
          needs_reauth: "needs re-authorisation"
          transient: "service temporarily unavailable"
