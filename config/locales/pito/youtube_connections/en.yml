en:
  pito:
    youtube_connections:
      callback:
        stale_intent: "Google sign-in via this route is not supported."
        partial_grant: >-
          Google account connected, but some required scopes were not granted.
          Run /connect again and leave every box checked on the Google consent screen.
        no_channels: "Google account connected. No channels found under this account."
        channel_connected: |
          <span class="font-bold">"%{title}"</span> — <span class="text-cyan">%{handle}</span> connected.
        channels_added:
          one: "%{titles} connected."
          other: "%{count} channels connected: %{titles}."
        already_linked:
          one: |
            Channel <span class="font-bold">"%{title}"</span> — <span class="text-cyan">%{handle}</span> is already connected.
        channel_lookup_error: >-
          Google account connected. Couldn't look up the channel right now (%{error}).
          Run /connect again to retry.
        session_expired: "Session expired. Please sign in again and retry /connect."
        auth_failed: "Google sign-in failed (%{reason})."
        errors:
          quota_exceeded: "quota exceeded"
          needs_reauth: "needs re-authorisation"
          transient: "service temporarily unavailable"
