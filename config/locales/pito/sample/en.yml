en:
  pito:
    sample:
      user_message:
        channels_overview: "/channels overview"
        channel_detail: "/channel @gmrdad82-vlog --detail"
        notifications_unread: "/notifications --unread"
        help_commands: "/help commands"
      assistant_text:
        pulling_stats: "Pulling stats for your 3 active channels…"
