          agent: "Big Pickle"
          duration: "2m 14s"
        build_1m48s:
          mode: "Build"
          agent: "Big Pickle"
          duration: "1m 48s"
        inspect_0m9s:
          mode: "Inspect"
          agent: "Big Pickle"
          duration: "0.9s"
