en:
  pito:
    # Structured `--help` man-page trees (usage + sections) served via
    # Pito::Copy.subtree / Pito::Copy.render_soft. NOT 1-or-50 dictionary
    # copy — that lives under pito.copy.* (config/locales/pito/copy/).
    chat_help:
      list:
        usage: "list games  |  list vids  |  list channels"
      show:
        usage: "show game #id  |  show vid #id  |  show channel @handle"
        game:
          usage: "show game #id [full | with <segments> | only <segments> | without <segments>]"
          sections:
            Arguments:
              "game": "Target noun"
              "#id": "Local numeric game id"
            Options:
              "full": "Render every segment (detail, similar, videos, channels, at-a-glance)"
              "with <segments>": "Add named segments to the default detail card; bare shows detail only"
              "only <segments>": "Render exactly the named segments"
              "without <segments>": "Render all segments except the named ones (full base minus named)"
              "--help": "Print this help message"
            Segments:
              "detail": "Game header and metadata (the bare-form default)"
              "similar": "Voyage-powered similar-game recommendations"
              "videos": "Vids linked to this game (aliases: vids, linked-vids; shown only when linked videos exist)"
              "channels": "Channels that publish this game (pending-fill)"
              "at-a-glance": "Pending analytics summary for the current period (pending-fill)"
        video:
          usage: "show vid #id [full | with <segments> | only <segments> | without <segments>]"
          sections:
            Arguments:
              "vid": "Target noun (aliases: vids, video, videos)"
              "#id": "Local numeric video id"
            Options:
              "full": "Render every segment (detail, game, at-a-glance)"
              "with <segments>": "Add named segments to the default detail card; bare shows detail only"
              "only <segments>": "Render exactly the named segments"
              "without <segments>": "Render all segments except the named ones (full base minus named)"
              "--help": "Print this help message"
            Segments:
              "detail": "Video header and metadata (the bare-form default)"
              "game": "The game linked to this vid (shown only when a game is linked)"
              "at-a-glance": "Pending analytics summary for the current period (pending-fill)"
        channel:
          usage: "show channel @handle [full | with <segments> | only <segments> | without <segments>]"
          sections:
            Arguments:
              "channel": "Target noun (aliases: channels)"
              "@handle": "Channel handle — omit to use the shift+tab scope"
            Options:
              "full": "Render every segment (detail, games, videos, at-a-glance)"
              "with <segments>": "Add named segments to the default detail card; bare shows detail only"
              "only <segments>": "Render exactly the named segments"
              "without <segments>": "Render all segments except the named ones (full base minus named)"
              "--help": "Print this help message"
            Segments:
              "detail": "Channel header, stats, and metadata (the bare-form default)"
              "games": "The channel's linked games as a cover grid (shown only when linked games exist)"
              "videos": "Paginated list of the channel's videos (shown only when videos exist)"
              "at-a-glance": "Pending analytics summary for the current period (pending-fill)"
      # Segment verbs (D20/D21): each promotes one show/analyze :enhanced segment
      # into its own verb. Behaviour equals `<parent> <noun> <ref> only <segment>`.
      "at-a-glance":
        usage: "at-a-glance channel @handle  |  at-a-glance vid #id  |  at-a-glance game #id"
        channel:
          usage: "at-a-glance channel @handle"
          sections:
            Arguments:
              "channel": "Target noun (aliases: glance, overview)"
              "@handle": "Channel handle — omit to use the shift+tab scope"
            Options:
              "--help": "Print this help message"
        vid:
          usage: "at-a-glance vid #id"
          sections:
            Arguments:
              "vid": "Target noun"
              "#id": "Local numeric vid id"
            Options:
              "--help": "Print this help message"
        game:
          usage: "at-a-glance game #id"
          sections:
            Arguments:
              "game": "Target noun"
              "#id": "Local numeric game id"
            Options:
              "--help": "Print this help message"
      videos:
        usage: "videos channel @handle  |  videos game #id"
        channel:
          usage: "videos channel @handle"
          sections:
            Arguments:
              "channel": "Target noun (aliases: vids, linked-vids)"
              "@handle": "Channel handle — omit to use the shift+tab scope"
            Options:
              "--help": "Print this help message"
        game:
          usage: "videos game #id"
          sections:
            Arguments:
              "game": "Target noun (aliases: vids, linked-vids)"
              "#id": "Local numeric game id"
            Options:
              "--help": "Print this help message"
      game:
        usage: "game vid #id"
        vid:
          usage: "game vid #id"
          sections:
            Arguments:
              "vid": "Target noun"
              "#id": "Local numeric vid id"
            Options:
              "--help": "Print this help message"
      games:
        usage: "games channel @handle"
        channel:
          usage: "games channel @handle"
          sections:
            Arguments:
              "channel": "Target noun"
              "@handle": "Channel handle — omit to use the shift+tab scope"
            Options:
              "--help": "Print this help message"
      similar:
        usage: "similar game #id"
        game:
          usage: "similar game #id"
          sections:
            Arguments:
              "game": "Target noun (alias: similars)"
              "#id": "Local numeric game id"
            Options:
              "--help": "Print this help message"
      channels:
        usage: "channels game #id"
        game:
          usage: "channels game #id"
          sections:
            Arguments:
              "game": "Target noun (alias: handles)"
              "#id": "Local numeric game id"
            Options:
              "--help": "Print this help message"
      breakdowns:
        usage: "breakdowns channel [@handle]  |  breakdowns vid [#id]  |  breakdowns game [#id]"
        channel:
          usage: "breakdowns channel [@handle[, @h2…]]"
          sections:
            Arguments:
              "channel": "Target noun (aliases: lifetime, life)"
              "[@handle]": "One or more channel handles; omit for the shift+tab scope"
            Options:
              "--help": "Print this help message"
        vid:
          usage: "breakdowns vid [#id[, #id…]]"
          sections:
            Arguments:
              "vid": "Target noun"
              "[#id]": "One or more local numeric vid ids"
            Options:
              "--help": "Print this help message"
        game:
          usage: "breakdowns game [#id[, #id…]]"
          sections:
            Arguments:
              "game": "Target noun"
              "[#id]": "One or more local numeric game ids"
            Options:
              "--help": "Print this help message"
      # The `linked` two-word forms (E14): the NOUN names what you GET (the
      # segment) and the id belongs to the OTHER entity — a crossed reference.
      linked:
        usage: "linked game #vid  |  linked vids #game"
        game:
          usage: "linked game #vid"
          sections:
            Arguments:
              "game": "Target noun — names what you GET: the game linked to a vid (aliases: games)"
              "#vid": "Local numeric VID id — the crossed ref is the vid, not the game (== show vid #id only linked-game)"
            Options:
              "--help": "Print this help message"
        vids:
          usage: "linked vids #game"
          sections:
            Arguments:
              "vids": "Target noun (aliases: videos, video, vid) — names what you GET: the vids linked to a game"
              "#game": "Local numeric GAME id — the crossed ref is the game, not the vids (== show game #id only linked-videos)"
            Options:
              "--help": "Print this help message"
      delete:
        usage: "delete game #id  |  delete video #id"
        game:
          usage: "delete game #id"
          sections:
            Arguments:
              "game": "Target noun (alias: rm)"
              "#id": "Local numeric game id only — not a name string"
            Options:
              "--help": "Print this help message"
        video:
          usage: "delete video #id"
          sections:
            Arguments:
              "video": "Target noun (alias: rm)"
              "#id": "Local numeric video id only — not a name string"
            Options:
              "--help": "Print this help message"
      reindex:
        usage: "reindex game #id  |  reindex video #id"
        game:
          usage: "reindex game #id"
          sections:
            Arguments:
              "game": "Target noun"
              "#id": "Local numeric game id — Voyage re-embeds the record"
            Options:
              "--help": "Print this help message"
        video:
          usage: "reindex video #id"
          sections:
            Arguments:
              "video": "Target noun"
              "#id": "Local numeric video id — Voyage re-embeds the record"
            Options:
              "--help": "Print this help message"
      footage:
        usage: "footage update #id <hours>  |  footage snippet"
        update:
          usage: "footage update #id <hours>"
          sections:
            Arguments:
              "update": "Target noun — set a game's total recorded footage"
              "#id": "Local numeric game id"
              "<hours>": "Total recorded hours (rounded up to the next 0.5)"
            Options:
              "--help": "Print this help message"
        snippet:
          usage: "footage snippet"
          sections:
            Arguments:
              "snippet": "Target noun — copy a shell one-liner that ffprobes the current folder and sums its footage hours"
            Options:
              "--help": "Print this help message"
      price:
        usage: "price set #id <amount>  |  price unset #id"
        set:
          usage: "price set #id <amount>"
          sections:
            Arguments:
              "set": "Target noun — set a game's euro price"
              "#id": "Local numeric game id"
              "<amount>": "Price in euros, greater than 0 (e.g. 59.99) — shown as €59.99"
            Options:
              "--help": "Print this help message"
        unset:
          usage: "price unset #id"
          sections:
            Arguments:
              "unset": "Target noun — clear a game's price (back to unpriced)"
              "#id": "Local numeric game id"
            Options:
              "--help": "Print this help message"
      link:
        usage: "link game #id to|with video #id  |  link video #id to|with game #id"
        game:
          usage: "link game #id to|with video #id"
          sections:
            Arguments:
              "game": "Target noun"
              "#id": "Local numeric game id"
              "to|with video #id": "Local numeric video id to link to"
            Options:
              "--help": "Print this help message"
        video:
          usage: "link video #id to|with game #id"
          sections:
            Arguments:
              "video": "Target noun"
              "#id": "Local numeric video id"
              "to|with game #id": "Local numeric game id to link to"
            Options:
              "--help": "Print this help message"
      unlink:
        usage: "unlink game #id from video #id  |  unlink video #id from game #id"
        game:
          usage: "unlink game #id from video #id"
          sections:
            Arguments:
              "game": "Target noun"
              "#id": "Local numeric game id"
              "from video #id": "Local numeric video id to unlink from"
            Options:
              "--help": "Print this help message"
        video:
          usage: "unlink video #id from game #id"
          sections:
            Arguments:
              "video": "Target noun"
              "#id": "Local numeric video id"
              "from game #id": "Local numeric game id to unlink from"
            Options:
              "--help": "Print this help message"
      publish:
        usage: "publish video #id"
        video:
          usage: "publish video #id"
          sections:
            Arguments:
              "video": "Target noun"
              "#id": "Local numeric video id — sets YouTube visibility to public"
            Options:
              "--help": "Print this help message"
      unlist:
        usage: "unlist video #id"
        video:
          usage: "unlist video #id"
          sections:
            Arguments:
              "video": "Target noun"
              "#id": "Local numeric video id — sets YouTube visibility to unlisted"
            Options:
              "--help": "Print this help message"
      schedule:
        usage: "schedule video #id <when>  |  schedule #id slate"
        video:
          usage: "schedule video #id <when>  |  schedule #id slate"
          sections:
            Arguments:
              "video": "Target noun"
              "#id": "Local numeric video id"
              "slate": "Show the upcoming schedule (this week + the rest of your shift+space period), excluding this vid — obeys the shift+tab channel scope"
              "<when>": |-
                Publish time (local, ≥30 min out). One of:
                `today`
                `today at 14:30`
                `today at 3am`
                `today at 5pm`
                `in 30m`
                `in 2 hours`
                `in 3 days`
                `tomorrow`
                `tomorrow at noon`
                `tomorrow night`
                `at 2pm`
                `at 3:10am`
                `at 23`
                `at 15:30`
                `saturday at noon`
                `next friday`
                `next week`
                `3 weeks from now`
                `next month`
                `for DD.MM.YYYY HH:MM`
                `DD-MM-YYYY HH:MM`
            Options:
              "--help": "Print this help message"
      import:
        usage: "import game [title]  |  import vids [for @handle]"
        game:
          usage: "import game [title]"
          sections:
            Arguments:
              "game": "Target noun — opens the IGDB import sidebar"
              "[title]": "Optional title to prefill the IGDB search"
            Options:
              "--help": "Print this help message"
        videos:
          usage: "import vids [for @handle]"
          sections:
            Arguments:
              "vids": "Target noun (aliases: vid, videos, video) — alias of `sync vids`: imports newer YouTube videos for the scoped channel(s)"
              "[for @handle]": "Override scope: import only for the given channel handle"
            Options:
              "--help": "Print this help message"
      sync:
        usage: "sync vids [only id,id,id]  |  sync channels [with <items>]"
        videos:
          usage: "sync vids [only id,id,id]"
          sections:
            Arguments:
              "vids": "Target noun (aliases: vid, videos, video) — syncs video metadata from YouTube for the scoped channel(s)"
              "[only id,id,id]": "Restrict to these local video ids (comma-separated, no titles)"
            Options:
              "--help": "Print this help message"
        channels:
          usage: "sync channels [with <items>]"
          sections:
            Arguments:
              "channels": "Target noun — syncs channel fields and stats for the scoped channel(s)"
              "[with <items>]": "videos"
            Options:
              "--help": "Print this help message"
      platform:
        usage: "platform #id <name>"
        game:
          usage: "platform #id <name>"
          sections:
            Arguments:
              "#id": "Local numeric game id — the game to add a platform to (omit when replying to a game card: `#<handle> platform <name>`)"
              "<name>": "Platform name, normalised to a logo family (e.g. ps5, switch, steam)"
            Options:
              "--help": "Print this help message"

      shinies:
        usage: "shinies channel @handle  |  shinies vid #id  |  shinies game #id"
        channel:
          usage: "shinies channel @handle"
          sections:
            Arguments:
              "channel": "Target noun"
              "@handle": "Channel handle (e.g. @myChannel)"
            Options:
              "--help": "Print this help message"
        video:
          usage: "shinies vid #id"
          sections:
            Arguments:
              "vid": "Target noun (aliases: vids, video, videos)"
              "#id": "Local numeric video id"
            Options:
              "--help": "Print this help message"
        game:
          usage: "shinies game #id"
          sections:
            Arguments:
              "game": "Target noun (alias: games)"
              "#id": "Local numeric game id"
            Options:
              "--help": "Print this help message"

      analyze:
        usage: "analyze channel [@handle[, @h2…]]  |  analyze vid [#id[, #id…]]  |  analyze game [#id[, #id…]]"
        channel:
          usage: "analyze channel [@handle[, @h2…]] [full | with <segments>[,metric…] | only <segments> | without <segments|metrics>]"
          sections:
            Arguments:
              "channel": "Target noun (aliases: channels) — analytics for the shift+space period; `stats` and `analytics` are verb aliases"
              "[@handle]": "One or more channel handles; omit to use the shift+tab scope (@all = every channel, else the selected one)"
            Options:
              "full": "Emit both numbers and breakdowns segments"
              "with <segments>": "Add named segments to the bare default; can mix with metric names: `with views,breakdowns`"
              "only <segments>": "Emit exactly the named segments"
              "without <segments|metrics>": "Exclude named segments from the full base, or metric tokens from the numbers card — each routes to its own parser"
              "--help": "Print this help message"
            Segments:
              "numbers": "Plain-numbers summary card — the bare default"
              "breakdowns": "Lifetime distribution breakdowns card"
        vid:
          usage: "analyze vid [#id[, #id…]] [full | with <segments>[,metric…] | only <segments> | without <segments|metrics>]"
          sections:
            Arguments:
              "vid": "Target noun (aliases: vids, video, videos) — bare form uses the shift+tab channel scope (same as `analyze channel`)"
              "[#id]": "One or more local numeric video ids"
            Options:
              "full": "Emit both numbers and breakdowns segments"
              "with <segments>": "Add named segments to the bare default; can mix with metric names: `with views,breakdowns`"
              "only <segments>": "Emit exactly the named segments"
              "without <segments|metrics>": "Exclude named segments from the full base, or metric tokens from the numbers card — each routes to its own parser"
              "--help": "Print this help message"
            Segments:
              "numbers": "Plain-numbers summary card — the bare default"
              "breakdowns": "Lifetime distribution breakdowns card"
        game:
          usage: "analyze game [#id[, #id…]] [full | with <segments>[,metric…] | only <segments> | without <segments|metrics>]"
          sections:
            Arguments:
              "game": "Target noun (aliases: games, gamez) — bare form resolves shift+tab → linked videos → games, presented at game level"
              "[#id]": "One or more local numeric game ids; resolves linked videos and presents results at game level"
            Options:
              "full": "Emit both numbers and breakdowns segments"
              "with <segments>": "Add named segments to the bare default; can mix with metric names: `with views,breakdowns`"
              "only <segments>": "Emit exactly the named segments"
              "without <segments|metrics>": "Exclude named segments from the full base, or metric tokens from the numbers card — each routes to its own parser"
              "--help": "Print this help message"
            Segments:
              "numbers": "Plain-numbers summary card — the bare default"
              "breakdowns": "Lifetime distribution breakdowns card"

    hashtag_help:
      show-game:
        target_usage: "#<show-game-hashtag> <action>"
        actions:
          'at-a-glance':
            usage: "#<show-game-hashtag> at-a-glance"
            sections:
              Description:
                "at-a-glance": "Pending analytics summary for this game (aliases: glance, overview)"
              Options:
                "--help": "Print this help message"
          videos:
            usage: "#<show-game-hashtag> videos"
            sections:
              Description:
                "videos": "The vids linked to this game (aliases: vids, linked-vids)"
              Options:
                "--help": "Print this help message"
          similar:
            usage: "#<show-game-hashtag> similar"
            sections:
              Description:
                "similar": "Voyage-powered similar-game recommendations (alias: similars)"
              Options:
                "--help": "Print this help message"
          channels:
            usage: "#<show-game-hashtag> channels"
            sections:
              Description:
                "channels": "The channels that publish this game (alias: handles)"
              Options:
                "--help": "Print this help message"
          analyze:
            usage: "#<show-game-hashtag> analyze"
            sections:
              Description:
                "analyze": "Analyze this game's metrics over the current period"
              Options:
                "--help": "Print this help message"
          delete:
            usage: "#<show-game-hashtag> delete"
            sections:
              Description:
                "delete": "Delete this game (alias: rm)"
              Options:
                "--help": "Print this help message"
          rm:
            usage: "#<show-game-hashtag> rm"
            sections:
              Description:
                "rm": "Delete this game (alias: delete)"
              Options:
                "--help": "Print this help message"
          footage:
            usage: "#<show-game-hashtag> footage [update] <hours>  |  footage snippet"
            sections:
              Arguments:
                "<hours>": "New total footage in hours for this game (rounded up to the next 0.5)"
                "snippet": "Copy a shell one-liner that ffprobes the current folder and sums its footage hours"
              Options:
                "--help": "Print this help message"
          price:
            usage: "#<show-game-hashtag> price set <amount>  |  price unset"
            sections:
              Arguments:
                "set <amount>": "Set this game's euro price, greater than 0 (e.g. price set 59.99)"
                "unset": "Clear this game's price (back to unpriced)"
              Options:
                "--help": "Print this help message"
          link:
            usage: "#<show-game-hashtag> link to vid <id>[,id…]"
            sections:
              Arguments:
                "to video <id>[,id…]": "One or more local numeric vid ids to link to (comma or space separated)"
              Options:
                "--help": "Print this help message"
          unlink:
            usage: "#<show-game-hashtag> unlink from vid <id>[,id…]"
            sections:
              Arguments:
                "from video <id>[,id…]": "One or more local numeric vid ids to unlink from (comma or space separated)"
              Options:
                "--help": "Print this help message"
          reindex:
            usage: "#<show-game-hashtag> reindex"
            sections:
              Description:
                "reindex": "Re-embed this game in Voyage"
              Options:
                "--help": "Print this help message"

      list-games:
        target_usage: "#<list-games-hashtag> <action>"
        actions:
          'at-a-glance':
            usage: "#<list-games-hashtag> at-a-glance <id>"
            sections:
              Description:
                "at-a-glance": "Pending analytics summary for a listed game (aliases: glance, overview)"
              Options:
                "--help": "Print this help message"
          videos:
            usage: "#<list-games-hashtag> videos <id>"
            sections:
              Description:
                "videos": "The vids linked to a listed game (aliases: vids, linked-vids)"
              Options:
                "--help": "Print this help message"
          similar:
            usage: "#<list-games-hashtag> similar <id>"
            sections:
              Description:
                "similar": "Similar-game recommendations for a listed game (alias: similars)"
              Options:
                "--help": "Print this help message"
          channels:
            usage: "#<list-games-hashtag> channels <id>"
            sections:
              Description:
                "channels": "The channels that publish a listed game (alias: handles)"
              Options:
                "--help": "Print this help message"
          analyze:
            usage: "#<list-games-hashtag> analyze"
            sections:
              Description:
                "analyze": "Analyze the listed games as a scope"
              Options:
                "--help": "Print this help message"
          show:
            usage: "#<list-games-hashtag> show <id>"
            sections:
              Arguments:
                "<id>": "Row number from the list"
              Options:
                "--help": "Print this help message"
          delete:
            usage: "#<list-games-hashtag> delete <id>"
            sections:
              Arguments:
                "<id>": "Row number from the list (alias: rm)"
              Options:
                "--help": "Print this help message"
          rm:
            usage: "#<list-games-hashtag> rm <id>"
            sections:
              Arguments:
                "<id>": "Row number from the list (alias: delete)"
              Options:
                "--help": "Print this help message"
          with:
            usage: "#<list-games-hashtag> with <columns>"
            sections:
              Arguments:
                "<columns>": "Comma-separated column names to add: platform, genre, developer, publisher, channels, footage, price, views, likes"
              Options:
                "--help": "Print this help message"
          without:
            usage: "#<list-games-hashtag> without <columns>"
            sections:
              Arguments:
                "<columns>": "Comma-separated column names to remove: platform, genre, developer, publisher, channels, footage, price, views, likes"
              Options:
                "--help": "Print this help message"
          sort:
            usage: "#<list-games-hashtag> sort by <column> [desc]"
            sections:
              "Sort columns":
                "id": "Row number"
                "title": "Game title (alphabetical)"
                "platform": "Platform(s) — requires the platform column to be visible"
                "genre": "Genre(s) — requires the genre column to be visible"
                "developer": "Developer — requires the developer column to be visible"
                "publisher": "Publisher — requires the publisher column to be visible"
              Options:
                "[desc]": "Reverse order (descending)"
                "--help": "Print this help message"
          link:
            usage: "#<list-games-hashtag> link <game id> to <vid id>[,id…]"
            sections:
              Arguments:
                "<game id>": "Row id of the game to link"
                "to <video id>[,id…]": "One or more local numeric vid ids to link to (comma or space separated)"
              Options:
                "--help": "Print this help message"
          unlink:
            usage: "#<list-games-hashtag> unlink <game id> from <vid id>[,id…]"
            sections:
              Arguments:
                "<game id>": "Row id of the game to unlink"
                "from <video id>[,id…]": "One or more local numeric vid ids to unlink from (comma or space separated)"
              Options:
                "--help": "Print this help message"
          next:
            usage: "#<list-games-hashtag> next"
            sections:
              Description:
                "next": "Load the next batch of games (only available when the list is capped)"
              Options:
                "--help": "Print this help message"

      show-video:
        target_usage: "#<show-vid-hashtag> <action>"
