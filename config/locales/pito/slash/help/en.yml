en:
  pito:
    slash:
      help:
        unauthenticated: "Login first — /authenticate <6-digit TOTP code>."
        body: "Slash commands let's you configure pito, start or resume conversations, log in or log out, and more."
        expand_label: "to expand"
        collapse_label: "to collapse"
        descriptions:
          help: "Show this command reference"
        help:
          usage: "/help"
          description: "Show this command reference"
        nonsense_title: "Congratulations. You've reached the manual's manual."
        nonsense:
          "/uninstall reality": "Schedules a 6-week migration to a worse timeline."
          "--help --help": "You've summoned the manual's manual. It resents you."
          "set brain.cells=∞": "Ignored. We checked your command history."
          "/optimize feelings": "Deprecated. Use /suppress instead."
          "config universe big_bang=no": "Already ran. No rollback support. You're welcome."
          "/undo last_mistake": "Ambiguous target. Too many candidates."
          "verbose_mode=on": "You're already talking to a computer at midnight. Too late."
          "/predict future": "Returns the same answer as /config igdb status. Also: no."
          "--dry-run everything": "Your entire career has been a dry run."
          "/help --help --help": "Recursion limit reached. Please touch grass and try again."
        sections:
          general:
            title: "GENERAL"
            rows:
              - key: "/help"
                value: "Show this message"
              - key: "/login"
                value: "Log in"
              - key: "/logout"
                value: "Log out"
          conversations:
            title: "CONVERSATIONS"
            rows:
              - key: "/new"
                value: "Start new conversation"
              - key: "/resume"
                value: "Resume a conversation"
          youtube:
            title: "YOUTUBE"
            rows:
              - key: "/connect"
                value: "Connect YouTube channel"
              - key: "/disconnect"
                value: "Disconnect channel"
          config:
            title: "CONFIG"
            rows:
              - key: "/config google"
                value: "Google OAuth credentials"
              - key: "/config igdb"
                value: "IGDB credentials"
              - key: "/config voyage"
                value: "Voyage.AI API key"
              - key: "/config webhook"
                value: "Slack / Discord webhooks"
          keys:
            title: "KEYS"
            rows:
              - key: "ctrl+/"
                value: "Toggle notifications panel (space = read/unread)"
              - key: "/ or #"
                value: "Open command palette (tab accepts suggestion)"
              - key: "m"
                value: "Focus chatbox"
              - key: "ctrl+|"
                value: "Expand / collapse all messages"
              - key: "↑ / ↓"
                value: "Cycle chatbox history"
              - key: "ctrl+`"
                value: "Rename current conversation"
              - key: "` (sidebar)"
                value: "Rename highlighted conversation"
