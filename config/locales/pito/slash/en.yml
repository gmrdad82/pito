en:
  pito:
    slash:
      errors:
        unknown_verb: "Unknown command: /%{verb}. Type /help for the command list."
        parse_failed: "Couldn't parse command: %{raw}"
        too_many_args: "/%{verb} doesn't take that many arguments. You're overloading it — try /help."
      confirm_hint: "type /confirm or /cancel"
      login:
        help:
          usage: "/login <6-digit TOTP code>"
          description: "Sign in with a one-time verification code."
      logout:
        help:
          usage: "/logout"
          description: "Sign out and clear your session."
      new:
        help:
          usage: "/new"
          description: "Start a fresh conversation."
      resume:
        help:
          usage: "/resume"
          description: "Browse and switch to a previous conversation."
      connect:
        descriptions:
          connect: "Connect a YouTube channel via Google OAuth"
        help:
          usage: "/connect"
          description: "Initiate Google OAuth to connect a YouTube channel."
      config:
        descriptions:
          config: "Read or write install-wide credentials or toggle sound/fx (/config google|voyage|igdb|webhook|sound|fx)"
        help:
          general:
            body: "/config <provider> [on|off | key=value …]"
            providers:
              google: "OAuth + YouTube API credentials"
              voyage: "Voyage AI embedding key"
              igdb: "IGDB game database client credentials"
              webhook: "Slack / Discord incoming webhook URLs"
              sound: "Toggle sound effects on or off"
              fx: "Toggle visual FX on or off"
            info_lines:
              - "`/config <provider> --help` for provider-level key reference."
              - "Omit all keys to show current credential status."
          providers:
            google:
              keys:
                client_id: "Google OAuth client ID (Google Cloud Console)"
                client_secret: "Google OAuth client secret"
                redirect_uri: "OAuth callback URL (e.g. http://localhost:3027/auth/youtube/callback)"
                api_key: "Google API key (YouTube Data v3)"
              omit_hint: "Omit all keys to show current credential status."
              suggestion:
                pre: "Run"
                post: "after configuring to start the OAuth2 flow"
            voyage:
              keys:
                api_key: "Voyage AI API key"
            igdb:
              keys:
                client_id: "IGDB / Twitch client ID"
                client_secret: "IGDB / Twitch client secret"
            webhook:
              keys:
                slack: "Slack incoming webhook URL"
                discord: "Discord webhook URL"
            sound:
              keys: {}
            fx:
              keys: {}
        status:
          ok: "OK"
          missing: "MISSING"
          section:
            google: "Google credentials"
            voyage: "Voyage credentials"
            igdb: "IGDB credentials"
            webhook: "Webhook URLs"
        updated: "Updated %{provider} credentials (%{keys}). Changes take effect immediately."
        toggle:
          sound:
            label: "Sound"
          fx:
            label: "FX"
          state:
            "on": "on"
            "off": "off"
          status: "%{label}: %{state}"
          confirmed: "%{label} %{state}."
        errors:
          unknown_provider: "'%{provider}'? Never heard of it. I answer to: google, voyage, igdb, webhook, sound, fx."
          unknown_keys: "Unknown keys for %{provider}: %{keys}"
          invalid_toggle_value: "Invalid value '%{value}'. Use on or off."
      import:
        imported:
          one: "Imported 1 video from %{channel}."
          other: "Imported %{count} videos from %{channel}."
      disconnect:
        descriptions:
          disconnect: "Disconnect a YouTube channel"
        help:
          usage: "/disconnect @handle"
          description: "Disconnect a YouTube channel and delete its local data."
        confirmation:
          confirmed:
            zero: "Disconnected from %{handle}. No videos to delete."
            one: "Disconnected from %{handle}. 1 video deleted."
            other: "Disconnected from %{handle}. %{count} videos deleted."
          expand:
            total: "Videos"
            published: "Published"
            scheduled: "Scheduled"
            unlisted: "Unlisted"
            private: "Private"
            subscribers: "Subscribers"
            views: "Views"
