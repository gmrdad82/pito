en:
  pito:
    slash:
      errors:
        unknown_verb: "Unknown command: /%{verb}. Type /help for the command list."
        parse_failed: "Couldn't parse command: %{raw}"
        too_many_args: "/%{verb} doesn't take that many arguments. You're overloading it — try /help."
      confirm_hint: "type /confirm or /cancel"
      login:
        help:
          usage: "/login <6-digit TOTP code>"
          description: "Sign in with a one-time verification code."
      logout:
        help:
          usage: "/logout"
          description: "Sign out and clear your session."
      new:
        help:
          usage: "/new"
          description: "Start a fresh conversation."
      resume:
        help:
          usage: "/resume"
          description: "Browse and switch to a previous conversation."
      connect:
        descriptions:
          connect: "Connect a YouTube channel via Google OAuth"
        help:
          usage: "/connect"
          description: "Initiate Google OAuth to connect a YouTube channel."
      config:
        descriptions:
          config: "Read or write install-wide credentials, toggle sound/motion, set the reveal effect, set the display time zone, or configure your nickname (/config google|voyage|igdb|webhook|me|sound|motion|fx|timezone)"
        help:
          general:
            body: "/config <provider> [on|off | key=value …]"
            providers:
              google: "OAuth + YouTube API credentials"
              voyage: "Voyage AI embedding key"
              igdb: "IGDB game database client credentials"
              webhook: "Slack / Discord incoming webhook URLs"
              me: "Set the authenticated display nickname"
              sound: "Toggle sound effects on or off"
              motion: "Toggle visual motion on or off"
              fx: "Set the reveal effect (typewriter / scramble / comet)"
              timezone: "Set the display time zone (timestamps + schedule input)"
            info_lines:
              - "`/config <provider> --help` for provider-level key reference."
              - "Omit all keys to show current credential status."
          providers:
            google:
              keys:
                client_id: "Google OAuth client ID (Google Cloud Console)"
                client_secret: "Google OAuth client secret"
                redirect_uri: "OAuth callback URL (e.g. http://localhost:3027/auth/youtube/callback)"
                api_key: "Google API key (YouTube Data v3)"
              omit_hint: "Omit all keys to show current credential status."
              suggestion:
                pre: "Run"
                post: "after configuring to start the OAuth2 flow"
            voyage:
              keys:
                api_key: "Voyage AI API key"
            igdb:
              keys:
                client_id: "IGDB / Twitch client ID"
                client_secret: "IGDB / Twitch client secret"
            webhook:
              keys:
                slack: "Slack incoming webhook URL"
                discord: "Discord webhook URL"
            me:
              keys:
                nickname: "Display name shown in the status bar when authenticated (default: gmrdad82)"
              omit_hint: "Omit the key to show the current nickname."
            sound:
              keys: {}
            motion:
              keys: {}
              states:
                "on": "Reveal effects animate (typewriter / scramble / comet)"
                "off": "Everything renders instantly, no animation"
            fx:
              keys: {}
              effects:
                typewriter: "Types in character by character, like a terminal"
                scramble: "Decodes from random glyphs into the final text"
                comet: "Streaks in with a trailing comet cursor"
            timezone: "/config timezone <City> — set the display zone from a major city (e.g. /config timezone Madrid → Europe/Madrid). Times still store in UTC; only rendering and schedule input switch to local. `/config timezone` shows the current zone."
        me:
          nickname_updated: "Nickname set to %{nickname}."
          status: "Nickname: %{nickname}."
        status:
          ok: "OK"
          missing: "MISSING"
          section:
            google: "Google credentials"
            voyage: "Voyage credentials"
            igdb: "IGDB credentials"
            webhook: "Webhook URLs"
            me: "Display nickname"
        updated: "Updated %{provider} credentials (%{keys}). Changes take effect immediately."
        toggle:
          sound:
            label: "Sound"
          motion:
            label: "Motion"
          state:
            "on": "on"
            "off": "off"
          status: "%{label}: %{state}"
          confirmed: "%{label} %{state}."
        fx:
          updated: "Reveal effect set to %{effect}."
          status: "Reveal effect: %{effect}."
        timezone:
          updated: "Time zone set to %{zone}. Timestamps now read in local time; clocks stay UTC under the hood."
          status: "Time zone: %{zone}."
        errors:
          unknown_provider: "'%{provider}'? Never heard of it. I answer to: google, voyage, igdb, webhook, me, sound, motion, fx, timezone."
          unknown_keys: "Unknown keys for %{provider}: %{keys}"
          invalid_toggle_value: "Invalid value '%{value}'. Use on or off."
          invalid_fx_effect: "Invalid effect '%{value}'. Use typewriter, scramble, or comet."
          unknown_timezone: "'%{city}'? No clock ticks there. Name a major city like Madrid, Tokyo, or London."
          blank_nickname: "Nickname can't be blank."
      notifications:
        descriptions:
          notifications: "Open the notifications panel"
        help:
          usage: "/notifications"
          description: "Open the notifications sidebar panel (same as Ctrl+/)."
        sidebar:
          opening: "Opening the notifications panel…"
      games:
        descriptions:
          games: "Import a game from IGDB (/games import [title])"
        help:
          usage: "/games import [<title>]"
          description: "Search IGDB for a game and import it into your library. Optionally prefill the search box with a title."
        import:
          opening: "Opening the IGDB import sidebar…"
      compact:
        descriptions:
          compact: "Compact the conversation context"
        help:
          usage: "/compact"
          description: "Compact this conversation's context to free up space (experimental)."
      rename:
        descriptions:
          rename: "Rename the current conversation (/rename <new title>)"
        help:
          usage: "/rename <new title>"
          title_desc: "The new name for the current conversation (spaces allowed)"
        needs_title: "Give the conversation a name. Try: /rename My Strategy Channel."
      import:
        imported:
          one: "Imported 1 vid from %{channel}."
          other: "Imported %{count} vids from %{channel}."
      jobs:
        descriptions:
          jobs: "Inspect and control the background job queue"
        help:
          usage: "/jobs <status|requeue|run|pause|resume> [arg]"
          subcommands:
            status: "Queue snapshot: workers, state counts, recent failures"
            requeue: "Re-run a failed job by id (or 'all')"
            run: "Run a recurring task now by its key"
            pause: "Pause processing on all queues"
            resume: "Clear all queue pauses"
        status:
          section: "Queue status"
          none: "none"
          labels:
            processes: "Workers"
            ready: "Ready"
            scheduled: "Scheduled"
            claimed: "Running"
            failed: "Failed"
            paused: "Paused"
            recurring: "Recurring"
        errors:
          requeue_missing_id: "Which job? Try /jobs requeue <id> (or 'all') — ids are in /jobs status."
          requeue_not_found: "No failed job with id %{id}. It may have already been retried or cleared."
          run_missing_key: "Which task? Try /jobs run <key> — keys are in /jobs status."
          run_unknown: "No recurring task named '%{key}'. Check /jobs status for the roster."
          run_command_unsupported: "'%{key}' is a raw command task, not a job class — can't run that one on demand."
          unknown_subcommand: "Unknown /jobs subcommand '%{sub}'. Try status, requeue, run, pause, or resume."
      disconnect:
        descriptions:
          disconnect: "Disconnect a YouTube channel"
        help:
          usage: "/disconnect @handle"
          description: "Disconnect a YouTube channel and delete its local data."
        confirmation:
          confirmed:
            zero: "Disconnected from %{handle}. No vids to delete."
            one: "Disconnected from %{handle}. 1 vid deleted."
            other: "Disconnected from %{handle}. %{count} vids deleted."
          expand:
            total: "Vids"
            published: "Published"
            scheduled: "Scheduled"
            unlisted: "Unlisted"
            private: "Private"
            subscribers: "Subs"
            views: "Views"
