en:
  pito:
    grammar:
      slash:
        login: "Sign in with a verification code"
        logout: "Sign out and clear your session"
        help: "Show available commands"
        config: "Read or write install-wide credentials"
        connect: "Connect a YouTube channel via Google OAuth"
        new: "Start fresh — `/new` for a blank conversation, `/new <name>` to name it"
        resume: "`/resume` browses conversations; `/resume <name>` opens that one (or offers to create it); `/resume <uuid> [<event_id>]` jumps straight to a conversation, and a message"
        rename: "Rename the current conversation"
        disconnect: "Disconnect a YouTube channel"
        theme: "Switch the UI theme (apply / preview / reset)"
        notifications: "Open the notifications panel"
        games: "Import a game from IGDB into your library"
        jobs: "Inspect and control the background job queue (SolidQueue)"
      chat:
        list: "List your library — games, vids, or channels; filter by genre and more (ls rpg games). Use it for the catalog, not analytics."
        show: "Open ONE game, vid, or channel in full detail by id (show game 42). For a quick read use at-a-glance; for metrics use analyze."
        import: "Add a game to your library from IGDB by title (import game hades). Vids arrive via sync, never import."
        footage: "Record how many hours of footage you have for a game (footage 12 8.5) — a manual per-game total, never inferred."
        delete: "Remove a game or vid from the library (by id or title). Library-only: never touches YouTube."
        reindex: "Re-embed a game or vid with the local embedding model (by id or title) — refreshes search and similarity for that row."
        platform: "Add or remove a game's platform (platform set 12 ps5, platform unset 12 ps5)."
        price: "Set or clear what a game cost you, in euros (price set 12 59.99)."
        publish: "Make a vid public on YouTube NOW (clears any schedule). To pick a future time use schedule."
        unlist: "Unlist a vid on YouTube (reachable by link, hidden from browse)."
        schedule: "Set a vid to go public on YouTube at a future time (schedule 9 slate). For right-now use publish."
        find: "Search VIDS by title, genre, or platform (find boss fight). For games or conversations use search."
        search: "Search games, vids, or conversations. `like <x>` = related by meaning to a game/vid you name (search games like tekken → other fighters); `about <x>` = free-text, vibe search with no title needed, games and vids only (search games about brutal but worth every second); `for <x>` = exact names/words, all three nouns (search games for tekken → games titled Tekken); no keyword at all = the same vibe search as `about` for games/vids (search games forcing skillful play — just write it), exact matching for conversations."
        ai: "Ask the AI assistant anything about your library (@ai <question>) — free text, full context, runnable suggestions back."
        update: "The one metadata setter: game footage/price/platform or vid description/tags (update game price 12 20). Vid fields stage a confirm before pushing to YouTube."
        link: "Link a vid to its game (link 17 42 = vid 17 → game 42). Links are explicit — pito suggests after import, only you link."
        unlink: "Detach a vid from its game (unlink 17 42). Vid and game both stay; only the link goes."
        sync: "Pull fresh data from YouTube — vids or channels (scope via shift+tab). Use when YouTube changed and pito should catch up."
        help: "List every follow-up target and its accepted actions — the reply-grammar cheat sheet."
        shinies: "Your achievement tracks and earned shinies for a game, vid, or channel."
        analyze: "YouTube metrics over the shift+space period for a channel, vid, or game (analyze channel). Numbers and trends; for lifetime shape use breakdowns."
        # Segment tools — each promotes one show/analyze :enhanced segment.
        "at-a-glance": "The quick pending-analytics summary for a channel, vid, or game — one screen, no deep dive (glance vid 12)."
        videos: "List a channel's vids, or the vids linked to a game (videos #game). A listing, not analytics."
        game: "Which game a vid is linked to (game #vid)."
        games: "A channel's linked games as a cover grid."
        similar: "Similar-game recommendations for one game you name by id (similar 42). To seed by title use search games like <title>."
        channels: "Which channels publish a game (channels 42)."
        breakdowns: "Lifetime distribution breakdowns — how views and watch time spread across a channel, vid, or game's life (breakdowns channel)."
        # The `linked` two-word forms — the noun names what you get; the id is the OTHER entity's.
        linked: "Show what's linked — `linked game #vid` (a vid's game) or `linked vids #game` (a game's vids)"
        greet: "Say hi — PITO greets you with what it can do"
        farewell: "Say bye — PITO waves you off"
      hashtag:
        add: "Track a metric in this conversation"
        remove: "Stop tracking a metric"
