en:
  pito:
    grammar:
      slash:
        login: "Sign in with a verification code"
        logout: "Sign out and clear your session"
        help: "Show available commands"
        config: "Read or write install-wide credentials"
        connect: "Connect a YouTube channel via Google OAuth"
        new: "Start fresh — `/new` for a blank conversation, `/new <name>` to name it"
        resume: "`/resume` browses conversations; `/resume <name>` opens that one (or offers to create it)"
        rename: "Rename the current conversation"
        disconnect: "Disconnect a YouTube channel"
        theme: "Switch the UI theme (apply / preview / reset)"
        notifications: "Open the notifications panel"
        games: "Import a game from IGDB into your library"
        jobs: "Inspect and control the background job queue (SolidQueue)"
      chat:
        list: "List games in your library"
        show: "Show a game or vid's details (by id)"
        import: "Import a game from IGDB into your library"
        footage: "Get the footage probe command for a game (by id or title)"
        delete: "Delete a game or vid (by id or title)"
        reindex: "Re-embed a game or vid in Voyage (by id or title)"
        platform: "Add or remove a game's platform (e.g. platform set 12 ps5, platform unset 12 ps5)"
        price: "Set or clear a game's euro price (e.g. price set 12 59.99)"
        publish: "Publish a vid on YouTube (set public, clear schedule)"
        unlist: "Unlist a vid on YouTube"
        schedule: "Schedule a vid for future publishing"
        find: "Search vids by title, genre, or platform"
        search: "Find games similar to another one (search games like <title>)"
        link: "Link a vid to a game"
        unlink: "Unlink a vid from a game"
        sync: "Sync vids or channels from YouTube (scope via shift+tab channel)"
        import: "Import a game from IGDB into your library"
        help: "List all follow-up targets and their accepted actions"
        shinies: "Show achievement tracks and obtained shinies (game, vid, or channel)"
        analyze: "Analyze YouTube metrics for a channel, vid, or game (over the shift+space period)"
        # Segment verbs (D20/D21) — each promotes one show/analyze :enhanced segment.
        "at-a-glance": "Pending analytics summary for a channel, vid, or game (over the shift+space period)"
        videos: "List a channel's videos, or the vids linked to a game"
        game: "Show the game linked to a vid"
        games: "The channel's linked games as a cover grid"
        similar: "Voyage-powered similar-game recommendations for a game"
        channels: "List the channels that publish a game"
        breakdowns: "Lifetime distribution breakdowns for a channel, vid, or game (over the shift+space period)"
        # The `linked` two-word forms (E14) — the noun names what you get; the id is the OTHER entity's.
        linked: "Show what's linked — `linked game #vid` (a vid's game) or `linked vids #game` (a game's vids)"
        greet: "Say hi — PITO greets you with what it can do"
        farewell: "Say bye — PITO waves you off"
      hashtag:
        add: "Track a metric in this conversation"
        remove: "Stop tracking a metric"
