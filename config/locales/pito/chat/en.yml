en:
  pito:
    chat:
      list:
        descriptions:
          list: "List games, channels, or vids"
      search:
        descriptions:
          search: "Find games similar to another one (search games like <title>)"
        needs_seed: "Search for what? Try `search games like <title>` ŌĆö e.g. `search games like tekken 7`."
        seed_not_found: "No game called \"%{title}\" in your library yet. `list games` to see what's there, then `search games like <its title>`."
      ai:
        descriptions:
          ai: "Ask the AI assistant anything about your library (@ai <question>)"
        needs_prompt: "Ask me something ŌĆö e.g. `@ai what should I play next?` or `@ai which vids need better tags?`."
      update:
        descriptions:
          update: "Update game footage/price/platform or vid description/tags (update game price <id> <amount>)"
        usage: "Usage: `update game footage|price|platform <id> <value>` or `update vid description|tags <id> <value>` ŌĆö e.g. `update game price 12 59.99`, `update vid tags 3 minecraft, ep 4`. Footage also takes a relative amount ŌĆö `update game footage 8 +2` / `-1.5` adds or subtracts, floored at 0. Add more rows with a comma ŌĆö `update <noun> <field> <id> <value>, <id> <value>, ŌĆ”` ŌĆö a comma opens a new row only when it's followed by another id; game fields apply row by row, vid fields stage ONE confirmation."
        not_found: "No %{ref} in your library. `list games` / `list vids` to see ids."
        bad_value: "Couldn't read %{value} as a %{field} value."
        mass_no_valid_rows: "None of those rows resolved to a real vid ŌĆö nothing staged. `list vids` to see ids."
      greet:
        descriptions:
          greet: "Say hi (hi / hello / hola, any case) ŌĆö PITO greets you with what it can do"
      farewell:
        descriptions:
          farewell: "Say bye (bye / goodbye / hasta luego) ŌĆö PITO waves you off"
      show:
        descriptions:
          show: "Show a game's details (by id)"
        needs_ref: "Which game? Use `list games` to see ids, then `show game <id>`."
        channel_needs_ref: "Which channel? Use `list channels` to see them, then `show channel @handle` (or set a channel scope with shift+tab)."
      import:
        descriptions:
          import: "Import a game from IGDB (`import vids` is an alias of `sync vids`)"
        usage_hint: "To import a game from IGDB, type `import game [title]`. To sync vids, use `sync vids` (`import vids` is an alias)."
      delete:
        descriptions:
          delete: "Delete a game or vid (by id or title)"
        needs_ref: "Which game or vid? Use `list games` to see ids, then `rm game <id>` or `rm vid <id>`."
      reindex:
        descriptions:
          reindex: "Re-embed a game or vid (by id or title)"
        needs_ref: "Which game or vid? Use `list games` to see ids, then `reindex game <id>` or `reindex vid <id>`."
      publish:
        descriptions:
          publish: "Publish a vid on YouTube (set public, clear schedule)"
        needs_ref: "Which vid? Use `list vids` to see ids, then `publish vid <id>`."
      unlist:
        descriptions:
          unlist: "Unlist a vid on YouTube"
        needs_ref: "Which vid? Use `list vids` to see ids, then `unlist vid <id>`."
      schedule:
        descriptions:
          schedule: "Schedule a vid for future publishing"
        needs_ref: "Usage: `schedule vid <id> <when>` (e.g. `today at 14:30`, `tomorrow at noon`, `next friday`, `for DD-MM-YYYY HH:MM`) ŌĆö or `schedule <id> <when>, <id> <when>, ŌĆ”` to schedule several at once (one confirmation, all or nothing), or `schedule <id> slate` to see your upcoming schedule. Run `schedule --help` for all `<when>` forms."
        bad_when: "Couldn't parse that time. Try `today`, `today at 14:30`, `today at 3am`, `today at 5pm`, `in 30m`, `in 2 hours`, `in 3 days`, `tomorrow`, `tomorrow at noon`, `tomorrow night`, `at 2pm`, `at 3:10am`, `at 23`, `at 15:30`, `saturday at noon`, `next friday`, `next week`, `3 weeks from now`, `next month`, `for DD.MM.YYYY HH:MM`, or `DD-MM-YYYY HH:MM` (local time)."
        too_soon: "YouTube requires a publish time at least 30 minutes in the future. Pick a later time."
      sync:
        descriptions:
          sync: "Sync vids or channels from YouTube (scope via shift+tab channel)"
        needs_ref: "Usage: `sync vids [only <id>,<id>,ŌĆ”]` or `sync channels [with vids]`."
        unknown_channel: "Unknown channel %{handle}. Use `list channels` to see handles."
      link:
        descriptions:
          link: "Link a vid to a game"
        usage: "Usage: `link game <id|title> to|with vid <id|title>` or `link vid <id|title> to|with game <id|title>`."
        follow_up_usage:
          list: "Usage: reply `link <id> to <id>[, idŌĆ”]` (or `with`) ŌĆö link the listed row to one or more."
          detail: "Usage: reply `link to <id>[, idŌĆ”]` (or `with`) ŌĆö link this to one or more."
      unlink:
        descriptions:
          unlink: "Unlink a vid from a game"
        usage: "Usage: `unlink game <id|title> from vid <id|title>` or `unlink vid <id|title> from game <id|title>`."
        follow_up_usage:
          list: "Usage: reply `unlink <id> from <id>[, idŌĆ”]` ŌĆö unlink the listed row from one or more."
          detail: "Usage: reply `unlink from <id>[, idŌĆ”]` ŌĆö unlink this from one or more."
      help:
        descriptions:
          help: "List follow-up targets and their accepted actions"
      analyze:
        descriptions:
          analyze: "Analyze YouTube metrics for a channel, vid, or game (over the shift+space period)"
      shinies:
        descriptions:
          shinies: "Show achievement tracks and obtained shinies for a game, vid, or channel"
        needs_ref: "Which game, vid, or channel? Try `shinies game <id>`, `shinies vid <id>`, or `shinies channel @handle`."
      linked:
        # The keyed `linked` tool needs a noun to name which linked view (the noun
        # picks the segment; the id is the OTHER entity's).
        needs_noun: "Which linked view? `linked game <vid-id>` shows a vid's linked game; `linked vids <game-id>` lists a game's linked vids."
      errors:
        unknown_input: "Didn't understand %{input}. Try /help for available commands."
        tool_not_implemented: "The chat command %{tool} isn't wired yet."
        misrouted_slash: "Internal: slash command %{raw} reached the chat parser."
        cannot_list: "Can't list %{noun} yet. Try: list games, list channels, or list vids."
      conversations:
        errors:
          title_blank: "title cannot be blank"
