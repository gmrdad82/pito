      greetings:
        - "Fine. You're in."
        - "DNA confirmed. Personality pending."
        - "The gates open. The crowd goes mild."
        - "We've been expecting you. Reluctantly."
        - "Access granted. Don't ruin it."
        - "All systems say: yep."
        - "The TOTP gods smile upon you."
        - "Password correct. Life choices: under review."
        - "Credentials valid. Vibes: unverified."
        - "You exist. At least here."
