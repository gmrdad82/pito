en:
  pito:
    auth:
      not_enrolled: "No TOTP enrolled. Run bin/boot --totp to set one up."
      enroll:
        success: |
          TOTP enrolled.

          To log in, add this code to your TOTP app (Google Authenticator, 1Password, etc.):

            %{otpauth_uri}

          Or enter the secret manually: %{seed}

          Then open pito in your browser and type:

            /login <6-digit code from your app>
      failures:
        - "Authentication failed. So did the vibe."
        - "Nope. The code disagrees."
        - "Wrong. Confidently, but wrong."
        - "That's not it. Not even close."
        - "Denied. Obviously."
        - "The vault laughed and closed."
        - "Invalid. Like your excuse."
        - "Rejected with prejudice."
        - "Six digits. All wrong. Impressive."
        - "Computer says no."
        - "404: correct code not found."
        - "The algorithm shook its head."
        - "Bzzt. Try again, champ."
        - "Access denied. Effort noted."
        - "That code expired. Your confidence didn't."
        - "Cryptographically incorrect."
        - "The door stayed shut. Pointedly."
        - "Imposter detected. Curtains."
        - "Your six-digit story had plot holes."
        - "Error 401: that's not how any of this works."
        - "The TOTP gods are displeased."
        - "Wrong door, wrong code, wrong day."
        - "Not a match. Not even friends."
        - "Your credentials were declined. Like a bad card."
        - "The lighthouse stays dark for you."
        - "Did you check the time? The code did."
        - "Invalid. Valid disappointment."
        - "We gave you one job. One."
        - "The firewall held. Barely tried."
        - "That was a bold guess. A wrong one."
        - "No. Just no."
        - "The correct code exists. That wasn't it."
        - "Rejected. Don't take it personally. Actually, do."
        - "Your code did not spark joy."
        - "Even the error log is embarrassed for you."
        - "The challenge was simple. The code was wrong."
        - "Unauthorized. As in: no."
        - "Wrong again. Astonishing."
        - "The number you dialed is not in service."
        - "Close only counts in horseshoes."
        - "This isn't your moment. Or your code."
        - "The guardian says no, with feeling."
        - "Denied at the door. Try the back. Also denied."
        - "You failed the vibe check and the TOTP check."
        - "Bad code. Very bad code."
        - "That's a no from the judges. All of them."
        - "The machine remains unimpressed."
        - "Rejection letter: sent. Stamp: licked with joy."
        - "Confidence exceeded competence. Again."
        - "I'm sorry, Dave. I'm afraid that's wrong."
      throttles:
        - "Too many attempts. Touch grass."
        - "Slow down, cowboy."
        - "Easy there, speed demon."
        - "Whoa. Breathe."
        - "Cool your jets."
        - "Rate limit reached. Overachiever."
        - "The code isn't running away. Relax."
        - "Your enthusiasm is noted and blocked."
        - "Take five. Or fifty."
        - "The system needs a nap. You broke it."
        - "You've spent your attempt budget. Generously."
        - "Throttled like a sports car driven by a toddler."
        - "Patience is a virtue. Try it."
        - "Too fast, too furious. Wait."
        - "Error 429: you need to stop."
        - "You've been rate-limited into reflection."
        - "Try again later. Much later."
        - "Locked out. Think about what you've done."
        - "The server is giving you the look."
        - "You've worn out your welcome with the auth endpoint."
        - "Authentication speedrun: failed. Try walking."
        - "You broke the rate limit. It wasn't even trying."
        - "Timeout. Sit in the corner."
        - "The algorithm has had enough of you today."
        - "You're in authentication jail. Wait it out."
        - "The gate is sealed for your own good."
        - "You moved fast and broke auth. Now wait."
        - "Slow your roll."
        - "Hold your horses. All of them."
        - "Put the authenticator down and back away."
        - "Cooldown initiated. So should you."
        - "The door is on a break. You caused this."
        - "A brief intermission, imposed by math."
        - "Retry window closed. Reopens eventually. Probably."
        - "Please hold. Your attempt is important to us."
        - "We appreciate the enthusiasm. Stop."
        - "The algorithm is getting dizzy. Please stop."
        - "Your persistence is noted. Still no."
        - "Slow down. You're stressing the logs."
        - "Blocked by your own velocity."
        - "Maybe sit with this for a while."
        - "Temporarily suspended. Like your judgment."
        - "Rate limiting: software telling you to chill."
        - "Too many, too soon. Wait."
        - "Your login velocity is not a flex."
        - "The gatekeeper clocked out. Your fault."
        - "Denied: too fast, too often."
        - "You've been gently but firmly refused."
        - "Wait. That's the whole message. Just wait."
        - "Slam the brakes. Right now."
