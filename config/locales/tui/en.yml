# FB-180 (2026-05-21) — V6 `:command` palette i18n.
#
# All command palette names + hints flow through I18n so brand names
# stay canonically capitalized (per CLAUDE.md
# `feedback_brand_names_always_capitalized`). Non-brand text remains
# lowercase per design.md `single-font-size + lowercase non-brand text`.
#
# Canonical brand spellings used here:
#   Slack, Discord, YouTube, Voyage AI, Meilisearch, PostgreSQL, Redis.
#
# When a new screen-scoped command lands in
# `Tui::ScreenCommands::<Screen>`, add the matching `name` + `hint`
# keys under `tui.commands.<key>` and have the registry read them via
# `I18n.t("tui.commands.<key>.name")` / `.hint`.
en:
  tui:
    # D9 (2026-05-22) — canonical Tui::DialogComponent dismiss hints. The
    # chrome renders `t("tui.dialog.esc_to_close")` in the top-right of
    # the border by default; ConfirmationDialog flavor passes
    # `tui.dialog.esc_to_cancel` so the same chrome reads "Esc to cancel"
    # for decisional dialogs.
    dialog:
      esc_to_close: "Esc to close"
      esc_to_cancel: "Esc to cancel"
    # FB-172 (2026-05-21) — keyboard-only mouse guard alert dialog copy.
    # Title surfaces in the top-border chrome; message lines stack as
    # separate <p> elements inside the dialog body.
    keyboard_only:
      title: "invalid input"
      message_line_1: "mouse interaction forbidden"
      message_line_2: "type ? for help or : for command"
    # D5 (2026-05-22) — leader menu (rebuilt as 1-level shallow which-key
    # popup). Title renders in the Tui::DialogComponent top-border;
    # `entries.<slug>.label` keys feed each Tui::LeaderMenuEntryComponent
    # row label. Brand names stay capitalized; non-brand text lowercase
    # per design.md.
    leader:
      title: "leader"
      entries:
        h:
          label: "home"
        v:
          label: "videos"
        g:
          label: "games"
        help:
          label: "help"
        command:
          label: "command"
        q:
          label: "logout"
        a:
          label: "about"
    # D9 (2026-05-22) — help dialog (replaced legacy help overlay) and
    # about dialog (replaced legacy AboutModalComponent). Titles render
    # in the dialog chrome top-border.
    help:
      title: "help"
    about:
      title: "about"
      app_name: "pito"
      subtitle: "best YouTube tool"
      version_label: "version"
      version_prefix: "v"
      license_label: "license"
      license_value: "AGPL-3.0"
      source_label: "source"
      source_value: "github.com/gmrdad82/pito"
      commit_label: "commit"
      contact_label: "contact"
      contact_value: "gmrdad82 [at] gmail [dot] com"
      env_label: "env"
      copyright: "© %{year} — all rights reserved."
    command_palette:
      prompt_placeholder: ""
      empty: "no matches"
      separator: " · "
      footer:
        next: "↓ next"
        cycle: "Tab cycle"
        run: "Enter run"
        close: "Esc close"
    # 2026-05-22 — Phase 2E. Mode lozenge canonical i18n root.
    # `tui.bst.mode.*` retained below as a deprecated alias for any
    # legacy reader that hasn't been migrated yet.
    mode:
      normal: "normal"
      insert: "insert"
      command: "command"
      search: "search"
    bst:
      mode:
        normal: "normal"
        insert: "insert"
        command: "command"
        search: "search"
      screens:
        home: "home"
        videos: "videos"
        games: "games"
      help_key: "?"
      help_label: "help"
      command_key: ":"
      command_label: "command"
      pipe: "|"
    commands:
      home:
        name: "home"
        hint: "go to home"
      videos:
        name: "videos"
        hint: "go to videos"
      games:
        name: "games"
        hint: "go to games"
      help:
        name: "help"
        hint: "open help dialog"
      about:
        name: "about"
        hint: "open about dialog"
      logout:
        name: "logout"
        hint: "logout"
    tst:
      sync:
        synced: "synced"
        syncing: "syncing"
        disconnected: "disconnected"
      sidekiq:
        busy_prefix: "b"
        enqueued_prefix: "e"
        retry_prefix: "r"
      breadcrumb:
        paren_open: ":("
        paren_close: ")"
      version:
        release_url: "https://github.com/gmrdad82/pito/releases/tag/v%{version}"
