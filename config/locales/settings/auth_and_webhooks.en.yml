en:
  settings:
    breadcrumb_root: settings
    discord:
      heading: Discord
      webhook_url_label: "webhook URL:"
    slack:
      heading: Slack
      webhook_url_label: "webhook URL:"
    webhook:
      clear_hint_html: type <strong>"clear"</strong> to remove
    webhooks:
      help:
        # FB-43 (2026-05-20). Title-in-border copy for the canonical
        # `.tui-dialog-frame` adoption of the webhook help dialog.
        # FB-103 (2026-05-20). Title now interpolates the brand name
        # ("Slack webhook setup" / "Discord webhook setup") so the
        # dialog's top-border title carries the per-brand identity
        # directly. The rendered guide's in-body `<h1>` is dropped in
        # the matching markdown source change. The generic `title`
        # key is kept as the dialog's fallback first-paint label
        # (rendered server-side before the Stimulus controller
        # rewrites it from the click target's brand param). The
        # Esc-close suffix mirrors the about + help overlay dialogs.
        title: webhook help
        brand_title: "%{brand} webhook setup"
        esc_close_suffix: to close
    notifications:
      heading: notifications
    notification_toggle:
      everything: all
      daily_digest: daily digest
      daily_digest_hint: sent daily at 09:00 in your time zone
    security:
      title: security
      breadcrumb: security
      heading: security
      twofa_label: 2FA
      status_prefix: "status:"
      status_on: "on"
      status_off: "off"
      totp:
        title: enroll 2FA
        heading: two-factor setup required
        requires_line1: pito requires 2FA.
        requires_line2: nothing else is reachable until 2FA is enabled.
        scan_hint: scan with 1Password (or any authenticator app).
        backup_codes_heading: backup codes
        backup_codes_hint_line1: each code works once.
        backup_codes_hint_line2_html: store them somewhere safe &mdash; outside the device that holds your authenticator.
    user:
