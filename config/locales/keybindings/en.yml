# Keybinding labels (i18n) — externalized from `config/keybindings.yml`
# during the Lane A i18n sweep (2026-05-18). The YAML schema carries
# `label_i18n: "keybindings.<section>.<key>"` references; the helper
# (`KeybindingsHelper#keybindings_for_surface`) and the component
# (`KeybindingsReferenceComponent`) resolve them through `I18n.t(...)`
# at render time.
#
# Values are kept verbatim — preserving the exact copy that previously
# lived inline in `config/keybindings.yml`. Do not rename copy here
# without updating the corresponding spec assertions and verifying the
# rendered popup matches.
#
# Brand names (Discord, Slack, Voyage, PS, Switch, Steam) stay
# capitalized per feedback_brand_names_always_capitalized.md.
#
# `keys:` block (added 2026-05-20) — canonical user-facing labels for
# keyboard keys. Locked casing per user feedback 2026-05-20: `TAB` is
# all caps (treated as an acronym for the Tab key); modifier names
# (`Esc`, `Space`, `Enter`, `Backspace`, `Shift`, `Ctrl`, `Alt`,
# `Cmd`) are capitalized; letter keys stay lowercase. Combos use a
# `-` separator (`Shift-TAB`, `Ctrl-h`). The same labels will export
# to the Ratatui TUI client so the two surfaces stay aligned.
en:
  keys:
    tab: TAB
    shift_tab: Shift-TAB
    esc: Esc
    space: Space
    enter: Enter
    backspace: Backspace
    shift: Shift
    ctrl: Ctrl
    alt: Alt
    cmd: Cmd
    h: h
    j: j
    k: k
    l: l
    question_mark: "?"
    slash: "/"
    colon: ":"
  keybindings:
    sections:
      local: "local"
      global: "global"
    flat:
      search: "search"
      global_prefix: "global menu"
      logout_prefix: "logout menu"
    menus:
      root:
        channels: "channels"
        games: "games"
        settings: "settings"
        quit: "quit"
        logout: "logout"
        about: "about"
    modal_actions:
      bundle:
        rename: "rename bundle"
      bundle_delete_confirm:
        delete: "delete"
      webhook_help: {}
      revoke_confirm:
        revoke: "revoke session(s)"
      reindex_confirm:
        reindex: "reindex"
      sync_confirm:
        sync: "sync"
    page_actions:
      games_index:
        search: "search"
        released: "released"
        scheduled: "scheduled"
        owned: "owned"
        not_owned: "owned"
        played: "played"
        ps: "PS"
        switch: "Switch"
        steam: "Steam"
        add_game: "add game"
        add_bundle: "add bundle"
      games_show:
        search: "search"
        sync: "sync"
        delete: "delete"
      bundles_show:
        search: "search"
        sync: "sync"
        delete: "delete"
      settings:
        revoke_unused_sessions: "revoke unused sessions"
        notifications_all: "all"
        notifications_daily_digest: "daily digest"
      default:
        search: "search"
