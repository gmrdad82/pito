# Recurring jobs — loaded by config/initializers/sidekiq.rb

reindex_search:
  cron: "0 4 * * *"
  class: ReindexAllJob
  queue: search
  description: "Reindex all channels and videos in Meilisearch"

sync_starred_channels:
  cron: "0 0 * * *"   # daily at midnight UTC
  class: SyncStarredChannelsJob
  description: "Re-sync every starred channel daily"

# Phase 4 §6.3 — reconcile project notes filesystem ↔ DB rows. Walks the
# notes volume per tenant, adds/changes/deletes, enqueues Notes::EmbedJob
# on changes. Tenant-wide lock auto-clears in the job's `ensure` block.
note_sync:
  cron: "*/5 * * * *"
  class: NoteSyncJob
  description: "Reconcile note files with DB rows; enqueue embeds on change"
  args:
    - 1   # default singleton tenant id; multi-tenant mode swaps this

# Phase 15 §1 — milestone evaluator. Daily fallback at 02:00 UTC. Phase 13's
# analytics sync also enqueues this job inline when a snapshot lands; the
# daily cron is the safety net.
milestone_evaluator:
  cron: "0 2 * * *"
  class: MilestoneEvaluatorJob
  description: "Evaluate milestone rules; fire milestone_auto entries on threshold crossings"

# Phase 15 §1 — calendar entry occurred flipper. Every hour at minute 5.
# Flips :scheduled entries whose `starts_at` has passed to :occurred.
calendar_occurred_flipper:
  cron: "5 * * * *"
  class: CalendarOccurredFlipperJob
  description: "Flip ripe :scheduled calendar entries to :occurred"

# Phase 14 §1 — IGDB nightly refresh. Iterates every Game with
# `igdb_synced_at < 7.days.ago` and enqueues `GameIgdbSync` per
# game, spaced 300ms apart so the IGDB 4 req/s rate limit is safe.
game_igdb_nightly_refresh:
  cron: "0 3 * * *"
  class: GameIgdbNightlyRefresh
  description: "Re-sync every Game whose igdb_synced_at is older than 7 days"

# Phase 27 §1a — weekly IGDB platform sync. The `/platforms` endpoint
# changes rarely, so a weekly upsert pass is enough to pick up new
# platforms (e.g., Switch 3, hypothetical PS6). The job is idempotent
# and never deletes — existing ownership rows survive even if IGDB
# removes a platform entry.
platforms_sync_from_igdb:
  cron: "0 3 * * 0"   # Sunday 03:00 UTC
  class: Platforms::SyncFromIgdbJob
  description: "Phase 27 §1a — weekly IGDB platform reference upsert"

# Phase 16 §1 — notifications scheduler. Walks Phase 15's calendar
# notification declarations every minute, materializes Notification
# rows (idempotent via the unique partial index on `notifications`),
# and enqueues `NotificationDeliver` jobs per enabled channel.
notification_scheduler:
  cron: "* * * * *"
  class: NotificationSchedulerJob
  description: "Materialize ripe Notification rows + enqueue webhook deliveries"

# Phase 16 §3 UX restructure 2026-05-10 — read-notification cleanup.
# Daily at 03:30 UTC. Hard-deletes every Notification whose
# `in_app_read_at` is non-NULL and older than 7 days. Retention
# window lives on `NotificationCleanupJob::RETENTION_PERIOD`.
notification_cleanup:
  cron: "30 3 * * *"
  class: NotificationCleanupJob
  description: "Delete read notifications older than 7 days"

# Phase 25 — 01b (LD-6). Sweep pending-approval sessions whose
# 10-minute window has elapsed and transition them to `expired`. The
# sweeper writes a `LoginAttempt` row with `reason: pending_expired`
# per transitioned session so the audit trail is honest. Idempotent;
# double-running is fine.
pending_session_approval_sweeper:
  cron: "* * * * *"
  class: SessionPendingApprovalSweeperJob
  description: "Phase 25 — expire pending-approval sessions past their 10-minute window"

# P25 follow-up — F6. PII retention sweep for LoginAttempt rows.
# Daily at 04:00 UTC; scrubs `email_attempted` on failed /
# invalid-password rows older than 90 days. Forensic columns (IP,
# fingerprint, geo) survive — only the raw email field is nilled.
login_attempt_pii_purge:
  cron: "0 4 * * *"
  class: LoginAttemptPiiPurgeJob
  queue: default
  description: "P25 F6 — daily PII purge of email_attempted on failed LoginAttempt rows older than 90 days"

# Phase 25 — 01g. Stale-session sweeper. Every 15 minutes; revokes
# `state: active` sessions whose `last_activity_at` is older than
# `SessionStaleSweeperJob::STALE_AFTER` (30 days). Cheap and idempotent.
session_stale_sweeper:
  cron: "*/15 * * * *"
  class: SessionStaleSweeperJob
  description: "Phase 25 — revoke active sessions idle past 30 days"

# Phase 26 §01g — viewer-time analytics. Daily fan-out at 03:00 UTC.
# Enumerates every owned video and enqueues a per-video
# `VideoViewerTimeSyncJob`. Sidekiq parallelizes the inner work.
viewer_time_daily_refresh:
  cron: "0 3 * * *"
  class: ViewerTimeDailyRefreshJob
  queue: analytics
  description: "Phase 26 §01g — daily viewer-time bucket refresh across owned videos"

# Phase 13.2 — Analytics sync engine. Nightly orchestrator at 04:00
# UTC; retention curves refresh weekly on Mondays at 05:00 UTC.
youtube_analytics_sync_nightly:
  cron: "0 4 * * *"
  class: YoutubeAnalyticsSync
  queue: analytics
  description: "YouTube Analytics nightly sync — daily slices + window summaries"

youtube_analytics_retention_weekly:
  cron: "0 5 * * 1"
  class: VideoRetentionSyncOrchestrator
  queue: analytics
  description: "YouTube Analytics weekly audience-retention refresh"

# Phase 23 §23d — daily Video diff check.
#
# Walks every Video with a connected YouTube channel, fetches the
# YouTube-side state via `videos.list` (1 unit per video), and
# persists the divergence as an open `VideoDiff` row when fields
# differ. Notifications fire automatically once a diff is detected
# (kind: video_diff_detected, severity: info).
#
# Schedule: 01:30 UTC.
video_diff_check_bulk:
  cron: "30 1 * * *"
  class: BulkVideoDiffCheckJob
  queue: default
  description: "Phase 23 — fan-out daily YouTube video diff check across the catalogue"

# Unit A0 (beta-2) — the `channel_diff_check` cron was removed when the
# channel became a strictly read-only mirror. The channel sync pull
# (`ChannelSync`, run via the `[sync]` overwrite intent) is the one-way
# YouTube → pito ingest; there is no longer a diff-detection pass.

# Phase 26 — 01e. Daily digest scheduler.
#
# Fires every hour at minute 0. The job enumerates users with at least
# one digest-enabled NotificationDeliveryChannel, computes the most
# recent user-local 09:00 in UTC per user's stored time zone, and
# enqueues `DailyDigestDeliverJob.perform_later(user_id)` for each
# user whose local 09:00 fell inside the last hour. Idempotent via the
# `users.last_digest_run_at` guard (23h cooldown).
#
# DST + edge-zone behavior is covered exhaustively in
# `spec/jobs/daily_digest_scheduler_job_spec.rb`.
daily_digest_scheduler:
  cron: "0 * * * *"
  class: DailyDigestSchedulerJob
  queue: default
  description: "Phase 26 — hourly tick; fans out daily digest delivery per user-local 09:00"

# 2026-05-11 F5 — Cloudflare trusted-proxies drift watchdog.
# Weekly Monday at 09:00 UTC. Fetches Cloudflare's published edge
# ranges and diffs against the hardcoded list in
# `config/environments/production.rb`. Drift surfaces as a
# `sync_error` Notification (the trusted list is compiled into a
# Rails initializer; only a redeploy can fix the drift).
cloudflare_trusted_proxies_refresher:
  cron: "0 9 * * 1"
  class: CloudflareTrustedProxiesRefresherJob
  queue: default
  description: "Weekly drift check between production.rb trusted_proxies and Cloudflare's published lists"

