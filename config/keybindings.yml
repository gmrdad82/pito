# Unified keybindings schema — single source of truth for the Rails
# web app's leader-menu popup AND the Rust `pito` CLI's Ratatui leader
# overlay. Both surfaces parse this file at load time; edit it once,
# both stacks pick up the change.
#
# Source-of-truth docs:
#   docs/notes/2026-05-10-23-30-00-keybindings-unified-schema-proposal.md
#   (with the locked-decision block dated 2026-05-11 at the bottom).
#
# Conventions baked in:
#   l   = list (navigate to /<resource>)
#   +   = new / add
#   -   = bulk delete
#   r   = bulk resync
#   y   = bulk sync (capital-letter contexts only)
#   Esc = cancel / close popup
#   Backspace = up one level
#
# Capital letters at the root level point to global resource pages
# (channels, videos, projects, games, notifications). Lowercase
# letters are qualifiers / direct actions.
#
# Optional `surfaces:` key restricts an item to one surface; default
# is "both". TUI-only items (e.g. `q` quit) are filtered out of the
# web schema at render time and vice-versa.

leader:
  key: " "
  display: "_"

# Flat (leader-less) entry points. Keys fire WITHOUT pressing SPACE
# first; the `flat-key` Stimulus controller listens at document level
# and respects the same input-focus / open-dialog / modifier-key
# exemptions the leader controller does (see
# `flat_key_controller.js`). Supported action types:
#
#   open_modal { modal_id: <dom-id> }
#     Locates `<dialog id=...>` and calls `.showModal()` so the
#     modal lands in the browser top layer. When the dialog has an
#     `omnisearch-modal` Stimulus controller wired, that controller's
#     `open()` method is preferred (resets state, focuses input).
#
#   open_leader_with_prefix { prefix: <string> }
#     Opens the leader-menu popup AND seeds the prefix accumulator
#     with `prefix` so the popup renders as a filtered compact view
#     of the matching `menus.root.items`. The compact mode is signaled
#     by `data-compact="true"` on the popup `<dialog>` so CSS hides
#     the local (page_actions) section — the user is mid-flow on a
#     2-letter root binding, not browsing page surface keys.
#
# Coupling note: the `menus.root.items` block below was rebound to
# 2-letter prefixed forms (gC, gG, gS, qQ) so the flat keys here are
# the canonical entry points and the popup compact-mode view stays
# filtered. The TUI-only `q` quit binding under `menus.root.items`
# keeps its single-char key and is unaffected (TUI doesn't ship a
# flat-key surface).
flat:
  items:
    # Phase 37 (2026-05-19) — `/` flat-key is context-aware: it opens
    # the section-specific Omnisearch modal when the current page has
    # one, and falls back to the layout-mounted everywhere modal
    # otherwise. The section→modal-id map is resolved at runtime by
    # `flat_key_controller.js#openSectionModalOrFallback` against
    # `document.body.dataset.section` (set by ApplicationHelper#current_section).
    # Current map:
    #   games    -> omnisearch-modal-games-search   (local games + bundles + IGDB)
    #   channels -> (no section omnisearch yet)     -> fallback
    #   settings -> (no section omnisearch)         -> fallback
    #   home     -> (no section omnisearch)         -> fallback
    # The fallback is always `omnisearch-modal-everywhere` (games +
    # bundles + channels), mounted in `application.html.erb`.
    # `SPACE /` keeps working identically — it dispatches through the
    # leader popup's `page_actions.games_index` / `bundles_show` /
    # `default` rows, which target the section modal explicitly.
    - { key: "/", label_i18n: keybindings.flat.search,
        action: { type: open_section_modal_or_fallback,
                  fallback_modal_id: omnisearch-modal-everywhere } }
    # 2026-05-20 — `?` flat-key removed. The new `Tui::HelpOverlayComponent`
    # owns its own `?` keydown listener (see
    # `app/javascript/controllers/tui_help_overlay_controller.js`); the
    # legacy About-modal binding shadowed it and blocked the help overlay
    # from opening. About modal stays reachable via the SPACE leader
    # popup (`menus.root.items` → `?` about row) — no flat keybinding.
    - { key: g,   label_i18n: keybindings.flat.global_prefix,
        action: { type: open_leader_with_prefix, prefix: g } }
    - { key: q,   label_i18n: keybindings.flat.logout_prefix,
        action: { type: open_leader_with_prefix, prefix: q } }

# Per-modal action keys — rendered in the leader popup INSTEAD of the
# page actions + nav + logout whenever a `<dialog open>` is on the
# page carrying `data-modal-actions-key="<key>"`. When a keyed modal
# is open the leader popup becomes modal-scoped: only this list
# renders, no navigation, no logout. When no keyed modal is open the
# leader popup falls back to the page-actions resolver (default
# behavior — see `page_actions:` below).
#
# Keyed by a modal identifier string. Phase B (still to come) wires
# the `data-modal-actions-key` attributes onto each modal `<dialog>`
# and fills in the items list per modal. Until then this block is an
# empty stub — `leader_menu_controller.js` tolerates a missing or
# empty `modal_actions` map.
#
# Item shape mirrors `page_actions` rows:
#   { key: <string>, label_i18n: <i18n key>, action: { type: ..., ... } }
#
# `label_i18n` references an i18n key under
# `config/locales/keybindings/*.yml`. Helpers and components resolve
# it via `I18n.t(...)` at render time. Items may still carry a raw
# `label:` field for back-compat — the resolver prefers `label_i18n`
# when present.
#
# Phase B (2026-05-17) — populated.
#
# Modal contexts registered below:
#   bundle          — /games bundles modal (display + inline-edit
#                     title). Action keys: `c` rename.
#   webhook_help    — Discord + Slack help modals (one shared component,
#                     two invocations — adding the attribute on the
#                     shared component scopes it to both). Informational,
#                     no modal-scoped action keys (empty items list).
#   revoke_confirm  — /settings/security session-revoke confirm modal.
#                     Action keys: `r` revoke.
#   reindex_confirm — /settings/stack Meilisearch reindex confirm modal.
#                     Action keys: `r` reindex.
#   sync_confirm    — /games/:id breadcrumb [sync] confirm modal (dangerous
#                     action — consumes from the IGDB request quota).
#                     Action keys: `s` confirm sync.
#
# Two new action types are introduced in lockstep with this block:
#
#   trigger_inline_edit { target: <hook> }
#     Programmatically activates the inline-edit Stimulus controller
#     attached to the element carrying
#     `[data-modal-action-target="<hook>"]` inside the currently open
#     `<dialog>`. The web side resolves the `inline-title-edit`
#     controller via `application.getControllerForElementAndIdentifier`
#     and calls `.edit()` on it (same flow the `[change]` link triggers
#     today).
#
#   submit_confirm_modal
#     Submits the form inside the currently open `<dialog>` via
#     `form.requestSubmit()`. No `target:` needed — the resolver finds
#     the open dialog and the form inside it.
modal_actions:
  bundle:
    items:
      - key: c
        label_i18n: keybindings.modal_actions.bundle.rename
        action:
          type: trigger_inline_edit
          target: bundle-modal-title-edit
  # 2026-05-18 — Per-bundle `[-]` confirm-delete dialog (rendered as a
  # sibling of each bundle tile in `_bundles_for_shelf`). The dialog
  # carries a submit form; `submit_confirm_modal` finds the open
  # dialog and `requestSubmit()`s its form so `d` confirms the delete
  # the same way `[delete]` does.
  bundle_delete_confirm:
    items:
      - key: d
        label_i18n: keybindings.modal_actions.bundle_delete_confirm.delete
        action:
          type: submit_confirm_modal
  webhook_help:
    items: []
  revoke_confirm:
    items:
      - key: r
        label_i18n: keybindings.modal_actions.revoke_confirm.revoke
        action:
          type: submit_confirm_modal
  reindex_confirm:
    items:
      - key: r
        label_i18n: keybindings.modal_actions.reindex_confirm.reindex
        action:
          type: submit_confirm_modal
  sync_confirm:
    items:
      - key: s
        label_i18n: keybindings.modal_actions.sync_confirm.sync
        action:
          type: submit_confirm_modal

# Per-page action keys — rendered in the page-actions section of the
# keybindings popup (shown FIRST, above the nav menus). Each page
# resolves to a list of { key, label, action } rows for actions that
# apply to the current page (search, sync, delete, etc.). Pages not
# listed here fall back to `default:`. The renderer hides the
# page-actions section entirely when a page resolves to an empty list
# (e.g. /settings). Per spec 09 in
# docs/plans/beta/27-games-listing-shelves-filters-display-modes/specs-v2/.
page_actions:
  # 2026-05-18 — /games "local" section. The KeybindingsReferenceComponent
  # renders the page_actions rows under the "local" section heading
  # top-down. Divider entries split the visual list into logical groups;
  # a divider carrying `layout: grid_2col` opens a 2-column grid that
  # closes at the next plain divider OR end-of-list. The grid lays
  # items out COLUMN-FIRST (CSS `grid-auto-flow: column` + an inline
  # `grid-template-rows: repeat(<half>, auto)`) so the 8 filter chips
  # render as `5 left / 3 right` and the 2 create-row bindings render
  # as `1 left / 1 right`.
  #
  # Rendered shape:
  #   /  search
  #   ───── (plain divider) ─────
  #   fr  released   |  fP  PS         (2-col grid)
  #   fs  scheduled  |  fN  Switch
  #   fo  owned      |  fS  Steam
  #   fw  not owned  |
  #   fp  played     |
  #   ───── (plain divider) ─────
  #   G+ add game    |  Gb add bundle  (2-col grid)
  games_index:
    # `/` opens the page-scoped omnisearch modal (`:games_search` mode).
    # Local games + bundles + IGDB. The dialog is mounted at the bottom
    # of `app/views/games/index.html.erb` with id
    # `omnisearch-modal-games-search`; the leader-menu's
    # `open_modal_by_id` resolver wakes it up.
    - key: "/"
      label_i18n: keybindings.page_actions.games_index.search
      action:
        type: open_modal_by_id
        target: omnisearch-modal-games-search
    # Open the 2-col grid block for the filter chips.
    - divider: true
      layout: grid_2col
    - key: fr
      label_i18n: keybindings.page_actions.games_index.released
      action: { type: toggle_filter_chip, token: released }
    - key: fs
      label_i18n: keybindings.page_actions.games_index.scheduled
      action: { type: toggle_filter_chip, token: scheduled }
    - key: fo
      label_i18n: keybindings.page_actions.games_index.owned
      action: { type: toggle_filter_chip, token: owned }
    - key: fw
      label_i18n: keybindings.page_actions.games_index.not_owned
      action: { type: toggle_filter_chip, token: not_owned }
    - key: fp
      label_i18n: keybindings.page_actions.games_index.played
      action: { type: toggle_filter_chip, token: played }
    - key: fP
      label_i18n: keybindings.page_actions.games_index.ps
      action: { type: toggle_filter_chip, token: ps }
    - key: fN
      label_i18n: keybindings.page_actions.games_index.switch
      action: { type: toggle_filter_chip, token: switch }
    - key: fS
      label_i18n: keybindings.page_actions.games_index.steam
      action: { type: toggle_filter_chip, token: steam }
    # Open the 2-col grid block for the create-row (`G+` add game,
    # `Gb` add bundle). `G+` opens the layout-mounted omnisearch modal
    # (`omnisearch-modal-games-index`) for IGDB search. `Gb` triggers
    # the bundles-shelf `[+]` button (via the `page_add_bundle` action
    # type — the leader-menu locates `[data-page-action="add-bundle"]`
    # and clicks it, same pattern as `page_sync` / `page_delete`). The
    # button is a `button_to` that POSTs `/bundles`; the Turbo Stream
    # response appends the new tile and auto-opens the bundle modal so
    # the user can rename it inline.
    - divider: true
      layout: grid_2col
    - key: "G+"
      label_i18n: keybindings.page_actions.games_index.add_game
      action:
        type: open_modal_by_id
        target: omnisearch-modal-games-index
    - key: Gb
      label_i18n: keybindings.page_actions.games_index.add_bundle
      action:
        type: page_add_bundle
  games_show:
    - key: "/"
      label_i18n: keybindings.page_actions.games_show.search
      action:
        type: open_modal
        modal_id: search_placeholder
    - key: s
      label_i18n: keybindings.page_actions.games_show.sync
      action:
        type: page_sync
    - key: "-"
      label_i18n: keybindings.page_actions.games_show.delete
      action:
        type: page_delete
  bundles_show:
    - key: "/"
      label_i18n: keybindings.page_actions.bundles_show.search
      action:
        type: open_modal
        modal_id: search_placeholder
    - key: s
      label_i18n: keybindings.page_actions.bundles_show.sync
      action:
        type: page_sync
    - key: "-"
      label_i18n: keybindings.page_actions.bundles_show.delete
      action:
        type: page_delete
  # /settings ships dark-mode plus a set of 2-key flat bindings for
  # the page's primary actions (Phase C, 2026-05-17). No `/ search`
  # — /settings is a utility surface; search isn't useful here.
  #
  # 2-key bindings (parsed by the prefix accumulator in
  # `leader_menu_controller.js#handlePrefixKey` — multi-char keys
  # work because the accumulator collects characters until either an
  # exact match has no longer prefix candidate OR the 1500 ms
  # inactivity timer fires the recorded exact match):
  #
  #   sr — pre-check every session checkbox EXCEPT the current
  #        (`[this]`) row, then open the revoke-sessions confirm
  #        modal (mounted by `_security_pane.html.erb` as
  #        `<dialog id="revoke_sessions_modal">`). The auto-check
  #        encodes the action label "revoke unused sessions": every
  #        session other than this one IS the unused set. The
  #        `open_revoke_unused_modal` action type ticks the checkboxes
  #        and then delegates to the `sessions-bulk-revoke` controller's
  #        `open()` so the modal title, conditional warning, and form
  #        action populate the same way they do on a manual click of
  #        `[revoke N]`. Once the modal is open, the `revoke_confirm`
  #        modal_actions take over (`l` dark mode + `r` revoke
  #        session(s) + Esc close).
  #   na / nd — shared notifications all / daily digest toggles.
  #
  #   FB-63 (2026-05-20) — the legacy `vr` (Voyage reindex) leader
  #   keybinding that opened the `reindex_meilisearch_modal` dialog
  #   has been REMOVED. The combined `[reindex]` action split into
  #   per-tile title-row links on the Meilisearch + Voyage AI tiles;
  #   the modal it targeted no longer exists, and the leader-menu
  #   action-type vocabulary does not currently express "POST to a
  #   path" without a dialog gate. A follow-up FB-* dispatch can
  #   restore separate `mr` (Meilisearch reindex) + `vr` (Voyage
  #   reindex) leader keys once a `post_to_path` action type lands
  #   in the leader-menu controller.
  #
  # 2026-05-20 — F3-B-SIMPLIFY-MODEL. The per-brand `da/dd/sa/sd`
  # toggles collapsed into TWO shared `na/nd` toggles. Each flips the
  # matching shared column on `AppSetting.singleton_row`; per-brand
  # webhook URLs still gate which brands actually receive a delivery.
  # Notifications toggles target `[data-leader-toggle="<target>"]`
  # hooks rendered by the unified notifications pane on the matching
  # checkbox. The action silently no-ops when the hook is missing
  # (defensive — same posture as before).
  #
  # Prefix-conflict note: `n` is a prefix-only key for `na` + `nd`
  # (no exact `n` binding); pressing `n` alone fires nothing — the
  # prefix accumulator waits for the second key (a/d) or the 1500 ms
  # timeout (which expires with no recorded exact match → no-op).
  # `s` is a prefix-only key for `sr` (no exact `s` binding); pressing
  # `s` then `r` fires the matching 2-key binding.
  # /settings popup layout:
  #   sr                             (revoke unused sessions)
  #   ───── (plain divider) ─────
  #   na  all                        (single column — collapsed from 2-col)
  #   nd  daily digest
  #
  # FB-63 (2026-05-20) — the trailing `vr` (Voyage reindex) entry was
  # dropped along with the combined `[reindex]` modal. Restore once a
  # `post_to_path` action type lands; the per-tile title-row
  # `[reindex]` links are the canonical surface in the meantime.
  settings:
    - key: sr
      label_i18n: keybindings.page_actions.settings.revoke_unused_sessions
      action:
        type: open_revoke_unused_modal
        target: revoke_sessions_modal
    - divider: true
    - key: na
      label_i18n: keybindings.page_actions.settings.notifications_all
      action:
        type: toggle_setting
        target: notification_all
    - key: nd
      label_i18n: keybindings.page_actions.settings.notifications_daily_digest
      action:
        type: toggle_setting
        target: notification_daily_digest
  default:
    - key: "/"
      label_i18n: keybindings.page_actions.default.search
      action:
        type: open_modal
        modal_id: search_placeholder

menus:
  # 2026-05-18 — "global" section. The earlier flat 2-key dispatch
  # carried bindings for calendar / channels / videos / projects /
  # games-create / notifications under capital + lowercase prefixes.
  # On 2026-05-18 the user trimmed the surface to the in-scope beta-3
  # areas only: `/games` and `/settings`. Everything else (h home,
  # all of c* / C* / V* / P* / N*, and `G+` games-new which moved to
  # `page_actions.games_index` as "add game") was dropped from the
  # root menu entirely. Out-of-scope sections can be re-added later
  # when those pages return to active work.
  #
  # 2026-05-19 — 2-letter prefix scheme. Every navigation binding now
  # uses a 2-letter form (`gC` channels, `gG` games, `gS` settings,
  # `qQ` logout) so it can also be reached by the flat-key compact
  # menu: pressing `g` (or `q`) WITHOUT the SPACE leader opens the
  # leader popup in compact mode (`data-compact="true"`) seeded with
  # that prefix — the popup re-renders filtered to just the `g*` (or
  # `q*`) items. Pressing SPACE first still opens the full leader
  # menu (page_actions + nav) where the same 2-letter keys also work.
  # See the top-level `flat:` block for the leader-less entry points.
  #
  # 2-letter bindings:
  #   gC → channels       gG → games       gS → settings
  #   qQ → logout
  # Direct-key entries (no prefix continuation):
  #   q  → quit (TUI-only; surfaces: [tui]; never appears in the web
  #         popup so it does not collide with the `q` flat-key)
  #   a  → about (opens the about dialog)
  #
  # The prefix accumulator (`leader_menu_controller.js#handlePrefixKey`)
  # handles multi-char keys natively; `g` is a prefix-only key in this
  # menu (no exact `g` binding), so pressing `g` then `C`/`G`/`S` fires
  # the matching navigation. `q` is a prefix-only key in the web view
  # (the bare `q` quit entry is filtered out as TUI-only).
  #
  # FB-71 (2026-05-20) — about moved from `?` to `a`. The previous `?`
  # binding collided with the `?` flat-key (now exclusively owned by
  # `Tui::HelpOverlayComponent`): even though `?` here is gated behind
  # the SPACE leader so the flat-key handler is bypassed when the menu
  # is open, sharing the same glyph for two distinct destinations was
  # confusing. `a` (mnemonic for "about") is unused elsewhere in the
  # root menu and keeps the leader popup unambiguous.
  #
  # Divider entries split the visual list into logical groups
  # (navigation, logout). Renderers skip dividers during key dispatch.
  root:
    items:
      - { key: gC, label_i18n: keybindings.menus.root.channels, action: { type: navigate, path: "/channels" } }
      - { key: gG, label_i18n: keybindings.menus.root.games,    action: { type: navigate, path: "/games" } }
      - { key: gS, label_i18n: keybindings.menus.root.settings, action: { type: navigate, path: "/settings" } }
      - { key: q,  label_i18n: keybindings.menus.root.quit,     action: { type: quit }, surfaces: [tui] }
      - divider: true
      - { key: qQ, label_i18n: keybindings.menus.root.logout,   action: { type: logout } }
      - { key: a,  label_i18n: keybindings.menus.root.about,    action: { type: open_modal, modal_id: about-dialog } }

